name: CPAN::Maker::Bootstrapper
on:
  push:
    branches: [ main, dev ]
jobs:
  cpan-maker-bootstrapper:
    runs-on: ubuntu-latest
    container:
      image: debian:trixie
    steps:
      # 1. Install git BEFORE checkout so the action clones properly
      - name: Pre-install git
        run: apt-get update && apt-get install -y git

      # 2. Now the checkout action will create a true .git repository
      - uses: actions/checkout@v6

      # 3. Prevent Git "dubious ownership" fatal errors in containers
      - name: Configure Git Safe Directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: build
        run: ./builder
