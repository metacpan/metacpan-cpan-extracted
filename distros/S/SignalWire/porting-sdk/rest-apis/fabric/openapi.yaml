    ConversationMessage:
      type: object
      required:
        - role
        - content
      properties:
        role:
          allOf:
            - $ref: '#/components/schemas/ConversationRole'
          description: The role of the message sender.
        content:
          type: string
          description: The text content of the message.
          examples:
            - Hello, how can I assist you today?
        lang:
          type: string
          description: Optional language code for the message (e.g., 'en', 'es', 'fr').
          examples:
            - en
      description: A message object representing a single turn in the conversation history.
      title: Conversation message object
    ConversationRole:
      type: string
      enum:
        - user
        - assistant
        - system
      title: Conversation message role
    CustomTranslationFilter:
      type: string
      pattern: ^prompt:.+$
      description: Custom translation filter with a prompt prefix. Use `prompt:` followed by your custom instructions (e.g., `prompt:Use formal business language`).
      title: Custom Filter
    CxmlApplication:
      type: object
      required:
        - id
        - project_id
        - friendly_name
        - voice_url
        - voice_method
        - voice_fallback_url
        - voice_fallback_method
        - status_callback
        - status_callback_method
        - sms_url
        - sms_method
        - sms_fallback_url
        - sms_fallback_method
        - sms_status_callback
        - sms_status_callback_method
      properties:
        id:
          allOf:
            - $ref: '#/components/schemas/uuid'
          format: uuid
          description: Unique ID of the cXML Application.
          examples:
            - 1313fe58-5e14-4c11-bbe7-6fdfa11fe780
        project_id:
          allOf:
            - $ref: '#/components/schemas/uuid'
          description: Project ID for the cXML Application
          examples:
            - 1313fe58-5e14-4c11-bbe7-6fdfa11fe780
        friendly_name:
          type: string
          description: Display name of the cXML Application
          examples:
            - Reception App
        voice_url:
          anyOf:
            - type: string
            - type: 'null'
          description: URL to handle incoming calls
          examples:
            - https://example.com/voice/incoming
        voice_method:
          anyOf:
            - type: string
              enum:
                - GET
            - type: string
              enum:
                - POST
          description: HTTP method for voice URL
          examples:
            - GET
        voice_fallback_url:
          anyOf:
            - type: string
            - type: 'null'
          description: Fallback URL for voice errors
          examples:
            - https://example.com/voice/fallback
        voice_fallback_method:
          anyOf:
            - type: string
              enum:
                - GET
            - type: string
              enum:
                - POST
          description: HTTP method for voice fallback URL
          examples:
            - GET
        status_callback:
          anyOf:
            - type: string
              format: uri
