        from:
          type: string
          description: The origin number or address.
          examples:
            - '+12069708643'
        to:
          type: string
          description: The destination number or address.
          examples:
            - '+15550198765'
        direction:
          allOf:
            - $ref: '#/components/schemas/CallDirection'
          description: The direction of the call.
          examples:
            - outbound-api
        source:
          type: string
          enum:
            - realtime_api
          description: Source of this call.
          examples:
            - realtime_api
        url:
          anyOf:
            - type: string
            - type: 'null'
          description: The URL associated with this call.
          examples:
            - null
        charge:
          type: number
          format: double
          description: Total charge for this call.
          examples:
            - 0
        created_at:
          type: string
          format: date-time
          description: The date and time when the call was created.
          examples:
