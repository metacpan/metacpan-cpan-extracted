name    = Authen-OATH
author  = Kurt Kincaid <kurt.kincaid@gmail.com>
license = Perl_5
main_module = lib/Authen/OATH.pm
copyright_holder = Kurt Kincaid
copyright_year   = 2010-2017

[@Author::OALDERS]
-remove = Test::Perl::Critic
-remove = MAXMIND::TidyAll
-remove = Test::TidyAll
-remove = Modules for use with tidyall

[RemovePrereqs]
remove = Code::TidyAll
remove = Code::TidyAll::Plugin::SortLines::Naturally
remove = Code::TidyAll::Plugin::Test::Vars
remove = Code::TidyAll::Plugin::UniqueLines
remove = Test::Code::TidyAll
remove = Test::Vars
remove = Pod::Wordlist
remove = Parallel::ForkManager

[Prereqs / DevelopRequires]
Convert::Base32 = 0
App::perlvars = 0

[PruneFiles]
filename = scripts/pre-commit
