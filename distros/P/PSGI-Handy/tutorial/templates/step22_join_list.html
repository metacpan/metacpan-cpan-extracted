<!DOCTYPE html>
<html>
<head><title>Step 22 - Employee Index</title></head>
<body>
    <h1>Employee List</h1>
    <table border="1">
        <tr><th>ID</th><th>Name</th><th>Department</th></tr>
        {% for user in users %}
        <tr><td>{{ user.id }}</td><td><a href="/user/{{ user.id }}">{{ user.name }}</a></td><td>{{ user.dept_name }}</td></tr>
        {% endfor %}
    </table>
</body>
</html>
