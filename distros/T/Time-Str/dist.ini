name = Time-Str
abstract = Parse and format date/time strings in multiple standard formats
author = Christian Hansen <chansen@cpan.org>
license = Perl_5
copyright_holder = Christian Hansen
copyright_year = 2026

[VersionFromMainModule]
[CheckChangesHasContent]

[@Starter::Git]
-remove = Pod2Readme
revision = 6
installer = MakeMaker::Awesome
regenerate = Makefile.PL
regenerate = META.json
regenerate = LICENSE
Git::GatherDir.exclude_match[0] = ^ragel
Git::GatherDir.exclude_match[1] = ^bench
Git::GatherDir.exclude_match[2] = ^author

MakeMaker::Awesome.test_file = t/*.t t/*/*.t
MakeMaker::Awesome.delimiter = |
MakeMaker::Awesome.header[00] = |
MakeMaker::Awesome.header[01] = |my @CSourceFiles = qw(
MakeMaker::Awesome.header[02] = |  XS.c tstr_time2str.c tstr_token_parse.c tstr_regexp.c tstr_parse.c
MakeMaker::Awesome.header[03] = |  tstr_cparse_asn1gt.c tstr_cparse_datetime.c tstr_cparse_ecmascript.c tstr_cparse_iso8601.c
MakeMaker::Awesome.header[04] = |  tstr_cparse_iso9075.c tstr_cparse_rfc2822.c tstr_cparse_rfc3339.c 
MakeMaker::Awesome.header[05] = |  tstr_cparse_rfc4287.c tstr_cparse_rfc9557.c tstr_cparse_w3cdtf.c
MakeMaker::Awesome.header[06] = |);
MakeMaker::Awesome.header[07] = |use Config;
MakeMaker::Awesome.header[08] = |my $xs_ok = 0;
MakeMaker::Awesome.header[09] = |if (eval { require ExtUtils::CBuilder; ExtUtils::CBuilder->new(quiet => 1)->have_compiler }) {
MakeMaker::Awesome.header[10] = |  my $cb = ExtUtils::CBuilder->new(quiet => 1);
MakeMaker::Awesome.header[11] = |  my $src = 'conftest.c';
MakeMaker::Awesome.header[12] = |  open my $fh, '>', $src or die "Cannot write $src: $!";
MakeMaker::Awesome.header[13] = |  print $fh "#if !defined(__STDC_VERSION__) || __STDC_VERSION__ < 199901L\n";
MakeMaker::Awesome.header[14] = |  print $fh "#error C99 required\n";
MakeMaker::Awesome.header[15] = |  print $fh "#endif\n";
MakeMaker::Awesome.header[16] = |  print $fh "int main(void){return 0;}\n";
MakeMaker::Awesome.header[17] = |  close $fh;
MakeMaker::Awesome.header[18] = |  eval {
MakeMaker::Awesome.header[19] = |    $cb->compile(source => $src, extra_compiler_flags => ['-std=c99']);
MakeMaker::Awesome.header[20] = |    $xs_ok = 1;
MakeMaker::Awesome.header[21] = |  };
MakeMaker::Awesome.header[22] = |  unlink $src, glob('conftest.*');
MakeMaker::Awesome.header[23] = |}
MakeMaker::Awesome.header[24] = |if ($xs_ok) {
MakeMaker::Awesome.header[25] = |  print "C99 compiler found, building XS.\n";
MakeMaker::Awesome.header[26] = |} else {
MakeMaker::Awesome.header[27] = |  print "No C99 compiler found, Pure-Perl only.\n";
MakeMaker::Awesome.header[28] = |}
MakeMaker::Awesome.WriteMakefile_arg[0] = XS => ($xs_ok ? { 'XS.xs' => 'XS.c' } : {})
MakeMaker::Awesome.WriteMakefile_arg[1] = C => ($xs_ok ? [@CSourceFiles] : [])
MakeMaker::Awesome.WriteMakefile_arg[2] = OBJECT => ($xs_ok ? '$(O_FILES)' : '')
MakeMaker::Awesome.WriteMakefile_arg[3] = INC => ($xs_ok ? '-I.' : '')
MakeMaker::Awesome.WriteMakefile_arg[4] = CCFLAGS => ($xs_ok ? "$Config{ccflags} -std=c99" : $Config{ccflags})

[GithubMeta]
issues = 1
user = chansen
