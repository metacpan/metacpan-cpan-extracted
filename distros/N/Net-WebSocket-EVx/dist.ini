name = Net-WebSocket-EVx
author = Yegor Korablev <egor@cpan.org>
license = Perl_5
copyright_holder = Yegor Korablev
copyright_year = 2021
version = 0.20

[CPANFile]
[CopyFilesFromBuild]
copy = cpanfile
[GatherDir]
exclude_filename = cpanfile
exclude_filename = CLAUDE.md
exclude_match = ^\.github
exclude_match = ^blib
exclude_match = ^MYMETA
exclude_match = ^Makefile$
exclude_match = ^Makefile\.old$
exclude_match = ^pm_to_blib$
exclude_match = \.o$
exclude_match = \.c$
exclude_match = \.bs$
[AutoPrereqs]
[Prereqs / conf]
-phase = configure
Alien::Wslay = 0
EV = 0
[Prereqs / test]
-phase = test
Net::EmptyPort = 0
Test::More = 0
[Manifest]
[License]
[Readme]
[MetaJSON]
[MetaYAML]
[ConfirmRelease]
[UploadToCPAN]
