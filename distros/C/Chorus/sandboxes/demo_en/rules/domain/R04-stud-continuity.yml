##
# RULE: R04-stud-continuity
# AGENT: CobIntro::Agent::Domain  (pos. 2 / 4)
# CORPUS: §3.4 — BS EN 1995-1-1 §5.4 — No longitudinal splice on load-bearing studs
#
# PURPOSE
#   Rejects any load-bearing stud that carries a longitudinal splice within
#   the storey height. A splice on a load-bearing stud is a structural
#   non-conformity per §3.4.
#
# INPUTS  (slots read)
#   needs_domain : targeting slot — set by Qualification R04
#   type_element : must be 'load_bearing_stud'
#   has_splice   : int — 1 if a longitudinal splice is present, 0 otherwise
#
# OUTPUTS (slots written)
#   frame_ok     : 'NO' — element rejected if has_splice = 1
#   domain_note  : description of the failure
#   needs_domain : deleted after rejection
#
# GUARD — EXCEPTION: defined $f->{frame_ok}
#   Idempotence — prevents re-processing an already-processed Frame.
##
RULE: R04-stud-continuity
FIND:
  f:
    attribut: needs_domain
EXCEPTION: defined $f->{frame_ok}
CONDITION: "($f->{type_element}//'') eq 'load_bearing_stud' && defined $f->{has_splice}"
ACTION: |
  # §3.4 — longitudinal splice on LB stud is a structural non-conformity
  if ($f->{has_splice}) {
    $f->set('frame_ok', 'NO');
    $f->set('domain_note',
      "Load-bearing stud has longitudinal splice — structural non-conformity (§3.4 BS EN 1995-1-1 §5.4)");
    $f->set('needs_fire', 1);   # propagate to Fire even on domain rejection
    $f->delete('needs_domain');
    return 1;
  }
  1
