name    = Catalyst-Plugin-Static-File
author  = Robert Rothenberg <perl@rhizomnic.com>
license = Artistic_2_0
copyright_holder = Robert Rothenberg
copyright_year   = 2023-2026

[Keywords]
keyword = Catalyst
keyword = static
keyword = file

[Meta::Contributors]

[GatherDir]
exclude_match = cpanfile*
exclude_filename = LICENSE
exclude_filename = SECURITY.md
exclude_filename = doap.xml
[PruneCruft]
[CPANFile]
[License]
[DOAP]
[ExecDir]
[ShareDir]
[MakeMaker]
[Manifest]
[TestRelease]
[CheckExtraTests]
[ConfirmRelease]
[SigStore::SignRelease]

[RecommendedPrereqs]
[AutoPrereqs]

; [EnsurePrereqsInstalled]
; :version = 0.003
; type = requires
; type = recommends

[Prereqs / BuildRequires ]
-phase = build
-relationship = requires
ExtUtils::MakeMaker = 7.22
Module::Metadata = 1.000015

[Prereqs / Runtime]
-relationship = requires
Catalyst = 5.90129

; This is required by Catalyst, but some test environments don't have it and fail
[Prereqs / TestRequires]
-phase = test
-relationship = requires
Plack::Middleware::MethodOverride = 0

[Prereqs / TestRecommends]
-phase = test
-relationship = recommends
Plack::Middleware::ETag = 0

[Prereqs / DevelopRequires ]
-phase = develop
-relationship = requires
Software::Security::Policy::Individual = 0.10
Test::MixedScripts = v0.6.1

[GitHub::Meta]
repo = robrwo/Catalyst-Plugin-Static-File.git

[SecurityPolicy]
-policy = Individual
timeframe = 2 weeks
git_url   = https://github.com/robrwo/Catalyst-Plugin-Static-File
report_url = https://github.com/robrwo/Catalyst-Plugin-Static-File/security/advisories

[PodWeaver]
[UsefulReadme]
type     = gfm
filename = README.md
location = build

[CopyFilesFromBuild]
copy = LICENSE
copy = README.md
copy = SECURITY.md
copy = cpanfile
copy = doap.xml

[PruneFiles]

[Metadata]
x_authority    = cpan:RRWO

[MetaProvides::Package]
[MetaJSON]
[MetaYAML]

; authordep Pod::Weaver::Plugin::AppendPrepend
; authordep Pod::Weaver::Section::Contributors
; authordep Pod::Weaver::Section::SourceGitHub

[PodSyntaxTests]
[Test::DistManifest]
; authordep Test::DistManifest
[Test::CleanNamespaces]
[Test::EOF]
; authordep Test::EOF
[Test::EOL]
:version = 0.14
[Test::Fixme]
[Test::MinimumVersion]
[Test::NoTabs]
[Test::Perl::Critic]
critic_config = xt/etc/perlcritic.rc

[Test::Pod::Coverage::Configurable]
[Test::Pod::LinkCheck]
; authordep Test::Pod::LinkCheck
[Test::Portability]
[Test::PodSpelling]

[Test::TrailingSpace]
; authordep Test::TrailingSpace
filename_regex = \.(?:p[lm]|pod)\z
[Test::Kwalitee]
; authordep Test::Kwalitee
[Test::CPAN::Changes]
; authordep Test::CPAN::Changes
[Test::UnusedVars]
[MojibakeTests]

[Test::ReportPrereqs]
:version = 0.027
version_extractor = Module::Metadata
verify_prereqs = 1
include = Plack
include = Test::WWW::Mechanize
include = WWW::Mechanize

[MetaTests]

[Test::Version]
[Test::Compile]
; authordep Test::Compile
filename = xt/00-compile.t

[Test::MixedScripts]
scripts = ASCII

[@Git]
allow_dirty = dist.ini
push_to     = origin main:main
tag_format  = %v
commit_msg  = %v%n%n%c

[Git::Contributors]
:version = 0.019

[RewriteVersion]
[NextRelease]
[BumpVersionAfterRelease]

[Git::Commit / Commit_Changes] ; commit Changes (for new dev)
allow_dirty_match = ^lib/
commit_msg = Commit Changes and bump $VERSION
