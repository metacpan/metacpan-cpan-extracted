name    = WWW-Mechanize-Cached
author  = Iain Truskett (original author)
author  = Andy Lester <petdance@cpan.org> (2004 - July 2009)
author  = Olaf Alders <olaf@wundercounter.com> (current maintainer)

license = Perl_5
copyright_holder = Iain Truskett and Andy Lester
copyright_year   = 2004
main_module = lib/WWW/Mechanize/Cached.pm

[Prereqs / DevelopRequires]
  Test::Warn = 0.36
[Prereqs / RuntimeRequires]
  Cache::FileCache = 0
  File::XDG = 1.03
  LWP::UserAgent = 6.66
  Path::Tiny = 0.150
  Storable = 2.21
  perl = 5.006
[Prereqs / TestRequires]
  CHI = 0
  Cache::FileCache = 0
[Prereqs / RuntimeRecommends]
  CHI = 0

[@Author::OALDERS]
-remove = Test::TidyAll
-remove = Modules for use with tidyall
StaticInstall.mode = on
StaticInstall.dry_run = 0
Test::Pod::Coverage::Configurable.also_private = qr/^FOREIGNBUILDARGS$/

[RemovePrereqs]
  remove = TestCache
  remove = Code::TidyAll
  remove = Code::TidyAll::Plugin::SortLines::Naturally
  remove = Code::TidyAll::Plugin::Test::Vars
  remove = Code::TidyAll::Plugin::UniqueLines
  remove = Parallel::ForkManager
  remove = Pod::Wordlist
  remove = Test::Code::TidyAll
  remove = Test::Vars
