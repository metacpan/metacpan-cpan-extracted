name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        perl: ['5.40', '5.38', '5.36', '5.34', '5.32', '5.28', '5.24', '5.20']
    name: Linux / Perl ${{ matrix.perl }}
    steps:
      - uses: actions/checkout@v4
      - uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: ${{ matrix.perl }}
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y socat
      - name: Install nats-server
        run: |
          curl -fsSL https://github.com/nats-io/nats-server/releases/download/v2.10.24/nats-server-v2.10.24-linux-amd64.tar.gz | tar xz
          sudo mv nats-server-v2.10.24-linux-amd64/nats-server /usr/local/bin/
      - name: Start nats-server
        run: |
          nats-server -p 14222 -a 127.0.0.1 --pid /tmp/nats.pid &
          for i in 1 2 3 4 5; do nc -z 127.0.0.1 14222 && exit 0; sleep 1; done
          echo "nats-server did not start" && exit 1
      - name: Install deps
        run: cpanm -n EV
      - name: Build
        run: perl Makefile.PL && make
      - name: Test
        run: TEST_NATS_HOST=127.0.0.1 TEST_NATS_PORT=14222 make test

  macos:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        perl: ['5.40', '5.36']
    name: macOS / Perl ${{ matrix.perl }}
    steps:
      - uses: actions/checkout@v4
      - uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: ${{ matrix.perl }}
      - name: Install system deps
        run: brew install nats-server socat
      - name: Start nats-server
        run: |
          nats-server -p 14222 -a 127.0.0.1 --pid /tmp/nats.pid &
          for i in 1 2 3 4 5; do nc -z 127.0.0.1 14222 && exit 0; sleep 1; done
          echo "nats-server did not start" && exit 1
      - name: Install deps
        run: cpanm -n EV
      - name: Build
        run: perl Makefile.PL && make
      - name: Test
        run: TEST_NATS_HOST=127.0.0.1 TEST_NATS_PORT=14222 make test

  # FreeBSD coverage is provided by CPANTesters once the dist is on CPAN.
  # We previously had a vmactions/freebsd-vm job here but it consistently
  # hung in the action's cleanup phase even after tests passed.

  tls:
    runs-on: ubuntu-latest
    name: Linux / TLS + NKey
    steps:
      - uses: actions/checkout@v4
      - uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: '5.40'
      - name: Install nats-server
        run: |
          curl -fsSL https://github.com/nats-io/nats-server/releases/download/v2.10.24/nats-server-v2.10.24-linux-amd64.tar.gz | tar xz
          sudo mv nats-server-v2.10.24-linux-amd64/nats-server /usr/local/bin/
      - name: Generate self-signed cert
        env:
          # setup-perl exports OPENSSL_CONF pointing at a Perl-bundled
          # path that the system openssl binary can't read; clear it.
          OPENSSL_CONF: /dev/null
        run: |
          openssl req -x509 -newkey rsa:2048 -nodes -days 1 \
            -subj "/CN=localhost" \
            -addext "subjectAltName=DNS:localhost,IP:127.0.0.1" \
            -keyout /tmp/server.key -out /tmp/server.pem
          cat > /tmp/nats-tls.conf <<EOF
          port: 14222
          host: 127.0.0.1
          tls {
            cert_file: "/tmp/server.pem"
            key_file:  "/tmp/server.key"
          }
          EOF
      - name: Start nats-server (TLS)
        run: |
          nats-server -c /tmp/nats-tls.conf --pid /tmp/nats.pid &
          for i in 1 2 3 4 5; do nc -z 127.0.0.1 14222 && exit 0; sleep 1; done
          echo "nats-server did not start" && exit 1
      - name: Install deps
        run: cpanm -n EV
      - name: Build
        run: perl Makefile.PL && make
      - name: Test (TLS-only suite)
        run: |
          NATS_TLS=1 NATS_CA_FILE=/tmp/server.pem \
          TEST_NATS_HOST=127.0.0.1 TEST_NATS_PORT=14222 \
          prove -bv xt/10_tls.t

  jetstream:
    runs-on: ubuntu-latest
    name: Linux / JetStream + KV + ObjectStore
    steps:
      - uses: actions/checkout@v4
      - uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: '5.40'
      - name: Install nats-server
        run: |
          curl -fsSL https://github.com/nats-io/nats-server/releases/download/v2.10.24/nats-server-v2.10.24-linux-amd64.tar.gz | tar xz
          sudo mv nats-server-v2.10.24-linux-amd64/nats-server /usr/local/bin/
      - name: Start nats-server (JetStream)
        run: |
          nats-server -p 14222 -a 127.0.0.1 --jetstream --store_dir /tmp/nats-js --pid /tmp/nats.pid &
          for i in 1 2 3 4 5; do nc -z 127.0.0.1 14222 && exit 0; sleep 1; done
          echo "nats-server did not start" && exit 1
      - name: Install deps
        run: cpanm -n EV
      - name: Build
        run: perl Makefile.PL && make
      - name: Test (JetStream + KV + watch + ack-flow suite)
        run: |
          TEST_NATS_HOST=127.0.0.1 TEST_NATS_PORT=14222 \
          prove -bv xt/11_jetstream.t xt/12_kv.t xt/13_object_store.t \
                    xt/16_kv_watch.t xt/18_js_ack_flow.t

  integration:
    runs-on: ubuntu-latest
    name: Linux / lame-duck + NKey + flush-disconnect
    steps:
      - uses: actions/checkout@v4
      - uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: '5.40'
      - name: Install nats-server
        run: |
          curl -fsSL https://github.com/nats-io/nats-server/releases/download/v2.10.24/nats-server-v2.10.24-linux-amd64.tar.gz | tar xz
          sudo mv nats-server-v2.10.24-linux-amd64/nats-server /usr/local/bin/
      - name: Install deps
        run: cpanm -n EV
      - name: Build
        run: perl Makefile.PL && make
      - name: Test (per-test nats-server lifecycle)
        run: |
          # These tests fork their own nats-server with custom configs;
          # they do NOT use TEST_NATS_HOST/TEST_NATS_PORT.
          prove -bv xt/14_lame_duck.t xt/15_nkey_auth.t xt/17_flush_disconnect.t

  release_pod:
    runs-on: ubuntu-latest
    name: Linux / release POD
    steps:
      - uses: actions/checkout@v4
      - uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: '5.40'
      - name: Install deps
        run: cpanm -n EV Test::Pod Test::Pod::Coverage
      - name: Build
        run: perl Makefile.PL && make
      - name: Test (release POD)
        run: RELEASE_TESTING=1 prove -bv xt/release_pod.t
