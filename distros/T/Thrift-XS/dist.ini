name = Thrift-XS
author = Andy Grundman <andy@hybridized.org>
main_module = lib/Thrift/XS.pm
license = Apache_2_0
copyright_holder = Andy Grundman <andy@hybridized.org>
copyright_year = 2011-2026

[Meta::Maintainers]
maintainer = Timothy Legge <timlegge@gmail.com>

[@Filter]
-bundle = @Basic
-remove = GatherDir
-remove = MakeMaker
-remove = Readme

[Prereqs / ConfigureRequires]
ExtUtils::MakeMaker = 0

[Prereqs / RuntimeRequires]
perl = 5.010
Bit::Vector = 0
Encode = 0
HTTP::Request = 0
IO::Select = 0
IO::Socket::INET = 0
IO::String = 0
LWP::UserAgent = 0
Thrift = 0.22.0

[Prereqs / TestRequires]
File::Spec = 0
FindBin = 0
Test::BinaryData = 0
Test::More = 0
Test::Perl::Critic = 0

[Prereqs / DevelopRequires]
Test::CPAN::Meta::JSON = 0.16
Test::Kwalitee = 1.21
Test::Pod = 1.41
Test::Spelling = 0.17

[Pod2Readme]

[ReadmeAnyFromPod / ReadmePodInRoot]
type = gfm
filename = README.md
location = root

[ExtraTests]

[PodSyntaxTests]

[Test::PodSpelling]
directories = .
stopword = Legge
stopword = Logitech
stopword = BufferedTransport
stopword = FramedTransport
stopword = HttpClient

[Test::Kwalitee]

[MetaJSON]

[Test::CPAN::Meta::JSON]

[CPANFile]

[NextRelease]
format = %v -- %{EEE MMM dd HH:mm:ss VVV yyyy}d
filename = Changes

[CopyFilesFromBuild::Filtered]
copy = Makefile.PL
copy = LICENSE
copy = cpanfile
copy = SECURITY.md

[MakeMaker::Awesome]
header_file = maint/Makefile_header.PL
WriteMakefile_arg = %args

[Repository]
git_remote = upstream

[Bugtracker]
web = https://github.com/andygrundman/thrift-xs

[Git::NextVersion]
first_version = 1.09        ; this is the default
version_by_branch = 0       ; this is the default
version_regexp  = ^(1.\d+)$ ; this is the default

[Test::Version]
filename_match = qr/XS\.pm$/

[Git::GatherDir]
exclude_filename = cpanfile
exclude_filename = Makefile.PL
exclude_filename = MANIFEST
exclude_filename = README.md
exclude_filename = LICENSE

[@Git]
changelog = Changes      ; this is the default
tag_format  = %V         ; Don't proceed tags with "v"
tag_message = %V         ; this is the default
push_to     = origin     ; see Git::Push

[SecurityPolicy]
-policy = Individual
maintainer = Timothy Legge <timlegge@gmail.com>
timeframe = 2 weeks

[Signature]
[SignReleaseNotes]
