name    = Type-Guess
author  = simone cesano <scesano@cpan.org>
license = Perl_5
copyright_holder = simone cesano
copyright_year   = 2025

version = 0.006

[GatherDir]
root = .   
exclude_match = ~$
exclude_match = skunk
exclude_match = \.tmp
exclude_match = foo
exclude_match = README.md
exclude_match = type_format

[@Filter]
-bundle = @Basic
-remove = GatherDir


[Prereqs]
Class::Method::Modifiers = 0
Module::Runtime = 0
Moo = 0
Moo::Role = 0
MooX::ClassAttribute = 0
Text::VisualPrintf = 0
Text::VisualWidth::PP = 0
Type::Tiny = 0
Types::Standard = 0
