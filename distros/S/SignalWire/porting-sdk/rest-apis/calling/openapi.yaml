      discriminator:
        propertyName: command
        mapping:
          dial: '#/components/schemas/CallCreateRequest'
          update: '#/components/schemas/CallUpdateCurrentCallRequest'
          calling.end: '#/components/schemas/CallHangupRequest'
          calling.ai_hold: '#/components/schemas/CallHoldRequest'
          calling.ai_unhold: '#/components/schemas/CallUnholdRequest'
          calling.ai_message: '#/components/schemas/CallAIMessageRequest'
          calling.live_transcribe: '#/components/schemas/CallLiveTranscribeRequest'
          calling.live_translate: '#/components/schemas/CallLiveTranslateRequest'
          calling.transfer: '#/components/schemas/CallTransferRequest'
          calling.user_event: '#/components/schemas/CallUserEventRequest'
          calling.disconnect: '#/components/schemas/CallDisconnectRequest'
          calling.play: '#/components/schemas/CallPlayRequest'
          calling.play.pause: '#/components/schemas/CallPlayPauseRequest'
          calling.play.resume: '#/components/schemas/CallPlayResumeRequest'
          calling.play.stop: '#/components/schemas/CallPlayStopRequest'
          calling.play.volume: '#/components/schemas/CallPlayVolumeRequest'
          calling.record: '#/components/schemas/CallRecordRequest'
          calling.record.pause: '#/components/schemas/CallRecordPauseRequest'
          calling.record.resume: '#/components/schemas/CallRecordResumeRequest'
          calling.record.stop: '#/components/schemas/CallRecordStopRequest'
          calling.collect: '#/components/schemas/CallCollectRequest'
          calling.collect.stop: '#/components/schemas/CallCollectStopRequest'
          calling.collect.start_input_timers: '#/components/schemas/CallCollectStartInputTimersRequest'
          calling.detect: '#/components/schemas/CallDetectRequest'
          calling.detect.stop: '#/components/schemas/CallDetectStopRequest'
          calling.tap: '#/components/schemas/CallTapRequest'
          calling.tap.stop: '#/components/schemas/CallTapStopRequest'
          calling.stream: '#/components/schemas/CallStreamRequest'
          calling.stream.stop: '#/components/schemas/CallStreamStopRequest'
          calling.denoise: '#/components/schemas/CallDenoiseRequest'
          calling.denoise.stop: '#/components/schemas/CallDenoiseStopRequest'
          calling.transcribe: '#/components/schemas/CallTranscribeRequest'
          calling.transcribe.stop: '#/components/schemas/CallTranscribeStopRequest'
          calling.ai.stop: '#/components/schemas/CallAIStopRequest'
          calling.send_fax.stop: '#/components/schemas/CallSendFaxStopRequest'
          calling.receive_fax.stop: '#/components/schemas/CallReceiveFaxStopRequest'
          calling.refer: '#/components/schemas/CallReferRequest'
      description: |-
        Call request union for JSON-RPC style method dispatch. Use the `command` field to specify which call method to invoke.
        All async-safe RELAY methods can be sent through this endpoint without a WebSocket connection.

        **Call Lifecycle:**
        - **`dial`** - Create and initiate a new outbound call to a destination.
        - **`update`** - Modify an active call's dialplan in real-time.
        - **`calling.end`** - Terminate an active call immediately.
        - **`calling.transfer`** - Transfer an active call to a new destination (SIP URI, phone number, or inline SWML).
        - **`calling.disconnect`** - Disconnect bridged calls without hanging up either leg.

        **Play:**
        - **`calling.play`** - Play audio, TTS, silence, or ringtone to a call.
        - **`calling.play.pause`** / **`calling.play.resume`** / **`calling.play.stop`** - Control active play.
        - **`calling.play.volume`** - Adjust play volume.

        **Record:**
        - **`calling.record`** - Start recording a call. Supports parallel recordings via multiple control_ids.
        - **`calling.record.pause`** / **`calling.record.resume`** / **`calling.record.stop`** - Control active recording.

        **Collect (Input):**
        - **`calling.collect`** - Collect DTMF or speech input.
        - **`calling.collect.stop`** - Stop active collection.
        - **`calling.collect.start_input_timers`** - Start input timers on active collect.

        **Detect:**
        - **`calling.detect`** - Start a detector (answering machine, fax, or digit).
        - **`calling.detect.stop`** - Stop active detector.

        **Tap:**
        - **`calling.tap`** - Tap call audio to RTP or WebSocket endpoint.
        - **`calling.tap.stop`** - Stop active tap.

        **Stream:**
        - **`calling.stream`** - Stream call audio to a WebSocket endpoint.
        - **`calling.stream.stop`** - Stop active stream.

        **Denoise:**
        - **`calling.denoise`** - Start noise reduction on a call.
        - **`calling.denoise.stop`** - Stop noise reduction.

        **Transcribe:**
        - **`calling.transcribe`** - Start call transcription (creates a shadow recording).
        - **`calling.transcribe.stop`** - Stop active transcription.

        **AI:**
        - **`calling.ai_hold`** - Place an AI call on hold.
        - **`calling.ai_unhold`** - Resume an AI call from hold.
        - **`calling.ai_message`** - Inject a message into an active AI conversation.
        - **`calling.ai.stop`** - Stop an active AI session.

        **Live Transcribe / Translate:**
        - **`calling.live_transcribe`** - Start/stop/summarize real-time transcription.
        - **`calling.live_translate`** - Start/stop/summarize/inject real-time translation.

        **Fax:**
        - **`calling.send_fax.stop`** - Stop active fax send.
        - **`calling.receive_fax.stop`** - Stop active fax receive.

        **SIP:**
        - **`calling.refer`** - Transfer a SIP call via SIP REFER.

        **Custom Events:**
        - **`calling.user_event`** - Fire a custom user event on the call.
