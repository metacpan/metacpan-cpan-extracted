##
# RULE: R06-vapour-sd
# AGENT: CobIntro::Agent::Domain  (pos. 2 / 4)
# CORPUS: §4.2 — BS 5250 / BS EN ISO 13788 — Minimum Sd value by service class
#
# PURPOSE
#   Checks that the Sd value of the vapour control layer meets the minimum
#   required for the declared service class (§4.2).
#   Only applies to elements of type 'vapour_control_layer'.
#
# INPUTS  (slots read)
#   needs_domain   : targeting slot — set by Qualification R04
#   type_element   : must be 'vapour_control_layer'
#   vcl_sd_value   : float — Sd value in metres
#   service_class  : int — 1 (dry), 2 (humid), 3 (very humid)
#
# OUTPUTS (slots written)
#   frame_ok     : 'NO' — element rejected if Sd < Sd_min
#   domain_note  : description of the failure
#   needs_domain : deleted after rejection
#
# HELPERS
#   vcl_sd_min($service_class) → $sd_min (m)
#
# GUARD — EXCEPTION: defined $f->{frame_ok}
#   Idempotence — prevents re-processing an already-processed Frame.
##
RULE: R06-vapour-sd
FIND:
  f:
    attribut: needs_domain
EXCEPTION: defined $f->{frame_ok}
CONDITION: "($f->{type_element}//'') eq 'vapour_control_layer' && defined $f->{vcl_sd_value} && defined $f->{service_class}"
ACTION: |
  # §4.2 — Sd must be >= minimum for declared service class
  my $sd_min = vcl_sd_min($f->{service_class});

  if ($f->{vcl_sd_value} < $sd_min) {
    $f->set('frame_ok', 'NO');
    $f->set('domain_note',
      sprintf("VCL Sd = %.1f m < Sd_min = %.0f m (service class %d §4.2)",
        $f->{vcl_sd_value}, $sd_min, $f->{service_class}));
    $f->set('needs_fire', 1);   # propagate to Fire even on domain rejection
    $f->delete('needs_domain');
    return 1;
  }
  1
