name             = Crypt-SaltedHash
main_module      = lib/Crypt/SaltedHash.pm
author           = Robert Rothenberg <perl@rhizomnic.com>
license          = Perl_5
copyright_holder = Sascha Kiefer <perl@intertivityNOSP4M.com>
copyright_year   = 2005-2006, 2010, 2013, 2026

[Meta::Contributors]

[Deprecated]
all = 1

[GatherDir]
exclude_match = cpanfile*
exclude_filename = LICENSE
exclude_filename = README
;;exclude_filename = SECURITY.md
exclude_filename = doap.xml

[PruneCruft]
[ManifestSkip]

[CPANFile]
[License]
[DOAP]
[ExecDir]
[ShareDir]
[MakeMaker]
[Manifest]
[TestRelease]
[CheckExtraTests]
[ConfirmRelease]
[UploadToCPAN]

[CopyFilesFromBuild]
copy = LICENSE
;; copy = README
;;copy = SECURITY.md
copy = cpanfile
copy = doap.xml

[@Git]
allow_dirty = dist.ini
push_to     = origin master:master
tag_format  = %v
commit_msg  = %v%n%n%c

[GitHub::Meta]
repo = git://github.com/robrwo/perl-Crypt-SaltedHash.git
fork = 0

[MetaResources]
x_authority    = cpan:RRWO
bugtracker.web = http://rt.cpan.org/Public/Dist/Display.html?Name=Crypt-SaltedHash

[MetaProvides::Package]
[MetaYAML]
[MetaJSON]

[Git::Contributors]
:version = 0.019

[RewriteVersion]
[NextRelease]
[BumpVersionAfterRelease]

[Git::Commit / Commit_Changes] ; commit Changes (for new dev)
allow_dirty_match = ^lib/
commit_msg = Commit Changes and bump $VERSION

[UsefulReadme]
type     = text
filename = README
location = build
section  = name
section  = synopsis
section  = status
section  = description
section  = author
section  = copyright and license

[RecommendedPrereqs]
[AutoPrereqs]

[Test::ReportPrereqs]
:version = 0.022
version_extractor = Module::Metadata
verify_prereqs = 1

[PodSyntaxTests]
[Test::DistManifest]
; authordep Test::DistManifest
[Test::CleanNamespaces]
; authordep Test::CleanNamespaces
[Test::EOF]
; authordep Test::EOF
; [Test::EOL]
; :version = 0.14
[Test::Fixme]
[Test::MinimumVersion]
[Test::NoTabs]
