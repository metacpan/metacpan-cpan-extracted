name    = Langertha-Skeid
author  = Torsten Raudssus <torsten@raudssus.de> L<https://raudssus.de/>
license = Perl_5
copyright_holder = Torsten Raudssus
copyright_year   = 2026

; Getty release command:
;   dzil release
; Optional Docker overrides during release:
;   SKEID_DOCKER_BUILD_ARGS='--build-arg LANGERTHA_SRC=https://github.com/Getty/langertha/releases/download/0.307/Langertha-0.307.tar.gz --build-arg KNARR_SRC=https://github.com/Getty/langertha-knarr/releases/download/0.007/Langertha-Knarr-0.007.tar.gz' dzil release
; Fallback without GitHub release assets:
;   SKEID_DOCKER_BUILD_ARGS='--build-arg LANGERTHA_SRC=GETTY/Langertha-0.307.tar.gz --build-arg KNARR_SRC=GETTY/Langertha-Knarr-0.007.tar.gz' dzil release
; Note: do not use GitHub source archives (/archive/refs/*) for dzil dists.

[@Author::GETTY]
run_after_release = ${GH_BIN:-gh} release view %v -R Getty/langertha-skeid >/dev/null 2>&1 || ${GH_BIN:-gh} release create %v -R Getty/langertha-skeid --title %v --notes 'Dist::Zilla release'
run_after_release = ${GH_BIN:-gh} release upload %v -R Getty/langertha-skeid Langertha-Skeid-%v.tar.gz --clobber
run_after_release = docker build ${SKEID_DOCKER_BUILD_ARGS:-} -t raudssus/langertha-skeid:%v -t raudssus/langertha-skeid:latest -t raudssus/langertha-skeid:$(echo %v | cut -d. -f1) %d
run_after_release = docker push raudssus/langertha-skeid:%v
run_after_release = docker push raudssus/langertha-skeid:$(echo %v | cut -d. -f1)
run_after_release = docker push raudssus/langertha-skeid:latest
