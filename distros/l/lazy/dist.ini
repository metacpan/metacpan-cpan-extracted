name    = lazy
author  = Olaf Alders <olaf@wundercounter.com>
license = Artistic_2_0
copyright_holder = MaxMind, Inc.
copyright_year   = 2017

[@Author::OALDERS]
-remove = Test::Mojibake
-remove = Test::Synopsis
-remove = MojibakeTests
-remove = Test::TidyAll
Test::Portability.options = test_one_dot = 0

[Prereqs]
local::lib = 2.000024

; App::cpm v0.999.0 (released 2026-03-13) raised its minimum supported Perl
; to v5.24 per the Lyon Amendment, and v1.0.0 (2026-04-26) made that the
; stable line. The 0.998000–0.999.x series also has a broken static-install
; path that breaks t/local-install-via-args.t. The last cpm release that
; both installs on Perl < 5.24 *and* drives the static-install path
; correctly is 0.997017, which also happens to be our minimum. Cap at
; 0.997017 on older Perls (GH#36).
[DynamicPrereqs]
-condition = "$]" < 5.024
-body = requires('App::cpm', '<= 0.997017');

[Prereqs / DevelopRequires]
App::perlimports = 0.000058
Perl::Critic = 1.132
Perl::Tidy = 20170521

[RemovePrereqs]
remove = Code::TidyAll
remove = Code::TidyAll::Plugin::SortLines::Naturally
remove = Code::TidyAll::Plugin::Test::Vars
remove = Code::TidyAll::Plugin::UniqueLines
remove = Parallel::ForkManager
remove = Test::Vars

[Prereqs / TestRequires]
LWP = 6.35

[Encoding]
encoding = bytes
match = .gz$

[StaticInstall]
mode = auto
