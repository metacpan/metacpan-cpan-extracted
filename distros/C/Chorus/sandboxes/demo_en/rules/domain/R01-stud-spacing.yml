##
# RULE: R01-stud-spacing
# AGENT: CobIntro::Agent::Domain  (pos. 2 / 4)
# CORPUS: §3.1 — BS EN 1995-1-1 §5.1 — Stud centre-to-centre spacing [300, 600] mm
#
# PURPOSE
#   Checks that the stud centre-to-centre spacing is within [300, 600] mm
#   for all stud element types. Non-stud elements are skipped silently.
#
# INPUTS  (slots read)
#   needs_domain     : targeting slot — set by Qualification R04
#   type_element     : element type — must match /stud/
#   stud_spacing_mm  : float — centre-to-centre spacing in mm
#
# OUTPUTS (slots written)
#   frame_ok     : 'NO' — element rejected if spacing out of range
#   domain_note  : description of the failure
#   needs_domain : deleted after rejection
#
# GUARD — EXCEPTION: defined $f->{frame_ok}
#   Idempotence — prevents re-processing a Frame already handled.
##
RULE: R01-stud-spacing
FIND:
  f:
    attribut: needs_domain
EXCEPTION: defined $f->{frame_ok}
CONDITION: "($f->{type_element}//'') =~ /stud/ && defined $f->{stud_spacing_mm}"
ACTION: |
  my $sp = $f->{stud_spacing_mm};

  # §3.1 — spacing must be in [300, 600] mm
  if ($sp < 300 || $sp > 600) {
    $f->set('frame_ok', 'NO');
    $f->set('domain_note',
      "Stud spacing ${sp} mm outside [300, 600] mm (§3.1 BS EN 1995-1-1 §5.1)");
    $f->set('needs_fire', 1);   # propagate to Fire even on domain rejection
    $f->delete('needs_domain');
    return 1;
  }
  1
