    ConferenceRoom:
      type: object
      required:
        - id
        - name
        - description
        - display_name
        - max_members
        - quality
        - fps
        - join_from
        - join_until
        - remove_at
        - remove_after_seconds_elapsed
        - layout
        - record_on_start
        - tone_on_entry_and_exit
