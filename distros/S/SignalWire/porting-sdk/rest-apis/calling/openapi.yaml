            vad_thresh:
              type: integer
              format: int32
              description: Voice activity detection threshold (0-1800).
              examples:
                - 400
              default: 400
            debug_level:
              type: integer
              format: int32
              description: Debug level for logging (0-2).
              examples:
                - 0
              default: 0
          required:
            - lang
            - direction
          description: Starts live transcription of the call.
      title: start Action
    LiveTranscribeStopAction:
      type: string
      enum:
        - stop
      description: Stops the live transcription session.
      title: stop Action
    LiveTranscribeSummarizeAction:
      type: object
      required:
        - summarize
      properties:
        summarize:
          type: object
          properties:
            webhook:
              type: string
              description: The webhook URL to receive the summary.
              examples:
                - https://example.com/webhook
            prompt:
              type: string
              description: The AI prompt that instructs how to summarize the conversation.
              examples:
                - Provide a bullet-point summary of the main topics discussed.
          description: Request an on-demand AI summary of the conversation.
      title: summarize Action
    LiveTranslate:
      type: object
      required:
        - live_translate
      properties:
        live_translate:
          type: object
          properties:
            action:
              allOf:
                - $ref: '#/components/schemas/TranslateAction'
              description: The action to perform during live translation.
          required:
            - action
          description: Start live translation of the call. The translation will be sent to the specified webhook URL.
          title: live_translate
      title: live_translate Method
    LiveTranslateInjectAction:
      type: object
      required:
        - inject
      properties:
        inject:
          type: object
          properties:
            message:
              type: string
              description: The text message to inject and translate.
              examples:
                - Please hold while I transfer you to a specialist.
            direction:
              allOf:
                - $ref: '#/components/schemas/TranscribeDirection'
              description: The direction to send the translated message.
              examples:
                - remote-caller
          required:
            - message
            - direction
          description: Inject a message into the conversation to be translated and spoken.
      title: inject Action
    LiveTranslateStartAction:
      type: object
      required:
        - start
      properties:
        start:
          type: object
          properties:
            from_lang:
              type: string
              description: The language to translate from (e.g., 'en-US').
              examples:
                - en-US
            to_lang:
              type: string
              description: The language to translate to (e.g., 'es-ES').
              examples:
                - es-ES
            direction:
              type: array
              items:
                $ref: '#/components/schemas/TranscribeDirection'
              description: The direction(s) of the call to translate.
              examples:
                - - local-caller
                  - remote-caller
            from_voice:
              type: string
              description: The TTS voice for the source language.
              examples:
                - elevenlabs.josh
            to_voice:
              type: string
              description: The TTS voice for the target language.
              examples:
                - elevenlabs.josh
            filter_from:
              anyOf:
                - $ref: '#/components/schemas/TranslationFilterPreset'
                - $ref: '#/components/schemas/CustomTranslationFilter'
              description: Translation filter for the source language direction.
              examples:
                - professional
            filter_to:
              anyOf:
                - $ref: '#/components/schemas/TranslationFilterPreset'
                - $ref: '#/components/schemas/CustomTranslationFilter'
              description: Translation filter for the target language direction.
              examples:
                - professional
            webhook:
              type: string
              description: The webhook URL to receive translation events.
              examples:
                - https://example.com/webhook
            live_events:
              type: boolean
              description: Whether to send real-time translation events.
              examples:
                - true
            ai_summary:
              type: boolean
              description: Whether to generate AI summaries in both languages when translation ends.
              examples:
                - true
            ai_summary_prompt:
              type: string
              description: The AI prompt that instructs how to summarize the conversation when `ai_summary` is enabled.
              examples:
                - Summarize this translated conversation.
            speech_engine:
              allOf:
                - $ref: '#/components/schemas/SpeechEngine'
              description: The speech recognition engine to use.
              examples:
                - deepgram
              default: deepgram
            speech_timeout:
              type: integer
              format: int32
              description: Speech timeout in milliseconds.
              examples:
                - 60000
              default: 60000
            vad_silence_ms:
              type: integer
              format: int32
              description: 'Voice activity detection silence time in milliseconds. Default depends on speech engine: `300` for Deepgram, `500` for Google.'
              examples:
                - 300
            vad_thresh:
              type: integer
              format: int32
              description: Voice activity detection threshold (0-1800).
              examples:
                - 400
              default: 400
            debug_level:
              type: integer
              format: int32
              description: Debug level for logging (0-2).
              examples:
                - 0
              default: 0
          required:
            - from_lang
            - to_lang
            - direction
          description: Starts live translation of the call.
      title: start Action
    LiveTranslateStopAction:
      type: string
      enum:
        - stop
      description: Stops the live translation session.
      title: stop Action
    LiveTranslateSummarizeAction:
      type: object
      required:
        - summarize
      properties:
        summarize:
          type: object
          properties:
            webhook:
              type: string
              description: The webhook URL to receive the summary.
              examples:
                - https://example.com/webhook
            prompt:
              type: string
              description: The AI prompt that instructs how to summarize the conversation.
              examples:
                - Summarize the key agreements reached in both languages.
          description: Request an on-demand AI summary of the translated conversation.
      title: summarize Action
    NullProperty:
      type: object
      required:
        - type
        - description
      properties:
        type:
          type: string
          enum:
            - 'null'
          description: The type of parameter(s) the AI is passing to the function.
        description:
          type: string
          description: A description of the property.
          examples:
            - Property Description
      title: Null Function Property
    NumberProperty:
      type: object
      required:
        - type
      properties:
        description:
          type: string
          description: A description of the property.
          examples:
            - Property description
        nullable:
          anyOf:
            - type: boolean
            - $ref: '#/components/schemas/SWMLVar'
          description: Whether the property can be null.
          examples:
            - false
        type:
          type: string
          enum:
            - number
          description: The type of parameter(s) the AI is passing to the function.
        enum:
          anyOf:
            - type: array
              items:
                anyOf:
                  - type: integer
                  - type: number
            - type: array
              items:
                $ref: '#/components/schemas/SWMLVar'
          description: An array of integers that are the possible values
          examples:
            - - 1
              - 2
              - 3
        default:
          anyOf:
            - type: integer
            - type: number
            - $ref: '#/components/schemas/SWMLVar'
          description: The default integer value
          examples:
            - 3
      description: Base interface for all property types
      title: Number Function Property
    ObjectProperty:
      type: object
      required:
        - type
      properties:
        description:
          type: string
          description: A description of the property.
          examples:
            - Property description
        nullable:
          anyOf:
            - type: boolean
            - $ref: '#/components/schemas/SWMLVar'
          description: Whether the property can be null.
          examples:
            - false
        type:
          type: string
          enum:
            - object
          description: The type of parameter(s) the AI is passing to the function.
        default:
          type: object
          unevaluatedProperties: {}
          description: The default object value
          examples:
            - key1: value1
              key2: 42
        properties:
          type: object
          unevaluatedProperties:
            $ref: '#/components/schemas/SchemaType'
          description: Nested properties
        required:
          type: array
          items:
            type: string
          description: Required property names
          examples:
            - - name1
              - name2
      description: Base interface for all property types
      title: Object Function Property
    OneOfProperty:
      type: object
      required:
        - oneOf
      properties:
        oneOf:
          type: array
          items:
            $ref: '#/components/schemas/SchemaType'
          description: An array of schemas where exactly one of the schemas must be valid.
      title: oneOf Property
    Output:
      type: object
      required:
        - response
      properties:
        response:
          type: string
          description: A static response text or message returned to the AI agent's context.
          examples:
            - Order placed
        action:
          type: array
          items:
            $ref: '#/components/schemas/Action'
          description: A list of actions to be performed upon matching.
      title: Output object
    POM:
      anyOf:
        - $ref: '#/components/schemas/PomSectionBodyContent'
        - $ref: '#/components/schemas/PomSectionBulletsContent'
      description: Regular section that requires either body or bullets.
    Pay:
      type: object
      required:
        - pay
      properties:
        pay:
          type: object
          properties:
            payment_connector_url:
              type: string
              format: uri
              description: |-
                The URL to make POST requests with all the gathered payment details.
                This URL is used to process the final payment transaction and return the results through the response.

                Visit https://signalwire.com/docs/swml/methods/pay/payment_connector_url for more important information.
              examples:
                - https://example.com/payment-connector
            charge_amount:
              type: string
              description: The amount to charge against payment method passed in the request. `Float` value with no currency prefix passed as string.
              examples:
                - '29.99'
            currency:
              type: string
              description: Uses the ISO 4217 currency code of the charge amount.
              examples:
                - usd
              default: usd
            description:
              type: string
              description: Custom description of the payment provided in the request.
              examples:
                - Monthly subscription payment
            input:
              type: string
              enum:
                - dtmf
              description: The method of how to collect the payment details. Currently only `dtmf` mode is supported.
              examples:
                - dtmf
              default: dtmf
            language:
              type: string
              description: Language to use for prompts being played to the caller by the `pay` method.
              examples:
                - en-US
              default: en-US
            max_attempts:
              anyOf:
                - type: integer
                - $ref: '#/components/schemas/SWMLVar'
              description: Number of times the `pay` method will retry to collect payment details.
              examples:
                - 3
              default: 1
            min_postal_code_length:
              anyOf:
                - type: integer
                - $ref: '#/components/schemas/SWMLVar'
              description: The minimum length of the postal code the user must enter.
              examples:
                - 5
              default: 0
            parameters:
              type: array
              items:
                $ref: '#/components/schemas/PayParameters'
              description: Array of parameter objects to pass to your payment processor. The parameters are user-defined key-value pairs.
            payment_method:
              type: string
              enum:
                - credit-card
              description: Indicates the payment method which is going to be used in this payment request. Currently only `credit-card` is supported.
              examples:
                - credit-card
            postal_code:
              anyOf:
                - type: boolean
                - type: string
              description: Takes `true`, `false` or real postalcode (if it's known beforehand) to let pay method know whether to prompt for postal code. Default is `true`.
              examples:
                - true
              default: true
            prompts:
              type: array
              items:
                $ref: '#/components/schemas/PayPrompts'
              description: Array of prompt objects for customizing the audio prompts during different stages of the payment process.
            security_code:
              anyOf:
                - type: boolean
                - $ref: '#/components/schemas/SWMLVar'
              description: Takes true or false to let pay method know whether to prompt for security code.
              examples:
                - true
              default: true
            status_url:
              type: string
              format: uri
              description: |-
                The URL to send requests for each status change during the payment process.

                See https://signalwire.com/docs/swml/methods/pay#status_url_request_body for more important information.
              examples:
                - https://example.com/payment-status
            timeout:
              anyOf:
                - type: integer
                - $ref: '#/components/schemas/SWMLVar'
              description: Limit in seconds that pay method waits for the caller to press another digit before moving on to validate the digits captured.
              examples:
                - 5
              default: 5
            token_type:
              type: string
              enum:
                - one-time
                - reusable
              description: |-
                Whether the payment is a one off payment or re-occurring.

                Allowed values:
                - `one-time`
                - `reusable`
              examples:
                - one-time
              default: reusable
            valid_card_types:
              type: string
              description: |-
                List of payment cards allowed to use in the requested payment process separated by space.

                Allowed values:
                - `visa`
                - `mastercard`
                - `amex`
                - `maestro`
                - `discover`
                - `jcb`
                - `diners-club`
              examples:
                - visa mastercard amex
              default: visa mastercard amex
            voice:
              type: string
              description: Text-to-speech voice to use. Please refer to https://signalwire.com/docs/voice/getting-started/voice-and-languages for more information.
              examples:
                - woman
              default: woman
          required:
            - payment_connector_url
          description: |-
            Enables secure payment processing during voice calls. When implemented, it manages the entire payment flow
            including data collection, validation, and processing through your configured payment gateway.
      title: pay Method
    PayParameters:
      type: object
      required:
        - name
        - value
      properties:
        name:
          type: string
          description: The identifier for your custom parameter. This will be the key in the parameters object.
          examples:
            - merchant_id
        value:
          type: string
          description: The value associated with the parameter. This will be the value in the parameters object.
          examples:
            - '12345'
    PayPromptAction:
      anyOf:
        - $ref: '#/components/schemas/PayPromptSayAction'
        - $ref: '#/components/schemas/PayPromptPlayAction'
    PayPromptPlayAction:
      type: object
      required:
        - type
        - phrase
      properties:
        type:
          type: string
          enum:
            - Play
          description: When the action `type` is `Say`, this value is the text to be spoken; when the type is `Play`, it should be a URL to the audio file.
        phrase:
          type: string
          format: uri
          pattern: ^(http|https)://
          description: The URL of the audio file to play
          examples:
            - https://example.com/audio/enter-card-number.mp3
    PayPromptSayAction:
      type: object
      required:
        - type
        - phrase
      properties:
        type:
          type: string
          enum:
            - Say
          description: When the action `type` is `Say`, this value is the text to be spoken; when the type is `Play`, it should be a URL to the audio file.
        phrase:
          type: string
          description: The phrase to speak
          examples:
            - Please enter your 16-digit card number.
    PayPrompts:
      type: object
      required:
        - actions
        - for
      properties:
        actions:
          type: array
          items:
            $ref: '#/components/schemas/PayPromptAction'
          description: Array of action objects to execute for this prompt. These actions can either play an audio file or speak a phrase.
        for:
          type: string
          description: |-
            The payment step this prompt is for. See Payment Steps for a list of available steps.

            - `payment-card-number`: Collect the payment card number.
            - `expiration-date`: Collect the payment card expiration date.
            - `security-code`: Collect the payment card security code.
            - `postal-code`: Collect the payment card postal code.
            - `payment-processing`: The step used during the payment processing.
            - `payment-completed`: The step used when the payment is completed.
            - `payment-failed`: The step used when the payment fails.
            - `payment-cancelled`: The step used when the payment is cancelled.
          examples:
            - payment-card-number
        attempts:
          type: string
          description: |-
            Specifies which payment attempt(s) this prompt applies to. The value increments when a payment fails.
             Use a single number (e.g., "1") or space-separated numbers (e.g., "2 3") to target the specific attempts.
          examples:
            - 1 2
        card_type:
          type: string
          description: |-
            Space-seperated list of card types that are allowed to be used for this prompt.

            Supported card types:
                - `visa`
                - `mastercard`
                - `amex`
                - `maestro`
                - `discover`
                - `optima`
                - `jcb`
                - `diners-club`
          examples:
            - visa mastercard amex
        error_type:
          type: string
          description: |-
            Space-separated list of error types this prompt applies to.

            Available error types:
                - `timeout` - User input timeout
                - `invalid-card-number` - Failed card validation
                - `invalid-card-type` - Unsupported card type
                - `invalid-date` - Invalid expiration date
                - `invalid-security-code` - Invalid CVV format
                - `invalid-postal-code` - Invalid postal code format
                - `invalid-bank-routing-number` - Invalid bank routing number
                - `invalid-bank-account-number` - Invalid bank account number
                - `input-matching-failed` - Input matching failed
                - `session-in-progress` - Concurrent session attempt
                - `card-declined` - Payment declined
          examples:
            - timeout invalid-card-number
    Play:
      type: object
      required:
        - play
      properties:
        play:
          anyOf:
            - $ref: '#/components/schemas/PlayWithURL'
            - $ref: '#/components/schemas/PlayWithURLS'
          description: Play file(s), ringtones, speech or silence.
          title: play
      title: play Method
    PlayWithURL:
      type: object
      required:
        - url
      properties:
        auto_answer:
          anyOf:
            - type: boolean
            - $ref: '#/components/schemas/SWMLVar'
          description: If `true`, the call will automatically answer as the sound is playing. If `false`, you will start playing the audio during early media. Default `true`.
          examples:
            - true
          default: true
        volume:
          anyOf:
            - type: number
            - $ref: '#/components/schemas/SWMLVar'
          minimum: -40
          maximum: 40
          description: |-
            Volume level for the audio file.
            Default is `0`.
            Valid range is -40 to 40.
          examples:
            - 10
          default: 0
        say_voice:
          type: string
          description: The voice to use for the text to speech.
          examples:
            - Polly.Joanna
          default: Polly.Salli
        say_language:
          type: string
          description: The language to use for the text to speech.
          examples:
            - en-US
          default: en-US
        say_gender:
          type: string
          description: Gender to use for the text to speech.
          examples:
            - female
          default: female
        status_url:
          type: string
          format: uri
          description: http or https URL to deliver play status events
          examples:
            - https://example.com/play-status
        url:
          anyOf:
            - $ref: '#/components/schemas/play_url'
            - $ref: '#/components/schemas/SWMLVar'
          description: |-
            URL to play.
            Required if `urls` is not present.
            Allowed URLs are:
                - http:// or https:// - audio file to GET
                - ring:[duration:]<country code> - ring tone to play. For example: ring:us to play single ring or ring:20.0:us to play ring for 20 seconds.
                - say:<text to speak> - Sentence to say
                - silence: <duration> - seconds of silence to play
          examples:
            - https://example.com/welcome.mp3
      description: Play with a single URL
      title: Single URL
    PlayWithURLS:
      type: object
      required:
        - urls
      properties:
        auto_answer:
          anyOf:
            - type: boolean
            - $ref: '#/components/schemas/SWMLVar'
          description: If `true`, the call will automatically answer as the sound is playing. If `false`, you will start playing the audio during early media. Default `true`.
          examples:
            - true
          default: true
        volume:
          anyOf:
            - type: number
            - $ref: '#/components/schemas/SWMLVar'
          minimum: -40
          maximum: 40
          description: |-
            Volume level for the audio file.
            Default is `0`.
            Valid range is -40 to 40.
          examples:
            - 10
          default: 0
        say_voice:
          type: string
          description: The voice to use for the text to speech.
          examples:
            - Polly.Joanna
          default: Polly.Salli
        say_language:
          type: string
          description: The language to use for the text to speech.
          examples:
            - en-US
          default: en-US
        say_gender:
          type: string
          description: Gender to use for the text to speech.
          examples:
            - female
          default: female
        status_url:
          type: string
          format: uri
          description: http or https URL to deliver play status events
          examples:
            - https://example.com/play-status
        urls:
          anyOf:
            - type: array
              items:
                $ref: '#/components/schemas/play_url'
            - type: array
              items:
                $ref: '#/components/schemas/SWMLVar'
          description: |-
            Array of URLs to play.
            Required if `url` is not present.
            Allowed URLs are:
                - http:// or https:// - audio file to GET
                - ring:[duration:]<country code> - ring tone to play. For example: ring:us to play single ring or ring:20.0:us to play ring for 20 seconds.
                - say:<text to speak> - Sentence to say
                - silence: <duration> - seconds of silence to play
          examples:
            - - https://example.com/intro.mp3
              - say:Welcome to our service
              - silence:2
      title: Multiple URLs
    PlaybackBGAction:
      type: object
      required:
        - playback_bg
      properties:
        playback_bg:
          type: object
          properties:
            file:
              type: string
              format: uri
              description: URL or filepath of the audio file to play.
              examples:
                - https://cdn.signalwire.com/default-music/welcome.mp3
            wait:
              anyOf:
                - type: boolean
                - $ref: '#/components/schemas/SWMLVar'
              description: Whether to wait for the audio file to finish playing before continuing. Default is `false`.
              examples:
                - true
          required:
            - file
          description: A JSON object containing the audio file to play.
          title: playback_bg
      title: playback_bg Action
    PomSectionBodyContent:
      type: object
      required:
        - body
      properties:
        title:
          type: string
          minLength: 1
          description: Title for the section
          examples:
            - Customer Service Guidelines
        subsections:
          minItems: 1
          description: Optional array of nested subsections
          type: array
          items:
            $ref: '#/components/schemas/POM'
        numbered:
          anyOf:
            - type: boolean
            - $ref: '#/components/schemas/SWMLVar'
          description: Whether to number the section
          examples:
            - true
        numberedBullets:
          anyOf:
            - type: boolean
            - $ref: '#/components/schemas/SWMLVar'
          description: Whether to number the bullets
          examples:
            - false
        body:
          type: string
          description: Body text for the section
          examples:
            - Welcome customers warmly and assist them with their inquiries.
        bullets:
          type: array
          items:
            type: string
          minItems: 1
          description: Optional array of bullet points
          examples:
            - - Be polite and professional
              - Listen actively to customer concerns
              - Provide accurate information
      description: Content model with body text and optional bullets
      title: Section with Body
    PomSectionBulletsContent:
      type: object
      required:
        - bullets
      properties:
        title:
          type: string
          minLength: 1
          description: Title for the section
          examples:
            - Customer Service Guidelines
        subsections:
          minItems: 1
          description: Optional array of nested subsections
          type: array
          items:
            $ref: '#/components/schemas/POM'
        numbered:
          anyOf:
            - type: boolean
            - $ref: '#/components/schemas/SWMLVar'
          description: Whether to number the section
          examples:
            - true
        numberedBullets:
          anyOf:
            - type: boolean
            - $ref: '#/components/schemas/SWMLVar'
          description: Whether to number the bullets
          examples:
            - false
        body:
          type: string
          description: Body text for the section (optional)
          examples:
            - 'Follow these steps when handling customer complaints:'
        bullets:
          type: array
          items:
            type: string
          minItems: 1
          description: Array of bullet points
          examples:
            - - Acknowledge the issue
              - Apologize for any inconvenience
              - Offer a resolution
      description: Content model with bullets and optional body
      title: Section with Bullets
    Prompt:
      type: object
      required:
        - prompt
      properties:
        prompt:
          type: object
          properties:
            play:
              anyOf:
                - $ref: '#/components/schemas/play_url'
                - type: array
                  items:
                    $ref: '#/components/schemas/play_url'
                - $ref: '#/components/schemas/SWMLVar'
                - type: array
                  items:
                    $ref: '#/components/schemas/SWMLVar'
              description: |-
                URL or array of URLs to play.
                Allowed URLs are:
                    http:// or https:// - audio file to GET
                    ring:[duration:]<country code> - ring tone to play. For example: ring:us to play single ring or ring:20.0:us to play ring for 20 seconds.
                    say:<text to speak> - Sentence to say
                    silence: <duration> - seconds of silence to play
              examples:
                - say:Please press 1 for sales or 2 for support
            volume:
              type: number
              minimum: -40
              maximum: 40
              description: |-
                Volume level for the audio file.
                Default is `0`.
                Valid range is -40 to 40.
              examples:
                - 0
              default: 0
            say_voice:
              type: string
              description: The voice to use for the text to speech.
              examples:
                - Polly.Joanna
              default: Polly.Salli
            say_language:
              type: string
              description: The language to use for the text to speech.
              examples:
                - en-US
              default: en-US
            say_gender:
              type: string
              description: The gender to use for the text to speech.
              examples:
                - female
              default: female
            max_digits:
              anyOf:
                - type: integer
                - $ref: '#/components/schemas/SWMLVar'
              description: |-
                Number of digits to collect.
                Default is `1`.
              examples:
                - 4
              default: 1
            terminators:
              type: string
              description: |-
                Digits that terminate digit collection.
                Default is not set.
              examples:
                - '#'
            digit_timeout:
              anyOf:
                - type: number
                - $ref: '#/components/schemas/SWMLVar'
              description: |-
                Time in seconds to wait for next digit.
                Default is `5.0` seconds.
              examples:
                - 5
              default: 5
            initial_timeout:
              anyOf:
                - type: number
                - $ref: '#/components/schemas/SWMLVar'
              description: |-
                Time in seconds to wait for start of input.
                Default is `5.0` seconds.
              examples:
                - 10
              default: 5
            speech_timeout:
              anyOf:
                - type: number
                - $ref: '#/components/schemas/SWMLVar'
              description: Max time in seconds to wait for speech result.
              examples:
                - 15
            speech_end_timeout:
              anyOf:
                - type: number
                - $ref: '#/components/schemas/SWMLVar'
              description: Time in seconds to wait for end of speech utterance.
              examples:
                - 2
            speech_language:
              type: string
              description: Language to detect speech in.
              examples:
                - en-US
            speech_hints:
              anyOf:
                - type: array
                  items:
                    type: string
                - type: array
                  items:
                    $ref: '#/components/schemas/SWMLVar'
              description: Expected words or phrases to help the speech recognition.
              examples:
                - - sales
                  - support
                  - billing
            speech_engine:
              type: string
              description: |-
                The engine that is selected for speech recognition. The engine must support the specified language.
                [Deepgram|Google| etc...] Default is not set (SignalWire picks the engine).
              examples:
                - Deepgram
            status_url:
              type: string
              format: uri
              description: http or https URL to deliver prompt status events
              examples:
                - https://example.com/prompt-status
          required:
            - play
          description: |-
            Play a prompt and wait for input. The input can be received either as digits from the keypad,
            or from speech, or both depending on what parameters are set.
            By default, only digit input is enabled. To enable speech input, set at least one speech parameter.
            To enable both digit and speech input, set at least one parameter for each.
          title: prompt
      title: prompt Method
    Pronounce:
      type: object
      required:
        - replace
        - with
      properties:
        replace:
          type: string
          description: The expression to replace.
          examples:
            - pizza
        with:
          type: string
          description: The phonetic spelling of the expression.
          examples:
            - pissa
        ignore_case:
          anyOf:
            - type: boolean
            - $ref: '#/components/schemas/SWMLVar'
          description: Whether the pronunciation replacement should ignore case. **Default:** `true`.
          examples:
            - true
          default: true
      title: Pronounce object
    ReceiveFax:
      type: object
      required:
        - receive_fax
      properties:
        receive_fax:
          type: object
          properties:
            status_url:
              type: string
              format: uri
              description: http or https URL to deliver receive_fax status events
              examples:
                - https://example.com/fax-received
          description: Receive a fax being delivered to this call.
          title: receive_fax
      title: receive_fax Method
    Record:
      type: object
      required:
        - record
      properties:
        record:
          type: object
          properties:
            stereo:
              anyOf:
                - type: boolean
                - $ref: '#/components/schemas/SWMLVar'
              description: |-
                If true, record in stereo.
                Default is `false`.
              examples:
                - true
              default: false
            format:
              type: string
              enum:
                - wav
                - mp3
                - mp4
              description: |-
                The format to record in. Can be `wav`, `mp3`, or `mp4`.
                Default is `"wav"`.
              examples:
                - mp3
              default: wav
            direction:
              type: string
              enum:
                - speak
                - listen
              description: |-
                Direction of the audio to record: "speak" for what party says, "listen" for what party hears.
                Default is `"speak"`.
              examples:
                - speak
              default: speak
            terminators:
              type: string
              description: String of digits that will stop the recording when pressed. Default is `"#"`.
              examples:
                - '#'
              default: '#'
            beep:
              anyOf:
                - type: boolean
                - $ref: '#/components/schemas/SWMLVar'
              description: |-
                Play a beep before recording.
                Default is `false`.
              examples:
                - true
              default: false
            input_sensitivity:
              anyOf:
                - type: number
                - $ref: '#/components/schemas/SWMLVar'
              description: |-
                How sensitive the recording voice activity detector is to background noise.
                A larger value is more sensitive. Allowed values from 0.0 to 100.0.
                Default is `44.0`.
              examples:
                - 44
              default: 44
            initial_timeout:
              anyOf:
                - type: number
                - $ref: '#/components/schemas/SWMLVar'
              description: |-
                Time in seconds to wait for the start of speech.
                Default is `4.0` seconds.
              examples:
                - 4
              default: 4
            end_silence_timeout:
              anyOf:
                - type: number
                - $ref: '#/components/schemas/SWMLVar'
              description: |-
                Time in seconds to wait in silence before ending the recording.
                Default is `5.0` seconds.
              examples:
                - 5
              default: 5
            max_length:
              anyOf:
                - type: number
                - $ref: '#/components/schemas/SWMLVar'
              description: Maximum length of the recording in seconds.
              examples:
                - 60
            status_url:
              type: string
              format: uri
              description: URL to send recording status events to.
              examples:
                - https://example.com/recording-status
          description: |-
            Record the call audio in the foreground, pausing further SWML execution until recording ends.
            Use this, for example, to record voicemails.
            To record calls in the background in a non-blocking fashion, use the record_call method.
          title: record
      title: record Method
    RecordCall:
      type: object
      required:
        - record_call
      properties:
        record_call:
          type: object
          properties:
            control_id:
              type: string
              description: Identifier for this recording, to use with `stop_call_record`.
              examples:
                - recording_001
            stereo:
              anyOf:
                - type: boolean
                - $ref: '#/components/schemas/SWMLVar'
              description: |-
                If `true`, record in stereo.
                Default is `false`.
              examples:
                - true
              default: false
            format:
              type: string
              enum:
                - wav
                - mp3
                - mp4
              description: |-
                The format to record in. It can be `wav`, `mp3`, or `mp4`.
                Default is `"wav"`.
              examples:
                - mp3
              default: wav
            direction:
              type: string
              enum:
                - speak
                - listen
                - both
              description: |-
                Direction of the audio to record: "speak" for what party says, "listen" for what party hears, "both" for what the party hears and says.
                Default is `"both"`.
              examples:
                - both
              default: both
            terminators:
              type: string
              description: String of digits that will stop the recording when pressed. Default is `""` (empty).
              examples:
                - '#*'
              default: ''
            beep:
              anyOf:
                - type: boolean
                - $ref: '#/components/schemas/SWMLVar'
              description: |-
                Play a beep before recording.
                Default is `false`.
              examples:
                - true
              default: false
            input_sensitivity:
              anyOf:
                - type: number
                - $ref: '#/components/schemas/SWMLVar'
              description: |-
                How sensitive the recording voice activity detector is to background noise.
                A larger value is more sensitive. Allowed values from 0.0 to 100.0.
                Default is `44.0`.
              examples:
                - 44
              default: 44
            initial_timeout:
              anyOf:
                - type: number
                - $ref: '#/components/schemas/SWMLVar'
              description: |-
                Time in seconds to wait for the start of speech.
                Default is `0.0` seconds.
              examples:
                - 0
              default: 0
            end_silence_timeout:
              anyOf:
                - type: number
                - $ref: '#/components/schemas/SWMLVar'
              description: |-
                Time in seconds to wait in silence before ending the recording.
                Default is `0.0` seconds.
              examples:
                - 0
              default: 0
            max_length:
              anyOf:
                - type: number
                - $ref: '#/components/schemas/SWMLVar'
              description: Maximum length of the recording in seconds.
              examples:
                - 300
            status_url:
              type: string
              format: uri
              description: http or https URL to deliver record_call status events
              examples:
                - https://example.com/record-call-status
          description: |-
            Record call in the background.
            Unlike the record method, the record_call method will start the recording and continue executing
            the SWML script while allowing the recording to happen in the background.
            To stop call recordings started with record_call, use the stop_record_call method.
          title: record_call
      title: record_call Method
    Request:
      type: object
      required:
        - request
      properties:
        request:
          type: object
          properties:
            url:
              type: string
              description: URL to send the HTTPS request to. Authentication can also be set in the URL in the format of username:password@url.
              examples:
                - https://api.example.com/webhook
            method:
              type: string
              enum:
                - GET
                - POST
                - PUT
                - DELETE
              description: The HTTP method to be used for the request. Can be `GET`, `POST`, `PUT`, or `DELETE`.
              examples:
                - POST
            headers:
              type: object
              unevaluatedProperties: {}
              description: Object containing HTTP headers to set. Valid header values are Accept, Authorization, Content-Type, Range, and custom X- headers.
              examples:
                - Content-Type: application/json
                  Authorization: Bearer token123
            body:
              anyOf:
                - type: string
                - type: object
                  unevaluatedProperties: {}
              description: |-
                Request body. Content-Type header should be explicitly set, but if not set, the most likely type
                will be set based on the first non-whitespace character.
              examples:
                - action: notify
                  message: Call completed
            timeout:
              anyOf:
                - type: number
                - $ref: '#/components/schemas/SWMLVar'
              description: |-
                Maximum time in seconds to wait for a response.
                Default is `0` (no timeout).
              examples:
                - 10
              default: 0
            connect_timeout:
              anyOf:
                - type: number
                - $ref: '#/components/schemas/SWMLVar'
              description: |-
                Maximum time in seconds to wait for a connection.
                Default is `0` (no timeout).
              examples:
                - 5
              default: 0
            save_variables:
              anyOf:
                - type: boolean
                - $ref: '#/components/schemas/SWMLVar'
              description: |-
                Store parsed JSON response as variables.
                Default is `false`.
              examples:
                - true
              default: false
          required:
            - url
            - method
          description: Send a GET, POST, PUT, or DELETE request to a remote URL.
          title: request
      title: request Method
    Return:
      type: object
      required:
        - return
      properties:
        return:
          description: Return a value from an execute call or exit the script. The value can be any type.
          title: return
          examples:
            - status: success
              result: completed
      title: return Method
    SIPRefer:
      type: object
      required:
        - sip_refer
      properties:
        sip_refer:
          type: object
          properties:
            to_uri:
              type: string
              description: The SIP URI to send the REFER to.
              examples:
                - sip:user@example.com
            status_url:
              type: string
              format: uri
              description: The HTTP or HTTPS URL to send status callback events to.
              examples:
                - https://example.com/refer-status
            username:
              type: string
              description: Username to use for SIP authentication.
              examples:
                - sipuser
            password:
              type: string
              description: Password to use for SIP authentication.
              examples:
                - sippassword
          required:
            - to_uri
          description: Send SIP REFER to a SIP call.
          title: sip_refer
      title: sip_refer Method
    SMSWithBody:
      type: object
      required:
        - to_number
        - from_number
        - body
      properties:
        to_number:
          type: string
          description: Phone number to send SMS message to in E.164 format.
          examples:
            - '+15559876543'
        from_number:
          type: string
          description: Phone number the SMS message will be sent from in E.164 format.
          examples:
            - '+15551234567'
        region:
          type: string
          description: Region of the world to originate the message from. Chosen based on account preferences or device location if not specified.
          examples:
            - us
        tags:
          type: array
          items:
            type: string
          description: Array of tags to associate with the message to facilitate log searches.
          examples:
            - - notification
              - order-confirmation
        body:
          type: string
          description: Required if `media` is not present. The body of the SMS message.
          examples:
            - Your order has been confirmed. Thank you!
      title: SMS
    SMSWithMedia:
      type: object
      required:
        - to_number
        - from_number
        - media
      properties:
        to_number:
          type: string
          description: Phone number to send SMS message to in E.164 format.
          examples:
            - '+15559876543'
        from_number:
          type: string
          description: Phone number the SMS message will be sent from in E.164 format.
          examples:
            - '+15551234567'
        region:
          type: string
          description: Region of the world to originate the message from. Chosen based on account preferences or device location if not specified.
          examples:
            - us
        tags:
          type: array
          items:
            type: string
          description: Array of tags to associate with the message to facilitate log searches.
          examples:
            - - notification
              - order-confirmation
        media:
          type: array
          items:
            type: string
          description: Required if `body` is not present. Array of media URLs to include in the message.
          examples:
            - - https://example.com/image.png
        body:
          type: string
          description: Optional if `media` is present. The body of the SMS message.
          examples:
            - Check out this image!
      title: MMS
    SWAIG:
      type: object
      properties:
        defaults:
          allOf:
            - $ref: '#/components/schemas/SWAIGDefaults'
          description: Default settings for all SWAIG functions. If `defaults` is not set, settings may be set in each function object. Default is not set.
        native_functions:
          type: array
          items:
            $ref: '#/components/schemas/SWAIGNativeFunction'
          description: Prebuilt functions the AI agent is able to call from this list of available native functions
        includes:
          type: array
          items:
            $ref: '#/components/schemas/SWAIGIncludes'
          description: |-
            An array of objects to include remote function signatures.
            This allows you to include functions that are defined in a remote location.
            The object fields are `url` to specify where the remote functions are defined and `functions` which is an array of the function names as strings.
        functions:
          type: array
          items:
            $ref: '#/components/schemas/SWAIGFunction'
          description: An array of JSON objects to define functions that can be executed during the interaction with the AI. Default is not set.
        internal_fillers:
          allOf:
            - $ref: '#/components/schemas/SWAIGInternalFiller'
          description: An object containing filler phrases for internal SWAIG functions. These fillers are played while utilizing internal functions.
      title: swaig
    SWAIGDefaults:
      type: object
      properties:
        web_hook_url:
          type: string
          description: Default URL to send status callbacks and reports to. Authentication can also be set in the url in the format of `username:password@url.`
          examples:
            - username:password@https://example.com
      title: defaults
    SWAIGFunction:
      anyOf:
        - $ref: '#/components/schemas/UserSWAIGFunction'
        - $ref: '#/components/schemas/StartUpHookSWAIGFunction'
        - $ref: '#/components/schemas/HangUpHookSWAIGFunction'
        - $ref: '#/components/schemas/SummarizeConversationSWAIGFunction'
    SWAIGIncludes:
      type: object
      required:
        - functions
        - url
      properties:
        functions:
          type: array
          items:
            type: string
          description: Remote functions to fetch and include in your AI application.
          examples:
            - - transfer call
              - notify kitchen
        url:
          type: string
          description: URL to fetch remote functions and include in your AI application. Authentication can also be set in the url in the format of `username:password@url`.
          examples:
            - username:password@https://example.com
        meta_data:
          type: object
          unevaluatedProperties: {}
          description: User-defined metadata to pass with the remote function request.
          examples:
            - customer_id: cust_123
              session_type: support
      title: includes
    SWAIGInternalFiller:
      type: object
      properties:
        hangup:
          allOf:
            - $ref: '#/components/schemas/FunctionFillers'
          description: Filler phrases played when the AI Agent is hanging up the call.
        check_time:
          allOf:
            - $ref: '#/components/schemas/FunctionFillers'
          description: Filler phrases played when the AI Agent is checking the time.
        wait_for_user:
          allOf:
            - $ref: '#/components/schemas/FunctionFillers'
          description: Filler phrases played when the AI Agent is waiting for user input.
        wait_seconds:
          allOf:
            - $ref: '#/components/schemas/FunctionFillers'
          description: Filler phrases played during deliberate pauses or wait periods.
        adjust_response_latency:
          allOf:
            - $ref: '#/components/schemas/FunctionFillers'
          description: Filler phrases played when the AI Agent is adjusting response timing.
        next_step:
          allOf:
            - $ref: '#/components/schemas/FunctionFillers'
          description: Filler phrases played when transitioning between conversation steps when utilizing `prompt.contexts`.
        change_context:
          allOf:
            - $ref: '#/components/schemas/FunctionFillers'
          description: Filler phrases played when switching between conversation contexts when utilizing `prompt.contexts`.
        get_visual_input:
          allOf:
            - $ref: '#/components/schemas/FunctionFillers'
          description: Filler phrases played when the AI Agent is processing visual input. This function is enabled when `enable_vision` is set to `true` in `ai.params`.
        get_ideal_strategy:
          allOf:
            - $ref: '#/components/schemas/FunctionFillers'
          description: Filler phrases played when the AI Agent is thinking or considering options. This is utilized when `enable_thinking` is set to `true` in `ai.params`.
    SWAIGNativeFunction:
      type: string
      enum:
        - check_time
        - wait_seconds
        - wait_for_user
        - adjust_response_latency
      title: native_functions
    SWMLAction:
