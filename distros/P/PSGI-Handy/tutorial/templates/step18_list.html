<!DOCTYPE html>
<html>
<head><title>Step 18 - DB List</title></head>
<body>
    <h1>User List (DB)</h1>
    <table border="1">
        <tr><th>ID</th><th>Name</th><th>Age</th></tr>
        {% for user in users %}
        <tr><td>{{ user.id }}</td><td><a href="/user/{{ user.id }}">{{ user.name }}</a></td><td>{{ user.age }}</td></tr>
        {% endfor %}
    </table>
</body>
</html>
