name: CI
on:
  push:
    branches: ['*']
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        perl: ['5.40', '5.38', '5.36', '5.34', '5.32', '5.30', '5.28', '5.26', '5.24', '5.22']
    steps:
      - uses: actions/checkout@v4
      - uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: ${{ matrix.perl }}
      - run: cpanm -n Devel::PPPort
      - run: perl Makefile.PL
      - run: make
      - run: make test

  test-alpine:
    runs-on: ubuntu-latest
    container: alpine:latest
    steps:
      - uses: actions/checkout@v4
      - run: apk add --no-cache perl perl-dev make gcc musl-dev linux-headers wget
      - run: wget -qO- https://cpanmin.us | perl - App::cpanminus
      - run: cpanm -n Devel::PPPort
      - run: perl Makefile.PL && make && make test

  test-asan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: '5.40'
      - run: cpanm -n Devel::PPPort
      - run: perl Makefile.PL OPTIMIZE='-g -fsanitize=address -fno-omit-frame-pointer'
      - run: make
      - name: test under ASAN
        run: |
          ASAN_LIB=$(cc -print-file-name=libasan.so)
          LD_PRELOAD=$ASAN_LIB ASAN_OPTIONS=detect_leaks=0 make test
