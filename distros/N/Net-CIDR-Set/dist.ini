name    = Net-CIDR-Set
author  = Andy Armstrong <andy@hexten.net>
license = Perl_5
copyright_holder = Message Systems, Inc.
copyright_year   = 2009, 2014, 2025-2026

[Meta::Contributors]
contributor = Thomas Eckardt <Thomas.Eckardt@thockar.com>

[Keywords]
keyword = CIDR
keyword = INET
keyword = LPM
keyword = Longest Prefix Match

[GatherDir]
exclude_match = cpanfile*
exclude_match = LICENSE
exclude_match = SECURITY.md
[PruneCruft]
[ManifestSkip]
[CPANFile]
[License]
[ExecDir]
[ShareDir]
[MakeMaker]
[Manifest]
[TestRelease]
[CheckExtraTests]
[ConfirmRelease]
[UploadToCPAN]

[RecommendedPrereqs]
[AutoPrereqs]

[Prereqs / BuildRequires ]
-phase = build
-relationship = requires
ExtUtils::MakeMaker = 7.22
Module::Metadata = 1.000015

[Prereqs / DevelopRequires ]
-phase = develop
-relationship = requires
Software::Security::Policy::Individual = 0.10
Test::CPAN::Changes = 0
Test::Vars = 0.015

; [EnsurePrereqsInstalled]
; :version = 0.003
; type = requires
; type = recommends

[SecurityPolicy]
; authordep Software::Security::Policy::Individual
-policy = Individual
timeframe = 2 weeks
perl_support_years = 10
git_url = https://github.com/robrwo/perl-Net-CIDR-Set
report_url = https://github.com/robrwo/perl-Net-CIDR-Set/security/advisories

[PodWeaver]
; authordep Pod::Weaver::Plugin::AppendPrepend
; authordep Pod::Weaver::Section::Contributors
; authordep Pod::Weaver::Section::SourceGitHub

[UsefulReadme]
; authordep Pod::Markdown::Github
type     = gfm
filename = README.md
location = build

[CopyFilesFromBuild]
copy = LICENSE
copy = README.md
copy = SECURITY.md
copy = cpanfile

[PruneFiles]
match = ~$

[GitHub::Meta]
repo = robrwo/perl-Net-CIDR-Set.git
fork = 0

[MetaResources]
x_authority = cpan:RRWO
bugtracker.web = https://rt.cpan.org/Public/Dist/Display.html?Name=Net-CIDR-Set
; repository.url = git://github.com/robrwo/perl-Net-CIDR-Set.git
; repository.web = https://github.com/robrwo/perl-Net-CIDR-Set

[MetaProvides::Package]
[MetaJSON]
[MetaYAML]

[PodSyntaxTests]
[Test::DistManifest]
; authordep Test::DistManifest
[Test::CleanNamespaces]
; authordep Test::CleanNamespaces
[Test::EOF]
; authordep Test::EOF
[Test::EOL]
:version = 0.14
[Test::Fixme]
[Test::MinimumVersion]
[Test::NoTabs]
[Test::Perl::Critic]
critic_config = xt/etc/perlcritic.rc

[Test::Pod::Coverage::Configurable]
[Test::Pod::LinkCheck]
[Test::Portability]
; authordep Test::TrailingSpace
[Test::TrailingSpace]
filename_regex = \.(?:p[lm]|pod)\z
[Test::Kwalitee]
; authordep Test::Kwalitee
[Test::CPAN::Changes]
; authordep Test::CPAN::Changes
[Test::UnusedVars]
[Test::MixedScripts]
[MojibakeTests]
; Ideally stopwords would be embedded in the POD but with Pod::Weaver we cannot ensure they are placed before correctly
[Test::PodSpelling]
stopword = superset
stopword = masse

[Test::ReportPrereqs]
:version = 0.022
version_extractor = Module::Metadata
verify_prereqs = 1

[@Git]
allow_dirty = dist.ini
push_to     = origin master:master
tag_format  = %v
commit_msg  = %v%n%n%c

[Git::Contributors]
:version = 0.019
remove   = robrwo

[RewriteVersion]
[NextRelease]
[BumpVersionAfterRelease]

[Git::Commit / Commit_Changes] ; commit Changes (for new dev)
allow_dirty_match = ^lib/
commit_msg = Commit Changes and bump $VERSION
