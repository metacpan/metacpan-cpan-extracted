services:
  app:
    init: true
    build: .
    ports:
    - 7891:7891
    working_dir: /root/.developer-dashboard
    volumes:
    - /app
    command:
    - perl
    - -e
    - if (!fork) { while (1) { system sprintf "echo %d >> /var/log/test.log", time; sleep 5 } } system qw( dashboard serve --port 7891 --workers 5 --ssl ); sleep
