---
commands:
  annotate: CPAN::Maker::Bootstrapper::Role::LLM::Annotator
  code-finding: CPAN::Maker::Bootstrapper::Role::LLM::Reviewer
  code-review: CPAN::Maker::Bootstrapper::Role::LLM::Reviewer
  create-config: CPAN::Maker::Bootstrapper::Role::CreateConfig
  default: cmd_install
  install: CPAN::Maker::Bootstrapper::Role::Installer
  import-scaffold:  CPAN::Maker::Bootstrapper::Role::ScaffoldImporter
  models: CPAN::Maker::Bootstrapper::Role::LLM::Models
