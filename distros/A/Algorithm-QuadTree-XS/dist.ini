name = Algorithm-QuadTree-XS
version = 0.14
author = Bartosz Jarzyna <bbrtj.pro@gmail.com>
license = Perl_5
copyright_holder = Bartosz Jarzyna

[MakeMaker::Awesome]
WriteMakefile_arg = OBJECT => 'XS$(OBJ_EXT) qtbase$(OBJ_EXT)'

[GatherDir]
[MetaYAML]
[MetaJSON]

[PPPort]
version=3.68

[PruneFiles]
filename=tools

[PruneCruft]
[Manifest]
[License]
[PkgVersion]

[PodSyntaxTests]
[ExtraTests]

[GitHub::Meta]

[TestRelease]
[ConfirmRelease]

[NextRelease]
time_zone=UTC
format=%v %{eee MMM d yyyy}d

[Git::Commit]
commit_msg=Release %V
[Git::Tag]

[UploadToCPAN]

[Prereqs]
Algorithm::QuadTree = 1.0

