    SWMLObject:
      type: object
      required:
        - sections
      properties:
        version:
          type: string
          enum:
            - 1.0.0
        sections:
          $ref: '#/components/schemas/Section'
      title: SWML Object
    SWMLVar:
      type: string
      pattern: ^[\$%]\{.*\}$
      description: |-
        A SWML variable reference for dynamic value substitution at runtime.

        Use the `${varname}` or `%{varname}` syntax to reference variables that will be resolved when the SWML is executed.
        Variables can be:
        - **SignalWire-provided variables**: System variables like `${call.from}`, `${call.to}`, `${call.direction}`, etc.
        - **User-defined variables**: Custom variables set via `set_global_data` action or passed in the initial SWML script's `global_data` object.
        - **Function return values**: Variables populated from SWAIG function responses.

        Example: `${global_data.customer_name}` will be replaced with the value of `customer_name` from the global_data object at runtime.
      title: SWML Variable Reference
    SayAction:
      type: object
      required:
        - say
      properties:
        say:
          type: string
          description: A message to be spoken by the AI agent.
          title: say
          examples:
            - Welcome to Franklin's Pizza.
      title: say Action
    SchemaType:
      anyOf:
        - $ref: '#/components/schemas/StringProperty'
        - $ref: '#/components/schemas/IntegerProperty'
        - $ref: '#/components/schemas/NumberProperty'
        - $ref: '#/components/schemas/BooleanProperty'
        - $ref: '#/components/schemas/ArrayProperty'
        - $ref: '#/components/schemas/ObjectProperty'
        - $ref: '#/components/schemas/NullProperty'
        - $ref: '#/components/schemas/OneOfProperty'
        - $ref: '#/components/schemas/AllOfProperty'
        - $ref: '#/components/schemas/AnyOfProperty'
        - $ref: '#/components/schemas/ConstProperty'
      title: Function Parameters Type Union
    Section:
      type: object
      required:
        - main
      properties:
        main:
          type: array
          items:
            $ref: '#/components/schemas/SWMLMethod'
      unevaluatedProperties:
        type: array
        items:
          $ref: '#/components/schemas/SWMLMethod'
      title: SWML sections
    SendDigits:
      type: object
      required:
        - send_digits
      properties:
        send_digits:
          type: object
          properties:
            digits:
              type: string
              description: The digits to send. Valid values are 0123456789*#ABCDWw. Character W is a 1 second delay, and w is a 500ms delay.
              examples:
                - 1234#
          required:
            - digits
          description: Send digit presses as DTMF tones.
          title: send_digits
      title: send_digits Method
    SendFax:
      type: object
      required:
        - send_fax
      properties:
        send_fax:
          type: object
          properties:
            document:
              type: string
              format: uri
              description: URL to the PDF document to fax.
              examples:
                - https://example.com/document.pdf
            header_info:
              type: string
              description: Header text to include on the fax.
              examples:
                - 'Invoice #12345'
            identity:
              type: string
              description: |-
                Station identity to report.
                Default is the calling party's caller ID number.
              examples:
                - '+15551234567'
            status_url:
              type: string
              format: uri
              description: http or https URL to deliver send_fax status events
              examples:
                - https://example.com/fax-status
          required:
            - document
          description: Send a fax.
          title: send_fax
      title: send_fax Method
    SendSMS:
      type: object
      required:
        - send_sms
      properties:
        send_sms:
          anyOf:
            - $ref: '#/components/schemas/SMSWithBody'
            - $ref: '#/components/schemas/SMSWithMedia'
          description: Send an outbound SMS or MMS message to a PSTN phone number.
          title: send_sms
      title: send_sms Method
    Set:
      type: object
      required:
