name = Unicode-UTF8
abstract = Encoding and decoding of UTF-8 encoding form
author = Christian Hansen <chansen@cpan.org>
license = Perl_5
copyright_holder = Christian Hansen
copyright_year = 2011-2017

[VersionFromMainModule]
[CheckChangesHasContent]
[PPPort]

[@Starter::Git]
revision = 6
installer = MakeMaker::Awesome
regenerate = Makefile.PL
regenerate = META.json
regenerate = LICENSE
regenerate = README
Git::GatherDir.exclude_match[0] = ^benchmarks
Pod2Readme.source_filename = lib/Unicode/UTF8.pod

MakeMaker::Awesome.delimiter = |
MakeMaker::Awesome.header[00] = |("\t" eq "\x09")
MakeMaker::Awesome.header[01] = |  or die("OS unsupported\n");
MakeMaker::Awesome.header[02] = |
MakeMaker::Awesome.header[03] = |use Config;
MakeMaker::Awesome.header[04] = |use Devel::PPPort;
MakeMaker::Awesome.header[05] = |Devel::PPPort::WriteFile() unless -e 'ppport.h';
MakeMaker::Awesome.header[06] = |
MakeMaker::Awesome.header[07] = |# C99 standard flag: only GCC/Clang need one, and they are exactly the
MakeMaker::Awesome.header[08] = |# compilers that set gccversion. MSVC and vendor compilers (xlc, Solaris
MakeMaker::Awesome.header[09] = |# cc) neither set it nor accept -std=c99, so leave it empty there.
MakeMaker::Awesome.header[10] = |my $c99 = $Config{gccversion} ? '-std=c99' : '';
MakeMaker::Awesome.header[11] = |
MakeMaker::Awesome.header[12] = |# Confirm the compiler accepts C99 by building a snippet that uses C99
MakeMaker::Awesome.header[13] = |# features rather than trusting __STDC_VERSION__ (MSVC does not advertise
MakeMaker::Awesome.header[14] = |# it). This distribution is XS-only, so fail configuration early.
MakeMaker::Awesome.header[15] = |my $xs_ok = 0;
MakeMaker::Awesome.header[16] = |if (eval { require ExtUtils::CBuilder; ExtUtils::CBuilder->new(quiet => 1)->have_compiler }) {
MakeMaker::Awesome.header[17] = |  my $cb  = ExtUtils::CBuilder->new(quiet => 1);
MakeMaker::Awesome.header[18] = |  my $src = 'conftest.c';
MakeMaker::Awesome.header[19] = |  open my $fh, '>', $src or die "Cannot write $src: $!";
MakeMaker::Awesome.header[20] = |  print $fh "#include <stdint.h>\n";
MakeMaker::Awesome.header[21] = |  print $fh "int main(void) {\n";
MakeMaker::Awesome.header[22] = |  print $fh "  uint32_t n = 0;              // C99 // comment + <stdint.h>\n";
MakeMaker::Awesome.header[23] = |  print $fh "  for (int i = 0; i < 3; i++)  // declaration inside for\n";
MakeMaker::Awesome.header[24] = |  print $fh "    n += (uint32_t)i;\n";
MakeMaker::Awesome.header[25] = |  print $fh "  return (int)n - 3;\n";
MakeMaker::Awesome.header[26] = |  print $fh "}\n";
MakeMaker::Awesome.header[27] = |  close $fh;
MakeMaker::Awesome.header[28] = |  eval {
MakeMaker::Awesome.header[29] = |    $cb->compile(source => $src, extra_compiler_flags => [grep length, $c99]);
MakeMaker::Awesome.header[30] = |    $xs_ok = 1;
MakeMaker::Awesome.header[31] = |  };
MakeMaker::Awesome.header[32] = |  unlink $src, glob('conftest.*');
MakeMaker::Awesome.header[33] = |}
MakeMaker::Awesome.header[34] = |$xs_ok
MakeMaker::Awesome.header[35] = |  or die "No C99 compiler found; Unicode::UTF8 requires a C99 compiler.\n";
MakeMaker::Awesome.WriteMakefile_arg[0] = CCFLAGS => (length $c99 ? "$Config{ccflags} $c99" : $Config{ccflags})
MakeMaker::Awesome.test_file = t/*.t t/*/*.t

[GithubMeta]
issues = 1
user = chansen
