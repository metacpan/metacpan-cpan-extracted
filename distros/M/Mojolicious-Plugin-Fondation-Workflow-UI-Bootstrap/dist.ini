[@Basic]

[Prereqs::FromCPANfile]

[PkgVersion]

[NextRelease]
filename = Changes

[MetaJSON]

[GithubMeta]

[ReadmeAnyFromPod]
filename = README.md
type     = markdown

[Git::Check]
allow_dirty = dist.ini
allow_dirty = README.md
allow_dirty = Changes

[Git::Commit]
