name    = LWP-ConsoleLogger
author  = Olaf Alders <olaf@wundercounter.com>
license = Artistic_2_0
copyright_holder = MaxMind, Inc.
copyright_year   = 2014

[@Author::OALDERS]
-remove = StaticInstall
-remove = Test::Synopsis
-remove = Test::TidyAll

[RemovePrereqs]
remove = Code::TidyAll
remove = Code::TidyAll::Plugin::SortLines::Naturally
remove = Code::TidyAll::Plugin::Test::Vars
remove = Code::TidyAll::Plugin::UniqueLines
remove = Parallel::ForkManager
remove = Test::Vars

[Prereqs / DevelopRequires]
App::perlvars = 0

[Prereqs]
Data::Printer = 0.36
Encode        = 0
JSON::MaybeXS = 1.003005
Log::Dispatch = 2.56
Term::Table   = 0.028
perl = 5.016 ; Mojo dep in tests

[Prereqs / RuntimeRecommends]
HTML::FormatText::Lynx = 23
Unicode::GCString      = 0
XML::Simple            = 0

[Prereqs / TestRequires]
IPC::Run3 = 0

[Prereqs / TestRecommends]
Mojolicious = 7.13
Mojo::UserAgent = 0
Pithub = 0

[StaticInstall]
mode = on
