zitadel:
  masterkey: x123456789012345678901234567891y
  configmapConfig:
    ExternalSecure: true
    ExternalDomain: zitadel.avatar.conflict.industries
    ExternalPort: 443
    TLS:
      Enabled: false
    Database:
      Postgres:
        Host: zitadel-postgres
        Port: 5432
        Database: zitadel
        MaxOpenConns: 20
        MaxIdleConns: 10
        MaxConnLifetime: 30m
        MaxConnIdleTime: 5m
        User:
          Username: postgres
          SSL:
            Mode: disable
        Admin:
          Username: postgres
          SSL:
            Mode: disable
  secretConfig:
    Database:
      Postgres:
        User:
          Password: postgres
        Admin:
          Password: postgres
ingress:
  enabled: false
login:
  enabled: false
  ingress:
    enabled: false

image:
  repository: __ZITADEL_IMAGE_REPOSITORY__
  tag: __ZITADEL_IMAGE_TAG__
