                - - xin chờ một chút
                  - để tôi kiểm tra
          required:
            - vi
      description: Supported language codes
    FunctionParameters:
      type: object
      required:
        - type
        - properties
      properties:
        type:
          type: string
          enum:
            - object
          description: The type of argument the AI is passing to the function. Possible values are 'string' and 'object'.
        properties:
          type: object
          unevaluatedProperties:
            $ref: '#/components/schemas/SchemaType'
          description: |-
            An object containing the property definitions that are passed to the function.

            A property definition is a valid JSON schema type with dynamic property names, where:
            - Keys: User-defined strings, that set the property names.
            - Values: A valid property type, which can be one of the following: `string`, `integer`, `number`, `boolean`, `array`, `object`, or `null`.
        required:
          type: array
          items:
            type: string
          description: An array of required property names from the `properties` object.
          examples:
            - - name1
              - name2
    Goto:
      type: object
      required:
        - goto
      properties:
        goto:
          type: object
          properties:
            label:
              type: string
              description: Mark any point of the SWML section with a label so that goto can jump to it.
              examples:
                - greeting
            when:
              type: string
              description: A JavaScript condition that determines whether to perform the jump. If the condition evaluates to true, the jump is executed. If omitted, the jump is unconditional.
              examples:
                - vars.retry_count < 3
            max:
              anyOf:
                - type: integer
                - $ref: '#/components/schemas/SWMLVar'
              minimum: 1
              maximum: 100
              description: The maximum number of times to perform the jump. Must be a number between 1 and 100. Default `100`.
              examples:
                - 3
              default: 100
          required:
            - label
          description: |-
            Jump to a label within the current section, optionally based on a condition.
            The goto method will only navigate to a label within the same section.
      title: goto Method
    HangUpHookSWAIGFunction:
      type: object
      required:
        - description
        - function
      properties:
        description:
          type: string
          description: A description of the context and purpose of the function, to explain to the agent when to use it.
          examples:
            - Get the weather information
        purpose:
          type: string
          description: |-
            The purpose field has been deprecated and is replaced by the `description` field.
            A description of the context and purpose of the function, to explain to the agent when to use it.
          deprecated: true
          examples:
            - Get the weather information
        parameters:
          allOf:
            - $ref: '#/components/schemas/FunctionParameters'
          description: A JSON object that defines the expected user input parameters and their validation rules for the function.
        fillers:
          allOf:
            - $ref: '#/components/schemas/FunctionFillers'
          description: A JSON object defining the fillers that should be played when calling a `swaig function`. This helps the AI break silence between responses. The filler is played asynchronously during the function call.
        argument:
          allOf:
            - $ref: '#/components/schemas/FunctionParameters'
          description: |-
            The argument field has been deprecated and is replaced by the `parameters` field. 
            A JSON object defining the input that should be passed to the function. 
            The fields of this object are the following two parameters.
          deprecated: true
        active:
          anyOf:
            - type: boolean
            - $ref: '#/components/schemas/SWMLVar'
          description: Whether the function is active. **Default:** `true`.
          examples:
            - true
          default: true
        meta_data:
          type: object
          unevaluatedProperties: {}
          description: |-
            A powerful and flexible environmental variable which can accept arbitrary data that is set initially in the SWML script or from the SWML set_meta_data action.
            This data can be referenced locally to the function.
            All contained information can be accessed and expanded within the prompt - for example, by using a template string.
            Default is not set.
          examples:
            - api_key: key_123
              endpoint: https://api.example.com
        meta_data_token:
          type: string
          description: Scoping token for meta_data. If not supplied, metadata will be scoped to function's `web_hook_url`. Default is set by SignalWire.
          examples:
            - my-function-scope
        data_map:
          allOf:
            - $ref: '#/components/schemas/DataMap'
          minProperties: 1
          description: |-
            An object that processes function inputs and executes operations through expressions, webhooks, or direct output.
            Properties are evaluated in strict priority order:
            1. expressions
            2. webhooks
            3. output

            Evaluation stops at the first property that returns a valid output result, similar to a return statement in a function.
            Any subsequent properties are ignored when a valid output is returned.
            If a valid output is not returned from any of the properties, a generic error message is returned.
        skip_fillers:
          anyOf:
            - type: boolean
            - $ref: '#/components/schemas/SWMLVar'
          description: |-
            Skips the top-level fillers specified in `ai.languages` (which includes `speech_fillers` and `function_fillers`).
            When set to `true`, only function-specific fillers defined directly on `SWAIG.functions.fillers` will play.
            **Default:** `false`.
          examples:
            - true
          default: false
        web_hook_url:
          type: string
          description: Function-specific URL to send status callbacks and reports to. Takes precedence over a default setting. Authentication can also be set in the url in the format of `username:password@url.`
          examples:
            - username:password:https://statuscallback.com
        wait_file:
          type: string
          format: uri
          description: A file to play while the function is running. `wait_file_loops` can specify the amount of times that files should continously play. Default is not set.
          examples:
            - https://cdn.signalwire.com/default-music/welcome.mp3
        wait_file_loops:
          anyOf:
            - type: integer
            - type: string
          description: The number of times to loop playing the file. Default is not set.
          examples:
            - 5
        wait_for_fillers:
          anyOf:
            - type: boolean
            - $ref: '#/components/schemas/SWMLVar'
          description: Whether to wait for fillers to finish playing before continuing with the function. **Default:** `false`.
          examples:
            - true
          default: false
        function:
          type: string
          enum:
            - hangup_hook
          description: A unique name for the function. This can be any user-defined string or can reference a reserved function. Reserved functions are SignalWire functions that will be executed at certain points in the conversation. For the stop_hook function, the function name is 'stop_hook'.
      title: hangup_hook Function
    Hangup:
      type: object
      required:
        - hangup
      properties:
        hangup:
          type: object
          properties:
            reason:
              type: string
              enum:
                - hangup
                - busy
                - decline
              description: The reason for hanging up the call.
              examples:
                - busy
          description: End the call with an optional reason.
          title: hangup
      title: hangup Method
    HangupAction:
      type: object
      required:
        - hangup
      properties:
        hangup:
          anyOf:
            - type: boolean
            - $ref: '#/components/schemas/SWMLVar'
          description: Whether to hang up the call. When set to `true`, the call will be terminated after the AI agent finishes speaking.
          title: hangup
          examples:
            - true
      title: hangup Action
    HangupReason:
      type: string
      enum:
        - hangup
        - cancel
        - busy
        - noAnswer
        - decline
        - error
      description: The reason for hanging up the call.
    Hint:
      type: object
      required:
        - hint
        - pattern
        - replace
      properties:
        hint:
          type: string
          description: The hint to match. This will match the string exactly as provided
          examples:
            - customer service
        pattern:
          type: string
          description: A regular expression to match the hint against. This will ensure that the hint has a valid matching pattern before being replaced.
          examples:
            - customer\s+service
        replace:
          type: string
          description: The text to replace the hint with. This will replace the portion of the hint that matches the pattern.
          examples:
            - support team
        ignore_case:
          anyOf:
            - type: boolean
            - $ref: '#/components/schemas/SWMLVar'
          description: If true, the hint will be matched in a case-insensitive manner. **Default:** `false`.
          examples:
            - true
          default: false
    HoldAction:
      type: object
      required:
        - hold
      properties:
        hold:
          anyOf:
            - type: integer
              format: int32
            - $ref: '#/components/schemas/SWMLVar'
            - type: object
              properties:
                timeout:
                  anyOf:
                    - type: integer
                      format: int32
                    - $ref: '#/components/schemas/SWMLVar'
                  maximum: 900
                  description: The duration to hold the caller in seconds. Can be a number or an object with timeout property.
                  examples:
                    - 300
                  default: 300
          maximum: 900
          description: |-
            Places the caller on hold while playing hold music (configured via params.hold_music).
            During hold, speech detection is paused and the AI agent will not respond to the caller.
            The value specifies the hold timeout in seconds.
            Can be a number or an object with timeout property.
          title: hold
          examples:
            - 120
      title: hold Action
    InjectAction:
      type: object
      required:
        - inject
      properties:
        inject:
          type: object
          properties:
            message:
              type: string
              description: The message to be injected
              examples:
                - Please hold while I transfer you to a specialist.
            direction:
              allOf:
                - $ref: '#/components/schemas/TranslateDirection'
              description: The direction of the message.
          required:
            - message
            - direction
          description: Injects a message into the conversation to be translated and spoken to the specified party.
      title: InjectAction object
    IntegerProperty:
      type: object
      required:
        - type
      properties:
        description:
          type: string
          description: A description of the property.
          examples:
            - Property description
        nullable:
          anyOf:
            - type: boolean
            - $ref: '#/components/schemas/SWMLVar'
          description: Whether the property can be null.
          examples:
            - false
        type:
          type: string
          enum:
            - integer
          description: The type of parameter(s) the AI is passing to the function.
        enum:
          type: array
          items:
            type: integer
          description: An array of integers that are the possible values
          examples:
            - - 1
              - 2
              - 3
        default:
          anyOf:
            - type: integer
            - $ref: '#/components/schemas/SWMLVar'
          description: The default integer value
          examples:
            - 5
      description: Base interface for all property types
      title: Integer Function Property
    JoinConference:
      type: object
      required:
        - join_conference
      properties:
        join_conference:
          allOf:
            - $ref: '#/components/schemas/JoinConferenceObject'
          description: |-
            Join an ad-hoc audio conference started on either the SignalWire or Compatibility API.
            This method allows you to connect the current call to a named conference where multiple participants can communicate simultaneously.
          title: join_conference
      title: join_conference Method
    JoinConferenceObject:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: Name of conference
          examples:
            - my-conference-room
        muted:
          anyOf:
            - type: boolean
            - $ref: '#/components/schemas/SWMLVar'
          description: Whether to join the conference in a muted state. If set to `true`, the participant will be muted upon joining. Default `false`.
          examples:
            - false
          default: false
        beep:
          type: string
          enum:
            - 'true'
            - 'false'
            - onEnter
            - onExit
          description: Sets the behavior of the beep sound when joining or leaving the conference. Default `"true"`.
          examples:
            - onEnter
          default: 'true'
        start_on_enter:
          anyOf:
            - type: boolean
            - $ref: '#/components/schemas/SWMLVar'
          description: Starts the conference when the main participant joins. This means the start action will not wait on more participants to join before starting. Default `true`.
          examples:
            - true
          default: true
        end_on_exit:
          anyOf:
            - type: boolean
            - $ref: '#/components/schemas/SWMLVar'
          description: Ends the conference when the main participant leaves. This means the end action will not wait on more participants to leave before ending. Default `false`.
          examples:
            - false
          default: false
        wait_url:
          anyOf:
            - type: string
              format: uri
            - $ref: '#/components/schemas/SWMLVar'
          description: A URL that will play media when the conference is put on hold. Default hold music will be played if not set
          examples:
            - https://example.com/hold-music.mp3
        max_participants:
          anyOf:
            - type: integer
            - $ref: '#/components/schemas/SWMLVar'
          minimum: 2
          maximum: 100000
          description: The maximum number of participants allowed in the conference. If the limit is reached, new participants will not be able to join. Default `100000`.
          examples:
            - 50
          default: 100000
        record:
          type: string
          enum:
            - do-not-record
            - record-from-start
          description: Enables or disables recording of the conference. Default `"do-not-record"`.
          examples:
            - record-from-start
          default: do-not-record
        region:
          type: string
          description: Specifies the geographical region where the conference will be hosted. Default not set
          examples:
            - us-east
        trim:
          type: string
          enum:
            - trim-silence
            - do-not-trim
          description: If set to `trim-silence`, it will remove silence from the start of the recording. If set to `do-not-trim`, it will keep the silence. Default `"trim-silence"`.
          examples:
            - trim-silence
          default: trim-silence
        coach:
          type: string
          description: |-
            Coach accepts a call SID of a call that is currently connected to an in-progress conference.
            Specifying a call SID that does not exist or is no longer connected will result in a failure.
          examples:
            - b3877ee3-6f3c-4985-8066-6d24e3f65e12
        status_callback_event:
          type: string
          enum:
            - start
            - end
            - join
            - leave
            - mute
            - hold
            - modify
            - speaker
            - announcement
          description: The events to listen for and send to the status callback URL. Default not set
          examples:
            - join
        status_callback:
          type: string
          format: uri
          description: The URL to which status events will be sent. This URL must be publicly accessible and able to handle HTTP requests. Default not set
          examples:
            - https://example.com/conference-status
        status_callback_method:
          type: string
          enum:
            - GET
            - POST
          description: The HTTP method to use when sending status events to the status callback URL. Default `"POST"`.
          examples:
            - POST
          default: POST
        recording_status_callback:
          type: string
          format: uri
          description: The URL to which recording status events will be sent. This URL must be publicly accessible and able to handle HTTP requests. Default not set
          examples:
            - https://example.com/recording-status
        recording_status_callback_method:
          type: string
          enum:
            - GET
            - POST
          description: The HTTP method to use when sending recording status events to the recording status callback URL. Default `"POST"`.
          examples:
            - POST
          default: POST
        recording_status_callback_event:
          type: string
          enum:
            - in-progress
            - completed
            - absent
          description: The events to listen for and send to the recording status callback URL. Default not set
          examples:
            - completed
        result:
          anyOf:
            - type: object
              properties:
                variable:
                  type: string
                  description: Name of the variable whose value needs to be compared.
                  examples:
                    - prompt_result
                case:
                  type: object
                  unevaluatedProperties:
                    type: array
                    items:
                      $ref: '#/components/schemas/SWMLMethod'
                  description: Object of key-mapped values to array of SWML methods to execute.
                default:
                  description: Array of SWML methods to execute if no cases match.
                  type: array
                  items:
                    $ref: '#/components/schemas/SWMLMethod'
              required:
                - variable
                - case
              description: Execute different instructions based on a variable's value.
              title: switch
            - type: array
              items:
                $ref: '#/components/schemas/CondParams'
              description: Execute a sequence of instructions depending on the value of a JavaScript condition.
              title: cond
          description: |-
            Allows the user to specify a custom action to be executed when the conference result is returned (typically when it has ended). 
            The actions can a `switch` object or a `cond` array.
            The `switch` object allows for conditional execution based on the result of the conference, while
            the `cond` array allows for multiple conditions to be checked in sequence.
            If neither is provided, the default action will be to end the conference.
      title: JoinConferenceObject object
    JoinRoom:
      type: object
