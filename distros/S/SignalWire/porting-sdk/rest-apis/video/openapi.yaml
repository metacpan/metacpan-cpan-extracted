        dark_foreground:
          type: string
          pattern: ^#[0-9a-fA-F]{6}$
          description: Main foreground color (dark theme).
          examples:
            - '#1D2127'
          default: '#1D2127'
        dark_success:
          type: string
          pattern: ^#[0-9a-fA-F]{6}$
          description: Success indication color (dark theme).
          examples:
            - '#17BB58'
          default: '#17BB58'
        dark_negative:
          type: string
          pattern: ^#[0-9a-fA-F]{6}$
          description: Error indication color (dark theme).
          examples:
            - '#F42C50'
          default: '#F42C50'
        light_primary:
          type: string
          pattern: ^#[0-9a-fA-F]{6}$
          description: CTA buttons and selected items color (light theme).
          examples:
            - '#044EF4'
          default: '#044EF4'
        light_background:
          type: string
          pattern: ^#[0-9a-fA-F]{6}$
          description: Main background color (light theme).
          examples:
            - '#FFFFFF'
          default: '#FFFFFF'
        light_foreground:
          type: string
          pattern: ^#[0-9a-fA-F]{6}$
          description: Main foreground color (light theme).
          examples:
            - '#1D2127'
          default: '#1D2127'
        light_success:
          type: string
          pattern: ^#[0-9a-fA-F]{6}$
          description: Success indication color (light theme).
          examples:
            - '#17BB58'
          default: '#17BB58'
        light_negative:
          type: string
          pattern: ^#[0-9a-fA-F]{6}$
          description: Error indication color (light theme).
          examples:
            - '#F42C50'
          default: '#F42C50'
