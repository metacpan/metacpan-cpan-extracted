        command:
          type: string
          enum:
            - calling.play
          description: The `calling.play` command plays audio, TTS, silence, or ringtone to a call.
          examples:
            - calling.play
        params:
          type: object
          required:
            - play
          properties:
            control_id:
              type: string
              description: Unique identifier for this play operation. Auto-generated if not provided.
              examples:
                - play-1
            play:
              type: array
              items:
                type: object
                properties:
                  type:
                    type: string
                    enum:
                      - audio
                      - tts
                      - silence
                      - ring
                    description: The type of media to play.
                  params:
                    type: object
                    description: Type-specific parameters (url for audio, text/language/gender for tts, duration for silence/ring).
              description: Array of media objects to play.
            volume:
              type: number
              minimum: -40
              maximum: 40
              description: Volume adjustment in dB. 0 is default.
              default: 0
            direction:
              type: string
              enum:
                - listen
                - speak
                - both
              description: Which leg of the call to play to.
              default: both
            loop:
              type: integer
              description: Number of times to loop. 0 means infinite.
            status_url:
              type: string
              format: uri
              description: Webhook URL for play state events.
          description: An object of parameters that will be utilized by the active command.
      title: calling.play
