name    = Mojolicious-Plugin-Fondation-MigrationDBIx
author  = Daniel Brosseau <dab@cpan.org>
license = Perl_5
copyright_holder = Daniel Brosseau
copyright_year   = 2026

version = 0.01

[@Basic]
-remove = Readme

[Prereqs::FromCPANfile]

[PkgVersion]

[NextRelease]
filename = Changes

[PodWeaver]

[MetaJSON]

[GithubMeta]

[ConfirmRelease]
[TestRelease]
[UploadToCPAN]

; Auto-generate README.md from POD
[ReadmeAnyFromPod]
filename = README.md
type     = markdown

[Git::Check]
allow_dirty = dist.ini
allow_dirty = README.md
allow_dirty = Changes

[Git::Commit]
allow_dirty = dist.ini
allow_dirty = README.md
allow_dirty = Changes

[Git::Tag]

[Git::Push]
