
name                = Test-Load-Helper
main_module         = lib/Test/Load/Helper.pm
author              = Branislav Zahradník <barney@cpan.org>
license             = Artistic_2_0
version             = 1.0.0
copyright_holder    = Branislav Zahradník
copyright_year      = 2026

[AutoPrereqs]

[Clean]

[ConfirmRelease]

[CopyFilesFromBuild]
copy = cpanfile
copy = LICENSE
copy = Build.PL
copy = xt/author/eol.t

[CPANFile]

[FakeRelease]

[Git::Check]
allow_dirty = dist.ini
allow_dirty = Build.PL

[Git::GatherDir]
exclude_filename = cpanfile
exclude_filename = LICENSE
exclude_filename = Build.PL
exclude_filename = TODO.org
exclude_filename = xt/author/eol.t
exclude_match = Test-Load-Helper-\d+\.\d+\.\d+.*
exclude_match = ^_build

[GitHub::Meta]
remote = upstream

[License]

[ManifestSkip]

[Manifest]

[MetaJSON]

[MetaYAML]

[MetaProvides::Package]

[ModuleBuild]

[NextRelease]
format = v%-9v %{yyyy-MM-dd HH:mm VVVV}d
time_zone = UTC

[PkgVersion]
use_package = 1

[Prereqs]
perl = 5.014

[Prereqs / TestRequires]
Test::EOL = 0

[PruneCruft]

[ReadmeAnyFromPod]
type = pod
filename = README.pod
location = root

[RunExtraTests]

[Test::EOL]

