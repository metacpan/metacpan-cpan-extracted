# PostgreSQL pod for dbio-postgresql-async integration tests.
#
# Usage:
#   kubectl apply -f maint/k8s/pg-pod.yaml
#   kubectl wait --for=condition=Ready pod/dbio-async-pg --timeout=60s
#   kubectl port-forward svc/dbio-async-pg-svc 5432:5432 &
#
#   DBIOTEST_PG_DSN='dbi:Pg:dbname=dbio_async;host=127.0.0.1;port=5432' \
#   DBIOTEST_PG_USER=dbio \
#   DBIOTEST_PG_PASS=dbio \
#     prove -l t/10-integration.t t/11-access-broker-live.t
#
#   kubectl delete -f maint/k8s/pg-pod.yaml
---
apiVersion: v1
kind: Pod
metadata:
  name: dbio-async-pg
  labels:
    app: dbio-async-pg
    role: dbio-test-db
spec:
  containers:
    - name: postgres
      image: postgres:17
      ports:
        - containerPort: 5432
      env:
        - name: POSTGRES_DB
          value: dbio_async
        - name: POSTGRES_USER
          value: dbio
        - name: POSTGRES_PASSWORD
          value: dbio
      readinessProbe:
        exec:
          command:
            - pg_isready
            - -U
            - dbio
            - -d
            - dbio_async
        initialDelaySeconds: 5
        periodSeconds: 3
        timeoutSeconds: 2
        failureThreshold: 30
---
apiVersion: v1
kind: Service
metadata:
  name: dbio-async-pg-svc
spec:
  selector:
    app: dbio-async-pg
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
