name: Publish Release
env:
  # Opt into Node.js 24 ahead of GitHub's 2026-06-02 default switch.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v1.1.0)'
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Checkout porting-sdk (mock_relay + mock_signalwire test harnesses)
        uses: actions/checkout@v5
        with:
          repository: signalwire/porting-sdk
          path: porting-sdk
          fetch-depth: 1
          token: ${{ secrets.PORTING_SDK_TOKEN }}

      - name: Setup Perl
        uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: '5.38'

      - name: Setup Python (for porting-sdk mock servers)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Perl dependencies
        run: cpanm --installdeps .

      - name: Install Python test harnesses (mock_relay + mock_signalwire)
        run: |
          pip install -e porting-sdk/test_harness/mock_relay
          pip install -e porting-sdk/test_harness/mock_signalwire

      - name: Run tests
        run: PERL5LIB="lib:t/lib" prove -r t/

      - name: Build and upload to CPAN
        env:
          CPAN_USERNAME: ${{ secrets.CPAN_USERNAME }}
          CPAN_PASSWORD: ${{ secrets.CPAN_PASSWORD }}
        run: |
          cpanm CPAN::Uploader
          perl Makefile.PL
          make manifest
          make
          make dist
          cpan-upload -u "$CPAN_USERNAME" -p "$CPAN_PASSWORD" SignalWire-*.tar.gz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          generate_release_notes: true
