          description: The text content of the message.
          examples:
            - Hello, how can I assist you today?
        lang:
          type: string
          description: Optional language code for the message (e.g., 'en', 'es', 'fr').
          examples:
            - en
      description: A message object representing a single turn in the conversation history.
      title: Conversation message object
    ConversationRole:
      type: string
      enum:
        - user
        - assistant
        - system
      title: Conversation message role
    CustomTranslationFilter:
      type: string
      pattern: ^prompt:.+$
      description: Custom translation filter with a prompt prefix. Use `prompt:` followed by your custom instructions (e.g., `prompt:Use formal business language`).
      title: Custom Filter
    DataMap:
      type: object
      properties:
        output:
          allOf:
            - $ref: '#/components/schemas/Output'
          description: |-
            An object that contains a response and a list of actions to be performed upon a SWAIG function call.
            This functions like a return statement in a function.
        expressions:
          type: array
          items:
            $ref: '#/components/schemas/Expression'
          description: An array of objects that have pattern matching logic to process the user's input data. A user can define multiple expressions to match against the user's input data.
        webhooks:
          type: array
          items:
            $ref: '#/components/schemas/Webhook'
          description: An array of objects that define external API calls.
      title: DataMap object
    Denoise:
      type: object
      required:
        - denoise
      properties:
        denoise:
          type: object
          description: Start noise reduction. You can stop it at any time using `stop_denoise`.
          examples:
            - {}
      title: denoise Method
    DetectMachine:
      type: object
      required:
        - detect_machine
      properties:
        detect_machine:
          type: object
          properties:
            detect_message_end:
              anyOf:
                - type: boolean
                - $ref: '#/components/schemas/SWMLVar'
              description: If `true`, stops detection on beep / end of voicemail greeting. Default `false`.
              examples:
                - true
              default: false
            detectors:
              type: string
              description: 'Comma-separated string of detectors to enable. Valid values: `amd`, `fax`.'
              examples:
                - amd,fax
              default: amd,fax
            end_silence_timeout:
              anyOf:
                - type: number
                - $ref: '#/components/schemas/SWMLVar'
              minimum: 0
              description: How long to wait for voice to finish. Default `1.0`.
              examples:
                - 1
              default: 1
            initial_timeout:
              anyOf:
                - type: number
                - $ref: '#/components/schemas/SWMLVar'
              minimum: 0
              description: How long to wait for initial voice before giving up. Default `4.5`.
              examples:
                - 4.5
              default: 4.5
            machine_ready_timeout:
              anyOf:
                - type: number
                - $ref: '#/components/schemas/SWMLVar'
              minimum: 0
              description: How long to wait for voice to finish before firing READY event. Default is `end_silence_timeout`.
              examples:
                - 2
            machine_voice_threshold:
              anyOf:
                - type: number
                - $ref: '#/components/schemas/SWMLVar'
              minimum: 0
              description: The number of seconds of ongoing voice activity required to classify as MACHINE. Default `1.25`.
              examples:
                - 1.25
              default: 1.25
            machine_words_threshold:
              anyOf:
                - type: integer
                - $ref: '#/components/schemas/SWMLVar'
              minimum: 0
              description: The minimum number of words that must be detected in a single utterance before classifying the call as MACHINE. Default `6`.
              examples:
                - 6
              default: 6
            status_url:
              type: string
              format: uri
              description: The http(s) URL to deliver detector events to.
              examples:
                - https://example.com/amd-status
            timeout:
              anyOf:
                - type: number
                - $ref: '#/components/schemas/SWMLVar'
              minimum: 0
              description: The max time to run detector. Default `30.0` seconds.
              examples:
                - 30
              default: 30
            tone:
              type: string
              enum:
                - CED
                - CNG
              description: The tone to detect, will only receive remote side tone. Default `CED`.
              examples:
                - CED
              default: CED
            wait:
              anyOf:
                - type: boolean
                - $ref: '#/components/schemas/SWMLVar'
              description: |-
                If false, the detector will run asynchronously and status_url must be set.
                If true, the detector will wait for detection to complete before moving to the next SWML instruction.
                Default is `true`.
              examples:
                - true
              default: true
          description: |-
            A detection method that combines AMD (Answering Machine Detection) and fax detection.
            Detect whether the user on the other end of the call is a machine (fax, voicemail, etc.) or a human.
            The detection result(s) will be sent to the specified status_url as a POST request
            and will also be saved in the detect_result variable.
      title: detect_machine Method
    Direction:
      type: string
      enum:
        - inbound
        - outbound
      title: Direction enum
    EnterQueue:
      type: object
      required:
        - enter_queue
      properties:
        enter_queue:
          allOf:
            - $ref: '#/components/schemas/EnterQueueObject'
          description: |-
            Place the current call in a named queue where it will wait to be connected to an available agent or resource.
            While waiting, callers will hear music or custom audio.
            When an agent connects to the queue (using the connect method), the caller and agent are bridged together.
            After the bridge completes, execution continues with the SWML script specified in transfer_after_bridge.
          title: enter_queue
      title: enter_queue Method
    EnterQueueObject:
      type: object
      required:
        - queue_name
        - transfer_after_bridge
      properties:
        queue_name:
          type: string
          description: Name of the queue to enter. If a queue with this name does not exist, it will be automatically created.
          examples:
            - support-queue
        transfer_after_bridge:
          anyOf:
            - type: string
            - $ref: '#/components/schemas/SWMLVar'
          description: |-
            SWML to execute after the bridge completes. This defines what should happen after the call is connected to an agent and the bridge ends.
            Can be either:
            - A URL (http or https) that returns a SWML document
            - An inline SWML document (as a JSON string)
          examples:
            - https://example.com/post-call-survey
        status_url:
          type: string
          format: uri
          description: HTTP or HTTPS URL to deliver queue status events. Default not set
          examples:
            - https://example.com/queue-status
        wait_url:
          anyOf:
            - type: string
              format: uri
            - $ref: '#/components/schemas/SWMLVar'
          description: URL for media to play while waiting in the queue. Default hold music will be played if not set
          examples:
            - https://example.com/queue-music.mp3
        wait_time:
          anyOf:
            - type: integer
            - $ref: '#/components/schemas/SWMLVar'
          minimum: 1
          description: Maximum time in seconds to wait in the queue before timeout. Default `3600`
          examples:
            - 1800
          default: 3600
      title: EnterQueueObject object
    Execute:
      type: object
      required:
        - execute
      properties:
        execute:
          type: object
          properties:
            dest:
              type: string
              description: |-
                Specifies what to execute. The value can be one of:
                - `<section_name>` - section in the current document to execute
                - A URL (http or https) that returns a SWML document - Sends HTTP POST
                - An inline SWML document (as a JSON string)
              examples:
                - https://example.com/swml-handler
            params:
              type: object
              unevaluatedProperties: {}
              description: Named parameters to send to section or URL
              examples:
                - caller_id: '+15551234567'
                  language: en-US
            meta:
              type: object
              unevaluatedProperties: {}
              description: User-defined metadata, ignored by SignalWire
              examples:
                - request_id: req_abc123
                  source: ivr
            on_return:
              description: The list of SWML instructions to be executed when the executed section or URL returns
              type: array
              items:
                $ref: '#/components/schemas/SWMLMethod'
            result:
              anyOf:
                - $ref: '#/components/schemas/ExecuteSwitch'
                - type: array
                  items:
                    $ref: '#/components/schemas/CondParams'
                  description: Execute a sequence of instructions depending on the value of a JavaScript condition.
                  title: cond
              description: |-
                Action to take based on the result of the call. This will run once the peer leg of the call has ended.
                Will use the switch method when the return_value is an object, and will use the cond method when the return_value is an array.
          required:
            - dest
          description: |-
            Execute a specified section or URL as a subroutine, and upon completion, return to the current document.
            Use the return statement to pass any return values or objects back to the current document.
      title: execute Method
    ExecuteSwitch:
      type: object
      required:
        - case
      properties:
        variable:
          type: string
          description: |-
            Name of the variable whose value needs to be compared. If not provided, it will check the `return_value` variable.
            Can be one of the listed set of variables, or a string to represent a custom variable.
          examples:
            - return_value
        case:
          type: object
          unevaluatedProperties:
            type: array
            items:
              $ref: '#/components/schemas/SWMLMethod'
          description: Object of values mapped to array of instructions to execute
        default:
          description: Array of instructions to execute if no cases match
          type: array
          items:
            $ref: '#/components/schemas/SWMLMethod'
      title: ExecuteSwitch object
    Expression:
      type: object
      required:
        - string
        - pattern
        - output
      properties:
        string:
          type: string
          description: The actual input or value from the user or system.
          examples:
            - I want a refund
        pattern:
          type: string
          description: A regular expression pattern to validate or match the string.
          examples:
            - refund|return|money back
        output:
          allOf:
            - $ref: '#/components/schemas/Output'
          description: An object that contains a response and a list of actions to be performed upon a expression match.
      title: Expression object
    FabricDeviceLeg:
      type: object
      required:
