name = App-karr
author = Torsten Raudssus <torsten@raudssus.de>
license = Perl_5
copyright_holder = Torsten Raudssus <torsten@raudssus.de> L<https://raudssus.de/>
copyright_year = 2026
main_module = lib/App/karr.pm

[@Author::GETTY]

; Build Docker image (latest) after dzil build so dev builds can be tested locally
run_after_build = cp ./%n-%v.tar.gz ..
run_after_build = docker build ${KARR_DOCKER_BUILD_ARGS:-} -f %d/Dockerfile --build-arg KARR_TGZ=%n-%v.tar.gz -t raudssus/karr:latest ..

; Release: GitHub release + versioned Docker tags
run_after_release = ${GH_BIN:-gh} release view %v -R Getty/p5-app-karr >/dev/null 2>&1 || ${GH_BIN:-gh} release create %v -R Getty/p5-app-karr --title %v --notes 'Dist::Zilla release'
run_after_release = ${GH_BIN:-gh} release upload %v -R Getty/p5-app-karr %n-%v.tar.gz --clobber
run_after_release = docker build ${KARR_DOCKER_BUILD_ARGS:-} -f %d/Dockerfile --build-arg KARR_TGZ=%n-%v.tar.gz -t raudssus/karr:%v -t raudssus/karr:$(echo %v | cut -d. -f1) .
run_after_release = docker push raudssus/karr:%v
run_after_release = docker push raudssus/karr:$(echo %v | cut -d. -f1)
