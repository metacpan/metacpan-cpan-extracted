name    = App-Raider
author  = Torsten Raudssus <torsten@raudssus.de> L<https://raudssus.de/>
license = Perl_5
copyright_holder = Torsten Raudssus
copyright_year   = 2026
main_module = lib/App/Raider.pm

; Getty release command:
;   dzil release
; run_after_release hooks publish a GitHub release and push the Docker
; Hub image (raudssus/raider). They use gh + docker; override either
; binary via GH_BIN / DOCKER_BIN. Extra docker build args:
;   RAIDER_DOCKER_BUILD_ARGS='--platform linux/amd64,linux/arm64' dzil release

[@Author::GETTY]
irc = #langertha
irc_user = Getty
run_after_release = ${GH_BIN:-gh} release view %v -R Getty/p5-app-raider >/dev/null 2>&1 || ${GH_BIN:-gh} release create %v -R Getty/p5-app-raider --title %v --notes 'Dist::Zilla release'
run_after_release = ${GH_BIN:-gh} release upload %v -R Getty/p5-app-raider App-Raider-%v.tar.gz --clobber
run_after_release = ${DOCKER_BIN:-docker} build ${RAIDER_DOCKER_BUILD_ARGS:-} --build-arg RAIDER_VERSION=%v --target runtime-root -t raudssus/raider:%v -t raudssus/raider:latest .
run_after_release = ${DOCKER_BIN:-docker} push raudssus/raider:%v
run_after_release = ${DOCKER_BIN:-docker} push raudssus/raider:latest
