name    = Langertha-Knarr
author  = Torsten Raudssus <torsten@raudssus.de> L<https://raudssus.de/>
license = Perl_5
copyright_holder = Torsten Raudssus
copyright_year   = 2026

; Getty release command:
;   dzil release
; Optional Docker override during release:
;   KNARR_DOCKER_BUILD_ARGS='--build-arg LANGERTHA_SRC=https://github.com/Getty/langertha/releases/download/0.307/Langertha-0.307.tar.gz' dzil release
; Fallback without GitHub release assets:
;   KNARR_DOCKER_BUILD_ARGS='--build-arg LANGERTHA_SRC=GETTY/Langertha-0.307.tar.gz' dzil release
; Note: do not use GitHub source archives (/archive/refs/*) for dzil dists.

[@Author::GETTY]
run_after_release = ${GH_BIN:-gh} release view %v -R Getty/langertha-knarr >/dev/null 2>&1 || ${GH_BIN:-gh} release create %v -R Getty/langertha-knarr --title %v --notes 'Dist::Zilla release'
run_after_release = ${GH_BIN:-gh} release upload %v -R Getty/langertha-knarr Langertha-Knarr-%v.tar.gz --clobber
run_after_release = docker build ${KNARR_DOCKER_BUILD_ARGS:-} -t raudssus/langertha-knarr:%v -t raudssus/langertha-knarr:latest -t raudssus/langertha-knarr:$(echo %v | cut -d. -f1) %d
run_after_release = docker push raudssus/langertha-knarr:%v
run_after_release = docker push raudssus/langertha-knarr:$(echo %v | cut -d. -f1)
run_after_release = docker push raudssus/langertha-knarr:latest
