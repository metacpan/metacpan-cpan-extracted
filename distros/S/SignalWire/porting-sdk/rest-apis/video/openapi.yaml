          description: 'Conference stops accepting new participants at this time, but keeps running until all participants leave. Expects RFC 3339 datetime: `2022-01-01T23:59:60Z`. Date only: `2022-01-01` will be converted to `2022-01-01T00:00:00Z`.'
          examples:
            - '2022-12-31T23:59:59Z'
        quality:
          allOf:
            - $ref: '#/components/schemas/VideoQuality'
          description: The conference's resolution.
          examples:
            - 720p
          default: 720p
        layout:
          allOf:
            - $ref: '#/components/schemas/VideoLayout'
          description: The conference's initial layout.
          examples:
            - grid-responsive
          default: grid-responsive
        size:
          allOf:
            - $ref: '#/components/schemas/ConferenceSize'
          description: The size of the video conference.
          examples:
            - medium
          default: medium
        record_on_start:
          type: boolean
          description: Whether to start recording when a conference session begins.
          examples:
            - true
        tone_on_entry_and_exit:
          type: boolean
          description: Whether a tone is played when a member enters or exits the conference.
          examples:
            - true
        room_join_video_off:
          type: boolean
          description: Whether participants join with video off by room setting.
          examples:
            - false
        user_join_video_off:
          type: boolean
          description: Whether participants join with video off by user setting.
          examples:
            - false
        enable_room_previews:
          type: boolean
          description: Whether a preview video of the conference content is generated.
          examples:
            - true
        enable_chat:
          type: boolean
          description: Whether group chat is enabled for conference participants.
          examples:
            - true
        dark_primary:
          type: string
          pattern: ^#[0-9a-fA-F]{6}$
          description: CTA buttons and selected items color (dark theme).
          examples:
            - '#044EF4'
        dark_background:
          type: string
          pattern: ^#[0-9a-fA-F]{6}$
          description: Main background color (dark theme).
          examples:
            - '#FFFFFF'
        dark_foreground:
          type: string
          pattern: ^#[0-9a-fA-F]{6}$
          description: Main foreground color (dark theme).
          examples:
            - '#1D2127'
        dark_success:
          type: string
          pattern: ^#[0-9a-fA-F]{6}$
          description: Success indication color (dark theme).
          examples:
            - '#17BB58'
        dark_negative:
          type: string
          pattern: ^#[0-9a-fA-F]{6}$
          description: Error indication color (dark theme).
          examples:
            - '#F42C50'
        light_primary:
          type: string
          pattern: ^#[0-9a-fA-F]{6}$
          description: CTA buttons and selected items color (light theme).
          examples:
            - '#044EF4'
        light_background:
          type: string
          pattern: ^#[0-9a-fA-F]{6}$
          description: Main background color (light theme).
          examples:
            - '#FFFFFF'
        light_foreground:
          type: string
          pattern: ^#[0-9a-fA-F]{6}$
          description: Main foreground color (light theme).
          examples:
            - '#1D2127'
        light_success:
          type: string
          pattern: ^#[0-9a-fA-F]{6}$
          description: Success indication color (light theme).
          examples:
            - '#17BB58'
        light_negative:
          type: string
          pattern: ^#[0-9a-fA-F]{6}$
          description: Error indication color (light theme).
          examples:
            - '#F42C50'
      description: Request body for updating a conference.
    UpdateRoomRequest:
      type: object
      properties:
        display_name:
          type: string
          maxLength: 200
          description: Display name of the room. Maximum of 200 characters. Defaults to the value of name.
          examples:
            - My Room's Name
        description:
          type: string
          maxLength: 3000
          description: Description of the room. Maximum of 3000 characters.
          examples:
            - This room will be used for full company all hands meetings
        max_members:
          type: integer
          format: int32
          minimum: 1
          maximum: 300
          description: The maximum number of members in the room at a time. Must be at least 1 to a maximum of 300.
          examples:
            - 20
          default: 20
        quality:
          allOf:
            - $ref: '#/components/schemas/VideoQuality'
          description: The room's resolution.
          examples:
            - 720p
          default: 720p
        join_from:
          type: string
          format: date-time
          description: 'Room does not accept new participants before this time. Expects RFC 3339 datetime: `2022-01-01T23:59:60Z`. Date only: `2022-01-01` will be converted to `2022-01-01T00:00:00Z`.'
          examples:
            - '2022-01-01T00:00:00Z'
        join_until:
          type: string
          format: date-time
          description: 'Room stops accepting new participants at this time, but keeps running until all participants leave. Expects RFC 3339 datetime: `2022-01-01T23:59:60Z`. Date only: `2022-01-01` will be converted to `2022-01-01T00:00:00Z`.'
          examples:
            - '2022-12-31T23:59:59Z'
        remove_at:
          type: string
          format: date-time
          description: 'Remove users from the room at this time. Expects RFC 3339 datetime: `2022-01-01T23:59:60Z`. Date only: `2022-01-01` will be converted to `2022-01-01T00:00:00Z`.'
          examples:
            - '2022-12-31T23:59:59Z'
        remove_after_seconds_elapsed:
          type: integer
          format: int32
          minimum: 1
          maximum: 200000
          description: Remove users after they are in the room for N seconds.
          examples:
            - 120
        layout:
          allOf:
            - $ref: '#/components/schemas/RoomLayout'
          description: The room's initial layout.
          examples:
            - grid-responsive
          default: grid-responsive
        record_on_start:
          type: boolean
          description: Specifies whether to start recording a Room Session when one is started for this Room.
          examples:
            - false
          default: false
        enable_room_previews:
          type: boolean
          description: Whether a video with a preview of the content of the room is to be generated.
          examples:
            - false
          default: false
        meta:
          type: object
          unevaluatedProperties: {}
          description: User-defined metadata for the room. Must be a valid JSON object. Maximum of 2000 characters when serialized.
          examples:
            - {}
        sync_audio_video:
          type: boolean
          description: Enable/disable jitter buffer audio-video sync.
          examples:
            - true
      description: Request body for updating a room.
    UpdateStreamRequest:
      type: object
      required:
        - url
      properties:
        url:
          type: string
          description: RTMP or RTMPS URL. This must be the address of a server accepting incoming RTMP/RTMPS streams.
          examples:
            - rtmp://broadcaster
      description: Request body for updating a stream.
    VideoFps:
      type: number
      enum:
        - 20
        - 30
      description: Video frames per second.
    VideoLayout:
      type: string
      enum:
        - grid-responsive
        - grid-responsive-mobile
        - highlight-1-responsive
        - 1x1
        - 2x1
        - 2x2
        - 5up
        - 3x3
        - 4x4
        - 5x5
        - 6x6
        - 8x8
        - 10x10
      description: Video room layout options.
    VideoLog:
      anyOf:
        - $ref: '#/components/schemas/Log'
        - $ref: '#/components/schemas/DiscardedLog'
      description: A video log entry. Discarded logs return only `id`, `discarded_at`, and `created_at`.
    VideoQuality:
      type: string
      enum:
        - 720p
        - 1080p
      description: Video quality resolution.
    VideoStatusCode422:
      type: object
      required:
        - errors
      properties:
        errors:
          type: array
          items:
            $ref: '#/components/schemas/Types.StatusCodes.RestApiErrorItem'
          description: List of validation errors.
      description: The request contains invalid parameters. See errors for details.
      examples:
        - statusCode: 422
          errors:
            - type: validation_error
              code: invalid_parameter
              message: Name must be present
              attribute: name
              url: https://signalwire.com/docs/apis/error-codes
  securitySchemes:
    SignalWireBasicAuth:
      type: http
      scheme: Basic
      description: |-
        SignalWire Basic Authentication using Project ID and API Token.

        The client sends HTTP requests with the Authorization header containing
        the word Basic followed by a space and a base64-encoded string of project_id:token.
        The project ID will be used as the username and the API token as the password.

        Example:
        ```
        Authorization: Basic base64(project_id:token)
        ```
      x-fern-basic:
        username:
          name: project_id
          env: SIGNALWIRE_PROJECT_ID
        password:
          name: api_token
          env: SIGNALWIRE_API_TOKEN
servers:
  - url: https://{space_name}.signalwire.com/api/video
    description: Endpoint
    variables:
      space_name:
        default: '{your_space_name}'
        description: The domain of the users SignalWire space.
