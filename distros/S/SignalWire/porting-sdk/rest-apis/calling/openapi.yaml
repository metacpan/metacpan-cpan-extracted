    CallAIMessageRequest:
      type: object
      required:
        - id
        - command
        - params
      properties:
        id:
          allOf:
            - $ref: '#/components/schemas/uuid'
          description: The unique identifying ID of a existing call.
          examples:
            - 3fa85f64-5717-4562-b3fc-2c963f66afa6
        command:
          type: string
          enum:
            - calling.ai_message
          description: The `calling.ai_message` command is used to inject a message into the AI conversation.
          examples:
            - calling.ai_message
        params:
          type: object
          properties:
            role:
              type: string
              enum:
                - system
                - user
                - assistant
              description: |-
                The role that the message is from. Required when `reset` is not provided. Each role type has a different purpose and will influence how the AI will interpret the message.
                - `system`: Inject instructions or context that modify the AI's behavior mid-conversation without the caller hearing it. This could change the AI's personality, add new constraints, provide context about the conversation, or give the AI information it should know going forward.
                - `user`: Inject a message as if the caller said it. This would appear in the conversation history as coming from the caller, and the AI would respond to it as if the caller just spoke it.
                - `assistant`: Inject a message as if the AI said it. This would appear as an AI response in the conversation history. The AI would treat this as its own previous response when generating future replies.
              examples:
                - system
            message_text:
              type: string
              description: The text content that will be sent to the AI. Required when `reset` is not provided.
              examples:
                - You are now in expert mode. Provide detailed technical responses.
            reset:
              allOf:
                - $ref: '#/components/schemas/CallAIMessageResetParams'
              description: Parameters for resetting the AI conversation state. When provided, `role` and `message_text` are optional.
              examples:
                - full_reset: true
                  system_prompt: You are a helpful assistant.
            global_data:
              type: object
              unevaluatedProperties: {}
              description: Arbitrary JSON data to merge into the AI session's global data store.
              examples:
                - customer_tier: premium
                  language: en
          description: An object of parameters that will be utilized by the active command.
      title: calling.ai_message
    CallAIMessageResetParams:
      type: object
      properties:
        full_reset:
          type: boolean
          description: Whether to perform a full reset of the AI conversation, clearing all history.
          examples:
            - true
        user_prompt:
          type: string
          description: A new user prompt to set after resetting the conversation.
          examples:
            - You are a helpful assistant.
        system_prompt:
          type: string
          description: A new system prompt to set after resetting the conversation.
          examples:
            - You are a customer support agent for SignalWire.
      description: Parameters for resetting the AI conversation state.
    CallCreate422Error:
      type: object
      required:
        - errors
      properties:
        errors:
          type: array
          items:
            $ref: '#/components/schemas/Types.StatusCodes.RestApiErrorItem'
          description: List of validation errors.
      description: The request contains invalid parameters. See errors for details.
      examples:
        - statusCode: 422
          errors:
            - type: validation_error
              code: missing_required_parameter
              message: url must be a valid http or https url
              attribute: url
              url: https://signalwire.com/docs/apis/error-codes
    CallCreateParamsSWML:
      type: object
      required:
        - from
        - to
        - swml
      properties:
        from:
          type: string
          description: The address that initiated the call. Can be either a E.164 formatted number (`+xxxxxxxxxxx`), or a SIP endpoint (`sip:xxx@yyy.zzz`).
          examples:
            - sip:from-sip@example-112233445566.sip.signalwire.com
        to:
          type: string
          description: The address that received the call. Can be either a E.164 formatted number (`+xxxxxxxxxxx`), or a SIP endpoint (`sip:xxx@yyy.zzz`).
          examples:
            - sip:from-sip@example-112233445567.sip.signalwire.com
        caller_id:
          type: string
          description: The number, in E.164 format, or identifier of the caller.
          examples:
            - '+1234567890'
        fallback_url:
          type: string
          description: The Fallback URL to handle the call. This parameter allows you to specify a backup webhook or different route in your code containing SWML instructions for handling the call.
          examples:
            - https://example.com/fallback
        status_url:
          type: string
          format: uri
          description: A URL that will recieve status updates of the current call. Any call events defined in `status_events` will be delivered to the defined URL.
          examples:
            - https://example.com/status_callback
        status_events:
          type: array
          items:
            type: string
            enum:
              - answered
              - queued
              - initiated
              - ringing
              - ending
              - ended
          description: The call events that will be monitored and sent to the `status_url` when active.
          examples:
            - - answered
              - ended
          default:
            - ended
        url_method:
          type: string
          description: The HTTP method to use when requesting the URL.
          examples:
            - POST
          default: POST
        codecs:
          anyOf:
            - type: array
              items:
                type: string
            - type: string
          description: 'A list of codecs to use for the call. Can be an array of codec strings or a comma-separated string. Valid codecs are: `PCMU`, `PCMA`, `G722`, `G729`, `OPUS`, `VP8`, `H264`. For PSTN calls, `PCMA` and `PCMU` are recommended as many other codecs are not supported by PSTN gateways. If a SIP URI with included codecs is passed in the `to` field along with this parameter, the SIP URI codecs will be prioritized.'
          examples:
            - - OPUS
              - G729
              - VP8
              - PCMA  
        swml:
          allOf:
            - $ref: '#/components/schemas/SWMLObject'
          description: Inline SWML object containing SWML instructions for handling the call. Either `url` or `swml` must be included for a new call.
      title: dial (Inline SWML)
