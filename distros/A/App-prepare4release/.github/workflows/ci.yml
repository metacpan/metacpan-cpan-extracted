# Generated by App::prepare4release -- matrix from MIN_PERL_VERSION / use v5.x and latest stable from MetaCPAN
name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        perl-version: ['5.10', '5.12', '5.14', '5.16', '5.18', '5.20', '5.22', '5.24', '5.26', '5.28', '5.30', '5.32', '5.34', '5.36', '5.38', '5.40', '5.42']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Perl
        uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: ${{ matrix.perl-version }}

      - name: Install dependencies (cpanm)
        run: |
          curl -sL https://cpanmin.us | perl - App::cpanminus
          perl Makefile.PL
          cpanm --notest --installdeps .
          cpanm --notest Test2::Suite~0.000139

      - name: Run tests
        run: prove -lr t
