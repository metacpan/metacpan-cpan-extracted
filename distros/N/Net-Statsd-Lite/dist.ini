name    = Net-Statsd-Lite
author  = Robert Rothenberg <perl@rhizomnic.com>
license = Artistic_2_0
copyright_holder = Robert Rothenberg
copyright_year   = 2018-2026

[Keywords]
keyword = client
keyword = StatsD
keyword = metrics
keyword = monitoring

[GatherDir]
exclude_match = cpanfile*
exclude_filename = LICENSE
exclude_filename = SECURITY.md
exclude_filename = doap.xml
prune_directory = ^local
[PruneCruft]
[CPANFile]
[License]
[DOAP]
[ExecDir]
[ShareDir]
[MakeMaker]
[Manifest]
[CheckSelfDependency]
[TestRelease]
[CheckExtraTests]
[ConfirmRelease]
[SigStore::SignRelease]

[StaticInstall]
mode = auto
dry_run = 0

[RecommendedPrereqs]
[AutoPrereqs]
[RemovePrereqs]
remove = Type::Library
remove = Type::Utils

[Prereqs / BuildRequires ]
-phase = build
-relationship = recommends
ExtUtils::MakeMaker = 7.22
Module::Metadata = 1.000015

[Prereqs / DevelopRequires ]
-phase = develop
-relationship = requires
Software::Security::Policy::Individual = 0.10
Test::CVE = 0.08
Test::Vars = 0.015

; [EnsurePrereqsInstalled]
; :version = 0.003
; type = requires
; type = recommends

[AutomationPolicy]
template = issues_only

[SecurityPolicy]
; authordep Software::Security::Policy::Individual
-policy = Individual
timeframe = 2 weeks
perl_support_years = 10
git_url = https://github.com/robrwo/Net-Statsd-Lite
report_url = https://github.com/robrwo/Net-Statsd-Lite/security/advisories

[GitHub::Meta]
repo = git://github.com/robrwo/Net-Statsd-Lite.git

[PodWeaver]
; authordep Pod::Weaver::Plugin::AppendPrepend
; authordep Pod::Weaver::Section::Contributors
; authordep Pod::Weaver::Section::SourceGitHub

[UsefulReadme]
; authordep Pod::Markdown::Github
type     = gfm
filename = README.md
location = build

[CopyFilesFromBuild]
copy = LICENSE
copy = README.md
copy = SECURITY.md
copy = cpanfile
copy = doap.xml

[PruneFiles]
match = ~$

[Metadata]
x_authority    = cpan:RRWO

[MetaProvides::Package]
[MetaJSON]
[MetaYAML]

[Prereqs / TestRequires ]
Test::TCP = 2.22 ; Net::Emptyport has no version

; authordep Pod::Weaver::Plugin::AppendPrepend
; authordep Pod::Weaver::Section::Contributors
; authordep Pod::Weaver::Section::SourceGitHub

[PodSyntaxTests]
[Test::DistManifest]
; authordep Test::DistManifest
[Test::CleanNamespaces]
[Test::EOF]
; authordep Test::EOF
[Test::EOL]
:version = 0.14
[Test::Fixme]
[Test::MinimumVersion]
[Test::NoTabs]
[Test::Perl::Critic]
critic_config = xt/etc/perlcritic.rc

[Test::Pod::Coverage::Configurable]
also_private = qr/^(DEMOLISH|BUILD)$/
skip = Net::Statsd::Lite::Types
[Test::Pod::LinkCheck]
[Test::Portability]
; authordep Test::TrailingSpace
[Test::TrailingSpace]
filename_regex = \.(?:p[lm]|pod)\z
[Test::Kwalitee]
[Test::ReportPrereqs]
:version = 0.022
version_extractor = Module::Metadata
verify_prereqs = 1

[Test::CVE]
[MojibakeTests]
[Test::MixedScripts]
; authordep Test::MixedScripts
[Test::CPAN::Changes]
; authordep Test::CPAN::Changes

[Test::PodSpelling]
[Test::UnusedVars]

[MetaTests]
[Test::Version]
[Test::Compile]
; authordep Test::Compile
filename = xt/00-compile.t

[@Git]
allow_dirty = dist.ini
push_to     = origin master:master
tag_format  = %v
commit_msg  = %v%n%n%c

[Git::Contributors]
:version = 0.019

[RewriteVersion]
[NextRelease]
[BumpVersionAfterRelease]

[Git::Commit / Commit_Changes] ; commit Changes (for new dev)
allow_dirty_match = ^lib/
commit_msg = Commit Changes and bump $VERSION
