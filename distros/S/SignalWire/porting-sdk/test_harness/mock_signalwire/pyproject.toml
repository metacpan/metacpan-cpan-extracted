[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "mock-signalwire"
version = "0.1.0"
description = "Schema-driven mock SignalWire REST API server. Shared test backend for every SignalWire SDK port."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.10"
authors = [
  { name = "SignalWire SDK Porting Team", email = "support@signalwire.com" },
]

# Pinned versions — the mock server is a test artefact, not a library
# dependency, so we want reproducible installs.
dependencies = [
  "starlette==0.46.2",
  "uvicorn==0.34.2",
  "pyyaml==6.0.2",
]

[project.optional-dependencies]
dev = [
  "pytest>=8",
  "requests>=2.31",
]

[project.scripts]
mock-signalwire = "mock_signalwire.cli:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["mock_signalwire*"]

[tool.setuptools.package-data]
mock_signalwire = ["py.typed"]
