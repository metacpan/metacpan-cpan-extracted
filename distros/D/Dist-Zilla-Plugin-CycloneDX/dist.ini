name    = Dist-Zilla-Plugin-CycloneDX
author  = Leon Timmermans <fawaka@gmail.com>
license = Perl_5
copyright_holder = Leon Timmermans
copyright_year   = 2026

[Git::GatherDir]
[PruneCruft]
[MetaYAML]
[License]
[Manifest]
[Readme]

[AutoPrereqs]
[MetaJSON]
[GitHub::Meta]
[Git::NextVersion]
[MetaProvides::Package]
[IRC]
channel = distzilla

[ModuleBuildTiny]

[Test::Compile]
[PodSyntaxTests]

[InstallGuide]
[PodWeaver]
[PkgVersion]
[NextRelease]

[CheckChangesHasContent]
[Git::Check]
[RunExtraTests]
[TestRelease]
[ConfirmRelease]

[MinimumPerl]
[Bootstrap::lib]
[CycloneDX]

[UploadToCPAN]

[Git::Commit]
[Git::Tag]
[Git::Push]
