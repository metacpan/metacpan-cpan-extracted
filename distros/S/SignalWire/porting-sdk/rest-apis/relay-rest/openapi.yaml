  /phone_numbers/search:
    get:
      operationId: search_available_phone_numbers
      summary: Search for available Phone Numbers to Purchase
      description: |-
        Searches for available phone numbers to purchase.

        #### Permissions

        The API token used to authenticate must have the following scope(s) enabled to make a successful request: _Numbers_.

        [Learn more about API scopes](/docs/platform/your-signalwire-api-space).
      parameters:
        - name: areacode
          in: query
          required: false
          description: An areacode to search within.
          schema:
            type: string
          explode: false
        - name: number_type
          in: query
          required: false
          description: Search for either local or toll-free numbers. Defaults to local.
          schema:
            type: string
          explode: false
        - name: starts_with
          in: query
          required: false
          description: A string of 3 to 7 digits that should be used as the start of a number. Cannot be used in combination with contains or ends_with.
          schema:
            type: string
          explode: false
        - name: contains
          in: query
          required: false
          description: A string of 3 to 7 digits that should appear somewhere in the number. Cannot be used in combination with starts_with or ends_with.
          schema:
            type: string
          explode: false
        - name: ends_with
          in: query
          required: false
          description: A string of 3 to 7 digits that should be used as the end of a number. Cannot be used in combination with starts_with or contains.
          schema:
            type: string
          explode: false
        - name: max_results
          in: query
          required: false
          description: The maximum number of matches to return. Upper limit of 100. Defaults to 50.
          schema:
            type: integer
            format: int32
          explode: false
        - name: region
          in: query
          required: false
          description: A region or state to search within. Must be an ISO 3166-2 alpha-2 code, i.e. TX for Texas. Cannot be used in combination with areacode.
          schema:
            type: string
          explode: false
        - name: city
          in: query
          required: false
          description: A specific City to search within. Must be used in combination with region. Cannot be used in combination with areacode, starts_with, contains, or ends_with.
          schema:
            type: string
          explode: false
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvailablePhoneNumbersResponse'
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Types.StatusCodes.StatusCode401'
        '500':
          description: An internal server error occurred.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Types.StatusCodes.StatusCode500'
      tags:
        - Phone Numbers
