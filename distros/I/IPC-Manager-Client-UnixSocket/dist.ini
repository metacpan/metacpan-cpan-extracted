name    = IPC-Manager-Client-UnixSocket
author  = Chad Granum <exodist@cpan.org>
license = Perl_5
copyright_holder = Chad Granum

[RewriteVersion] ; sets dist version from main module's $VERSION
[License]
[ManifestSkip]
[Manifest]
[NextRelease]
[GatherDir]
exclude_match = ^xt/downstream      ; only run these tests locally
exclude_filename = LICENSE
exclude_filename = Makefile.PL
exclude_filename = cpanfile
exclude_filename = README
exclude_filename = README.md

[PodSyntaxTests]
[TestRelease]

[MetaResources]
bugtracker.web  = https://github.com/exodist/IPC-Manager-Client-UnixSocket/issues
repository.url  = https://github.com/exodist/IPC-Manager-Client-UnixSocket/
repository.type = git

[Prereqs]
perl              = 5.012000
parent            = 0
Carp              = 0
File::Spec        = 0
POSIX             = 0
IPC::Manager      = 0.000010
IO::Socket::UNIX  = 1.55
Object::HashBase  = 0.015

[Prereqs / RuntimeSuggests]
IO::Select       = 1.55
Linux::Inotify2  = 2.3

[Prereqs / TestRequires]
Test2::V1              = 1.302219
Test2::API             = 1.302219
Test2::Require::Module = 1.302219

[MakeMaker]
[CPANFile]
[MetaYAML]
[MetaJSON]

; authordep Pod::Markdown
[ReadmeFromPod / Markdown]
filename = lib/IPC/Manager/Client/UnixSocket.pm
type = markdown
readme = README.md

[ReadmeFromPod / Text]
filename = lib/IPC/Manager/Client/UnixSocket.pm
type = text
readme = README

[CopyFilesFromBuild]
copy = LICENSE
copy = cpanfile
copy = README
copy = README.md
copy = Makefile.PL

[Git::Check]
allow_dirty = Makefile.PL
allow_dirty = README
allow_dirty = README.md
allow_dirty = cpanfile
allow_dirty = LICENSE
allow_dirty = Changes

[Git::Commit]
allow_dirty = Makefile.PL
allow_dirty = README
allow_dirty = README.md
allow_dirty = cpanfile
allow_dirty = LICENSE
allow_dirty = Changes

[Git::Tag]

[FakeRelease]

[BumpVersionAfterRelease]

[Git::Commit / Commit_Changes]
munge_makefile_pl = true
allow_dirty_match = ^lib
allow_dirty = Makefile.PL
allow_dirty = README
allow_dirty = README.md
allow_dirty = cpanfile
allow_dirty = LICENSE
commit_msg = Automated Version Bump
