type: app
package: Yote::YapiServer::App::Example

public_vars:
  appName: Example App
  appVersion: 1.0.0

cols:
  messages: '*ARRAY_*::Message'

field_access:
  messages:
    auth: 1

methods:
  hello:
    access: public
    code: |
      my ($self, $args, $session) = @_;
      my $name = $args->{name} // 'World';
      return 1, "Hello, $name!";

  getStats:
    access: public
    code: |
      my ($self, $args, $session) = @_;
      my $messages = $self->get_messages // [];
      return 1, {
          messageCount => scalar(@$messages),
          appVersion   => $PUBLIC_VARS{appVersion},
      };

  postMessage:
    access: auth
    code: |
      my ($self, $args, $session) = @_;
      my $user = $session->get_user;

      my $text = $args->{text};
      return 0, "text required" unless $text;

      my $store = $self->store;
      my $message = $store->new_obj(
          'Yote::YapiServer::App::Example::Message',
          owner => $user,
          text   => $text,
      );

      my $messages = $self->get_messages;
      push @$messages, $message;

      return 1, $message;

  getMessages:
    access: auth
    code: |
      my ($self, $args, $session) = @_;
      my $limit = $args->{limit} // 20;
      my $offset = $args->{offset} // 0;

      my $messages = $self->get_messages // [];
      my $total = scalar(@$messages);

      # Return slice
      my $end = $offset + $limit - 1;
      $end = $total - 1 if $end >= $total;

      my @slice = @{$messages}[$offset..$end];

      return 1, {
          messages => \@slice,
          total    => $total,
          limit    => $limit,
          offset   => $offset,
      };

  clearMessages:
    access: admin_only
    code: |
      my ($self, $args, $session) = @_;
      @{$self->get_messages} = ();
      return 1, { cleared => 1 };

objects:
  Message:
    cols:
      owner: '*Yote::YapiServer::User'
      text: TEXT
      created: TIMESTAMP DEFAULT CURRENT_TIMESTAMP

    field_access:
      owner: public
      text: public
      created: public
