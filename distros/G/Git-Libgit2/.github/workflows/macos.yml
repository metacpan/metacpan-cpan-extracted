name: macos
on:
  push:
    branches:
      - '*'
    tags-ignore:
      - '*'
  pull_request:
jobs:
  macos:
    runs-on: macos-14
    env:
      # Help FFI::Platypus find Homebrew libs (Apple Silicon path).
      # Job-level so it reaches the composite action's dzil step.
      DYLD_FALLBACK_LIBRARY_PATH: /opt/homebrew/lib:/usr/local/lib
    steps:
      - uses: actions/checkout@v4
      # Alien::Libgit2 is not on CPAN yet — install from sibling repo.
      - name: Checkout Alien::Libgit2
        uses: actions/checkout@v4
        with:
          repository: getty/p5-alien-libgit2
          path: vendor/alien-libgit2
      - name: Install Homebrew libgit2
        run: brew install libgit2 pkg-config
      - name: Set up Perl
        uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: '5.40'
      - name: perl -V
        run: perl -V
      - name: Install Dist::Zilla
        env:
          PERL_CPANM_OPT: --mirror http://cpan.metacpan.org --mirror-only
        run: cpanm -nq Dist::Zilla
      - name: Install Alien::Libgit2 from sibling repo
        working-directory: vendor/alien-libgit2
        env:
          PERL_CPANM_OPT: --mirror http://cpan.metacpan.org --mirror-only
        shell: bash
        run: |
          set -euo pipefail
          dzil authordeps --missing | cpanm -nq
          dzil listdeps --author --missing | cpanm -nq
          dzil install
      - name: dzil test
        uses: Getty/p5-dist-zilla-pluginbundle-author-getty/.github/actions/dzil-test@main
