name                = JSON-Schema-Tiny
author              = Karen Etheridge <ether@cpan.org>
copyright_holder    = Karen Etheridge
copyright_year      = 2021
license             = Perl_5

[=inc::CheckConflicts]

[@Author::ETHER]
:version = 0.154
bugtracker = github
Test::MinimumVersion.max_target_perl = 5.020    ; may go higher later on
Git::GatherDir.exclude_filename = pull_request_template.md
Test::ReportPrereqs.include[0] = JSON::PP
Test::ReportPrereqs.include[1] = Cpanel::JSON::XS
Test::ReportPrereqs.include[2] = JSON::XS
Test::ReportPrereqs.include[3] = Math::BigInt
Test::ReportPrereqs.include[4] = Mojolicious
Test::ReportPrereqs.include[5] = builtin
Test::ReportPrereqs.include[6] = builtin::Backport
-remove = Test::Pod::No404s
StaticInstall.mode = off

[Prereqs / RuntimeRequires]
Mojolicious = 7.23  ; Mojo::URL::to_unsafe_string
builtin::compat = 0.003003

[Prereqs / RuntimeSuggests]
Cpanel::JSON::XS = 0

[Prereqs / DevelopRequires]
Test2::Warnings = 0
strictures = 2
autovivification = 0

[RemovePrereqs]
remove = B
remove = Carp
remove = Data::Dumper
remove = Encode
remove = Exporter
remove = File::Spec
remove = IO::Handle
remove = IPC::Open3
remove = JSON::PP
remove = Math::BigInt
remove = Math::BigFloat
remove = Module::Metadata
remove = Mojo::File
remove = Mojo::JSON
remove = Mojo::JSON::Pointer
remove = Mojo::URL
remove = Scalar::Util
remove = Test2::API
remove = Test::More
remove = constant
remove = lib
remove = open
remove = strict
remove = utf8
remove = warnings
