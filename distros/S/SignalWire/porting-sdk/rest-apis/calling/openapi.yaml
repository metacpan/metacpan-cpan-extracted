        command:
          type: string
          enum:
            - calling.disconnect
          description: The `calling.disconnect` command disconnects bridged calls without hanging up either leg.
          examples:
            - calling.disconnect
        params:
          type: object
          description: An object of parameters that will be utilized by the active command.
      title: calling.disconnect
