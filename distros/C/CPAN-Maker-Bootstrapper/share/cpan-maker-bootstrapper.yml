  pod-review: CPAN::Maker::Bootstrapper::Role::LLM::Reviewer
  release-notes: CPAN::Maker::Bootstrapper::Role::LLM::ReleaseNotes
  update-annotations: CPAN::Maker::Bootstrapper::Role::LLM::Annotator
options:
- auto-annotate|A
- annotate|a=s@
- color!
- comment|co=s
- context|C=s@
- dry-run|D
- finalize-annotations|F
- history!
- max-diff-files=i
- max-tokens|t=i
- model|M=s
- prompt|p=s
- prompt-profile|P=s@
- help|h
- basedir|b=s
- config|c=s
- email|e=s
- force|f!
