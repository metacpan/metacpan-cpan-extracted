          examples:
            - fe4093d9-58c2-4931-b4b9-5679f82652c6
        call_flow_id:
          allOf:
            - $ref: '#/components/schemas/uuid'
          format: uuid
          description: A string representing the ID of the Call Flow to forward incoming calls to. Required when call_handler is call_flow.
