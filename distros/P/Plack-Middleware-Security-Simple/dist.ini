name    = Plack-Middleware-Security-Simple
author  = Robert Rothenberg <perl@rhizomnic.com>
license = Artistic_2_0
copyright_holder = Robert Rothenberg
copyright_year   = 2014,2018-2026

[Keywords]
keyword = PSGI
keyword = Plack
keyword = security
keyword = filter
keyword = HTTP
keyword = blocking

[GatherDir]
exclude_match = cpanfile*
exclude_filename = LICENSE
exclude_filename = SECURITY.md
exclude_filename = doap.xml
prune_directory = ^local
[PruneCruft]
[CPANFile]
[License]
[DOAP]
[ExecDir]
[ShareDir]
[MakeMaker]
[Manifest]
[TestRelease]
[CheckExtraTests]
[ConfirmRelease]
[SigStore::SignRelease]

[StaticInstall]
mode = auto
dry_run = 0

[RecommendedPrereqs]
[AutoPrereqs]

[Prereqs / BuildRequires ]
-phase = build
-relationship = recommends
ExtUtils::MakeMaker = 7.22
Module::Metadata = 1.000015

[Prereqs / TestRequires]
-phase = test
-relationship = requires
Test::Vars = 0.015

[Prereqs / DevelopRequires ]
-phase = develop
-relationship = requires
Test::CPAN::Changes = 0
Test::MixedScripts = 0
Software::Security::Policy::Individual = 0.10

; [EnsurePrereqsInstalled]
; :version = 0.003
; type = requires
; type = recommends

[AutomationPolicy]
template = issues_only

[SecurityPolicy]
-policy = Individual
timeframe = 2 weeks
git_url = https://github.com/robrwo/Plack-Middleware-Security-Simple/
report_url = https://github.com/robrwo/Plack-Middleware-Security-Simple/security/advisories

[GitHub::Meta]
repo = git://github.com/robrwo/Plack-Middleware-Security-Simple.git

[PodWeaver]
; authordep Pod::Weaver::Plugin::AppendPrepend
; authordep Pod::Weaver::Section::Contributors
; authordep Pod::Weaver::Section::SourceGitHub

[UsefulReadme]
type     = gfm
filename = README.md
location = build

[CopyFilesFromBuild]
copy = LICENSE
copy = README.md
copy = SECURITY.md
copy = cpanfile
copy = doap.xml

[ManifestSkip]
[PruneFiles]
match = ~$
match = \.ERR$

[Metadata]
x_authority = cpan:RRWO

[MetaProvides::Package]
[MetaJSON]
[MetaYAML]

[InstallGuide]

; authordep Pod::Weaver::Plugin::AppendPrepend
; authordep Pod::Weaver::Section::Contributors
; authordep Pod::Weaver::Section::SourceGitHub

[PodSyntaxTests]
[Test::DistManifest]
;; N/A [Test::CleanNamespaces]
[Test::EOF]
[Test::EOL]
:version = 0.14
[Test::Fixme]
[Test::MinimumVersion]
[Test::NoTabs]
[Test::Perl::Critic]
critic_config = xt/etc/perlcritic.rc

[Test::Pod::Coverage::Configurable]
[Test::Pod::LinkCheck]
[Test::Portability]
; authordep Test::TrailingSpace
[Test::TrailingSpace]
filename_regex = \.(?:p[lm]|pod)\z
[Test::Kwalitee]
skiptest = use_strict
[Test::ReportPrereqs]
:version = 0.022
version_extractor = Module::Metadata
verify_prereqs = 1

[Test::CVE]
[MojibakeTests]
[Test::MixedScripts]

; authordep Test::MixedScripts
[Test::CPAN::Changes]
; authordep Test::CPAN::Changes

[Test::PodSpelling]
[Test::UnusedVars]

[MetaTests]

[Test::Version]
[Test::Compile]
; authordep Test::Compile
filename = xt/00-compile.t

[@Git]
allow_dirty = dist.ini
push_to     = origin master:master
tag_format  = %v
commit_msg  = %v%n%n%c

[Git::Contributors]
:version = 0.019

[RewriteVersion]
[NextRelease]
[BumpVersionAfterRelease]

[Git::Commit / Commit_Changes] ; commit Changes (for new dev)
allow_dirty_match = ^lib/
commit_msg = Commit Changes and bump $VERSION
