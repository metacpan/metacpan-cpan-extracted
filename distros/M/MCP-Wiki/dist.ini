name    = MCP-Wiki
author  = Torsten Raudssus <getty@cpan.org>
license = Perl_5
copyright_holder = Torsten Raudssus <torsten@raudssus.de> L<https://raudssus.de/>
copyright_year   = 2026
main_module     = lib/MCP/Wiki.pm

; Getty release command:
;   dzil release
; run_after_release publishes a GitHub release and pushes the Docker
; Hub image (raudssus/mcp-wiki). Override gh/docker via
; GH_BIN / DOCKER_BIN. Extra docker build args:
;   MCP_WIKI_DOCKER_BUILD_ARGS='--platform linux/amd64,linux/arm64' dzil release

[@Author::GETTY]
run_after_release = %x %o/maint/release-after.pl --archive %a --dir %d --version %v
