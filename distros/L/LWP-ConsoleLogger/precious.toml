exclude = [
    ".build/**",
    "LWP-ConsoleLogger-*/**",
    "blib/**",
    "local/**",
]

[commands.perltidy]
type    = "both"
include = ["**/*.{pl,pm,t,psgi}"]
exclude = [
    "t/00-*",
    "t/author-*",
    "t/release-*",
    "t/zzz-*",
    "xt/**",
]
cmd                     = ["perltidy", "--profile=$PRECIOUS_ROOT/perltidyrc"]
lint-flags              = ["--assert-tidy", "--no-standard-output", "--outfile=/dev/null"]
tidy-flags              = ["--backup-and-modify-in-place", "--backup-file-extension=/"]
ok-exit-codes           = 0
lint-failure-exit-codes = 2
ignore-stderr           = "Begin Error Output Stream"

[commands.perltidy-xt-pithub]
type                    = "both"
include                 = "xt/pithub.t"
cmd                     = ["perltidy", "--profile=$PRECIOUS_ROOT/perltidyrc"]
lint-flags              = ["--assert-tidy", "--no-standard-output", "--outfile=/dev/null"]
tidy-flags              = ["--backup-and-modify-in-place", "--backup-file-extension=/"]
ok-exit-codes           = 0
lint-failure-exit-codes = 2
ignore-stderr           = "Begin Error Output Stream"

[commands.perlcritic]
type                    = "lint"
include                 = "xt/pithub.t"
cmd                     = ["perlcritic", "--profile=$PRECIOUS_ROOT/perlcriticrc"]
ok-exit-codes           = 0
lint-failure-exit-codes = 2

[commands.perlvars]
type                    = "lint"
include                 = ["**/*.{pl,pm,t,psgi}"]
exclude                 = [
    "t/00-*",
    "t/author-*",
    "t/release-*",
    "t/zzz-*",
]
cmd                     = ["perlvars"]
ok-exit-codes           = 0
lint-failure-exit-codes = [1, 255]
ignore-stderr           = "contains no package"

[commands.omegasort-gitignore]
type                    = "both"
include                 = ".gitignore"
cmd                     = ["omegasort", "--sort", "path", "--unique"]
lint-flags              = "--check"
tidy-flags              = "--in-place"
ok-exit-codes           = 0
lint-failure-exit-codes = 1
ignore-stderr           = ["The .+ file is not sorted", "The .+ file is not unique"]

[commands.omegasort-stopwords]
type                    = "both"
include                 = ".stopwords"
cmd                     = ["omegasort", "--sort", "text", "--unique", "--case-insensitive"]
lint-flags              = "--check"
tidy-flags              = "--in-place"
ok-exit-codes           = 0
lint-failure-exit-codes = 1
ignore-stderr           = ["The .+ file is not sorted", "The .+ file is not unique"]
