name    = App-s2p
author  = Leon Timmermans <fawaka@gmail.com>
license = CC_BY_SA_3_0
copyright_holder = Wolfgang Laun
copyright_year   = 2000
main_module = script/s2p

[@Filter]
-bundle = @Basic
-remove = MakeMaker
-remove = ExtraTests
-remove = ExecDir
-remove = ConfirmRelease
[MakeMaker::Awesome]
exe_file = script/s2p
exe_file = script/psed
delimiter = |
footer = |package MY;
footer = |
footer = |use File::Spec;
footer = |
footer = |sub postamble {
footer = |	my $self = shift;
footer = |
footer = |	my ($s2p, $psed) = map { File::Spec->catfile('script', $_) } qw/s2p psed/;
footer = |	return <<"END";
footer = |$psed: $s2p
footer = |	\$(CP) $s2p $psed
footer = |
footer = |END
footer = |}
[ExecDir]
dir = script
[PruneFiles]
match = ^inc/*
[MetaProvides::Package]
finder = ExecDir

[CheckChangesHasContent]
[MetaConfig]
[MetaJSON]
[AutoPrereqs]
[GitHub::Meta]


[Git::NextVersion]
[NextRelease]

[@Git]

[PkgVersion]

[Test::Compile]
fail_on_warning = all

[ConfirmRelease]
