# Integration test stack for dbio-db2.
#
#   cd maint/docker
#   docker compose up --build --abort-on-container-exit --exit-code-from test
#
# Brings up an IBM DB2 community server, then runs t/10-db2.t (the single
# integration test) inside a Perl container that has DBD::DB2 built against
# the IBM clidriver.
# The "test" container mounts the live source of both dbio core and dbio-db2,
# so no rebuild is needed when editing tests.
#
# First run is slow: the DB2 server does one-time instance setup (a few
# minutes); the entrypoint waits for it before running the suite.
#
# Teardown:  docker compose down -v

services:
  db2:
    image: icr.io/db2_community/db2:latest
    privileged: true            # DB2 community image requires it for instance setup
    environment:
      LICENSE: accept
      DB2INST1_PASSWORD: dbio
      DBNAME: testdb
      PERSISTENT_HOME: "false"
    ports:
      - "50000:50000"
    volumes:
      - db2data:/database

  test:
    build:
      context: ../..                       # repo root (dbio-db2/)
      dockerfile: maint/docker/Dockerfile.test
    depends_on:
      - db2
    environment:
      DBIO_TEST_DB2_DSN: "dbi:DB2:DATABASE=testdb;HOSTNAME=db2;PORT=50000;PROTOCOL=TCPIP;"
      DBIO_TEST_DB2_USER: db2inst1
      DBIO_TEST_DB2_PASS: dbio
      DBIO_CORE: /src/dbio
      DBIO_DB2: /src/dbio-db2
    volumes:
      - ../../../dbio:/src/dbio:ro         # dbio core (not on CPAN -> mounted)
      - ../..:/src/dbio-db2:ro

volumes:
  db2data:
