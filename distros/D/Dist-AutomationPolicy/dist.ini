name    = Dist-AutomationPolicy
author  = Robert Rothenberg <perl@rhizomnic.com>
license = Artistic_2_0
copyright_holder = Robert Rothenberg
copyright_year   = 2026

[Keywords]
keyword = AI policy
keyword = LLM policy
keyword = automation policy
keyword = code generation
keyword = metadata

[Meta::Contributors]
contributor = Leon Timmermans <fawaka@gmail.com>

[GatherDir]
exclude_match = cpanfile*
exclude_filename = LICENSE
exclude_filename = SECURITY.md
exclude_filename = doap.xml
prune_directory = ^local
[PruneCruft]
[CPANFile]
[License]
[DOAP]
[ExecDir]
[ShareDir]
[MakeMaker]
[Manifest]
[TestRelease]
[CheckExtraTests]
[ConfirmRelease]
[UploadToCPAN]

[RecommendedPrereqs]
[AutoPrereqs]
; [RemovePrereqs]

[Prereqs / BuildRequires ]
-phase = build
-relationship = requires
ExtUtils::MakeMaker = 7.22
Module::Metadata = 1.000015

[Prereqs / DevelopRequires ]
-phase = develop
-relationship = requires
Software::Security::Policy::Individual = 0.10
Test::CVE = 0.11
Test2::Require::AuthorTesting = 0

; [EnsurePrereqsInstalled]
; :version = 0.003
; type = requires
; type = recommends

[SecurityPolicy]
; authordep Software::Security::Policy::Individual
-policy = Individual
timeframe = 2 weeks
perl_support_years = 10
git_url = https://github.com/robrwo/perl-Dist-AutomationPolicy
report_url = https://github.com/robrwo/perl-Dist-AutomationPolicy/security/advisories

[GitHub::Meta]
repo = git://github.com/robrwo/perl-Dist-AutomationPolicy.git

[PodWeaver]
; authordep Pod::Weaver::Plugin::AppendPrepend
; authordep Pod::Weaver::Section::Contributors
; authordep Pod::Weaver::Section::SourceGitHub

[UsefulReadme]
; authordep Pod::Markdown::Github
type     = gfm
filename = README.md
location = build

[CopyFilesFromBuild]
copy = LICENSE
copy = README.md
copy = SECURITY.md
copy = cpanfile
copy = doap.xml

[PruneFiles]
match = ~$

[Metadata]
x_authority    = cpan:RRWO

[MetaProvides::Package]
[MetaJSON]
[MetaYAML]

[Prereqs / TestRequires ]
Path::Tiny = 0.130

[PodSyntaxTests]
[Test::DistManifest]
; authordep Test::DistManifest
[Test::EOF]
; authordep Test::EOF
[Test::EOL]
:version = 0.14
[Test::Fixme]
[Test::MinimumVersion]
[Test::NoTabs]
[Test::Perl::Critic]
critic_config = xt/etc/perlcritic.rc

[Test::Pod::Coverage::Configurable]
[Test::Pod::LinkCheck]
; authordep Test::Pod::LinkCheck
[Test::Portability]
[Test::TrailingSpace]
; authordep Test::TrailingSpace
filename_regex = \.(?:p[lm]|pod)\z
[Test::Kwalitee]
; authordep Test::Kwalitee
skiptest = use_strict
[Test::ReportPrereqs]
:version = 0.022
version_extractor = Module::Metadata
verify_prereqs = 1

[Test::CVE]
[MojibakeTests]
[Test::MixedScripts]
; authordep Test::MixedScripts
[Test::CPAN::Changes]
; authordep Test::CPAN::Changes

[Test::PodSpelling]
[Test::UnusedVars]

[MetaTests]

[Test::Version]
[Test::Compile]
; authordep Test::Compile
filename = xt/00-compile.t

[@Git]
allow_dirty = dist.ini
push_to     = origin main:main
tag_format  = %v
commit_msg  = %v%n%n%c

[Git::Contributors]
:version = 0.019

[RewriteVersion]
[NextRelease]
[BumpVersionAfterRelease]

[Git::Commit / Commit_Changes] ; commit Changes (for new dev)
allow_dirty_match = ^lib/
commit_msg = Commit Changes and bump $VERSION
