            Time, in seconds, to wait for the call to be answered.
            Default is 60 seconds.
          examples:
            - 30
          default: 60
        max_duration:
          anyOf:
            - type: integer
            - $ref: '#/components/schemas/SWMLVar'
          description: |-
            Maximum duration, in seconds, allowed for the call.
            Default is `14400` seconds.
          examples:
            - 3600
          default: 14400
        answer_on_bridge:
          anyOf:
            - type: boolean
            - $ref: '#/components/schemas/SWMLVar'
          description: |-
            Delay answer until the B-leg answers.
            Default is `false`.
          examples:
            - true
          default: false
        confirm:
          anyOf:
            - type: string
            - type: array
              items:
                $ref: '#/components/schemas/ValidConfirmMethods'
          description: |-
            Confirmation to execute when the call is connected. Can be either:
            - A URL (string) that returns a SWML document
            - An array of SWML methods to execute inline
          examples:
            - https://example.com/confirm.swml
        confirm_timeout:
          anyOf:
            - type: integer
            - $ref: '#/components/schemas/SWMLVar'
          description: The amount of time, in seconds, to wait for the `confirm` URL to return a response
          examples:
            - 30
        username:
          type: string
          description: SIP username to use for authentication when dialing a SIP URI. Has no effect on calls to phone numbers.
          examples:
            - sipuser
        password:
          type: string
          description: SIP password to use for authentication when dialing a SIP URI. Has no effect on calls to phone numbers.
          examples:
            - sippassword
        encryption:
          type: string
          enum:
            - mandatory
            - optional
            - forbidden
          description: Encryption setting to use. **Possible values:** `mandatory`, `optional`, `forbidden`
          examples:
            - optional
          default: optional
        call_state_url:
          type: string
          format: uri
          description: Webhook URL to send call status change notifications to. Authentication can also be set in the URL in the format of `username:password@url`.
          examples:
            - https://example.com/call-status
        transfer_after_bridge:
          anyOf:
            - type: string
            - $ref: '#/components/schemas/SWMLVar'
          description: |-
            SWML to execute after the bridge completes. This defines what should happen after the call is connected and the bridge ends.
            Can be either:
            - A URL (http or https) that returns a SWML document
            - An inline SWML document (as a JSON string)

            **Note:** This parameter is REQUIRED when connecting to a queue (when `to` starts with "queue:")
          examples:
            - https://example.com/after-bridge.swml
        call_state_events:
          type: array
          items:
            $ref: '#/components/schemas/CallStatus'
          description: |-
            An array of call state event names to be notified about.
            Allowed event names are:
                - `created`
                - `ringing`
                - `answered`
                - `ended`
          default:
            - ended
        status_url:
          type: string
          format: uri
          description: |-
            HTTP or HTTPS URL to deliver connect status events.
            These events report the overall status of the connect operation
            (connecting, connected, failed, disconnected) via a `calling.call.connect` event.
          examples:
            - https://example.com/connect-status
        serial_parallel:
          type: array
          items:
            type: array
            items:
              $ref: '#/components/schemas/ConnectDeviceSingle'
          description: |-
            Array of arrays.
            Inner arrays contain destinations to dial simultaneously.
            Outer array attempts each parallel group in order.
      title: Serial-Parallel Dialing
    ConnectDeviceSingle:
      type: object
      required:
        - to
      properties:
        from:
          type: string
          description: The caller ID to use when dialing the number.
          examples:
            - '+15551234567'
        headers:
          type: array
          items:
            $ref: '#/components/schemas/ConnectHeaders'
          description: Custom SIP headers to add to INVITE. It Has no effect on calls to phone numbers.
        codecs:
          type: string
          description: |-
            Comma-separated string of codecs to offer.
            It has no effect on calls to phone numbers.
            Based on SignalWire settings.
          examples:
            - PCMU,PCMA,OPUS
        webrtc_media:
          anyOf:
            - type: boolean
            - $ref: '#/components/schemas/SWMLVar'
          description: |-
            If true, WebRTC media is offered to the SIP endpoint.
            It has no effect on calls to phone numbers.
            Default is `false`.
          examples:
            - true
          default: false
        session_timeout:
          anyOf:
            - type: integer
            - $ref: '#/components/schemas/SWMLVar'
          minimum: 1
          description: |-
            Time, in seconds, to set the SIP `Session-Expires` header in INVITE.
            Must be a positive, non-zero number.
            It has no effect on calls to phone numbers.
            Based on SignalWire settings.
          examples:
            - 1800
          default: 0
        ringback:
          type: array
          items:
            type: string
          description: Array of URIs to play as ringback tone. If not specified, plays audio from the provider.
          examples:
            - - https://example.com/ringback.mp3
        result:
          anyOf:
            - $ref: '#/components/schemas/ConnectSwitch'
            - type: array
              items:
                $ref: '#/components/schemas/CondParams'
              description: Execute a sequence of instructions depending on the value of a JavaScript condition.
              title: cond
          description: |-
            Action to take based on the result of the call. This will run once the peer leg of the call has ended.
            Will use the switch method when the return_value is an object, and will use the cond method when the return_value is an array.
        timeout:
          anyOf:
            - type: integer
            - $ref: '#/components/schemas/SWMLVar'
          description: |-
            Time, in seconds, to wait for the call to be answered.
            Default is 60 seconds.
          examples:
            - 30
          default: 60
        max_duration:
          anyOf:
            - type: integer
            - $ref: '#/components/schemas/SWMLVar'
          description: |-
            Maximum duration, in seconds, allowed for the call.
            Default is `14400` seconds.
          examples:
            - 3600
          default: 14400
        answer_on_bridge:
          anyOf:
            - type: boolean
            - $ref: '#/components/schemas/SWMLVar'
          description: |-
            Delay answer until the B-leg answers.
            Default is `false`.
          examples:
            - true
          default: false
        confirm:
          anyOf:
            - type: string
            - type: array
              items:
                $ref: '#/components/schemas/ValidConfirmMethods'
          description: |-
            Confirmation to execute when the call is connected. Can be either:
            - A URL (string) that returns a SWML document
            - An array of SWML methods to execute inline
          examples:
            - https://example.com/confirm.swml
        confirm_timeout:
          anyOf:
            - type: integer
            - $ref: '#/components/schemas/SWMLVar'
          description: The amount of time, in seconds, to wait for the `confirm` URL to return a response
          examples:
            - 30
        username:
          type: string
          description: SIP username to use for authentication when dialing a SIP URI. Has no effect on calls to phone numbers.
          examples:
            - sipuser
        password:
          type: string
          description: SIP password to use for authentication when dialing a SIP URI. Has no effect on calls to phone numbers.
          examples:
            - sippassword
        encryption:
          type: string
          enum:
            - mandatory
            - optional
            - forbidden
          description: Encryption setting to use. **Possible values:** `mandatory`, `optional`, `forbidden`
          examples:
            - optional
          default: optional
        call_state_url:
          type: string
          format: uri
          description: Webhook URL to send call status change notifications to. Authentication can also be set in the URL in the format of `username:password@url`.
          examples:
            - https://example.com/call-status
        transfer_after_bridge:
          anyOf:
            - type: string
            - $ref: '#/components/schemas/SWMLVar'
          description: |-
            SWML to execute after the bridge completes. This defines what should happen after the call is connected and the bridge ends.
            Can be either:
            - A URL (http or https) that returns a SWML document
            - An inline SWML document (as a JSON string)

            **Note:** This parameter is REQUIRED when connecting to a queue (when `to` starts with "queue:")
          examples:
            - https://example.com/after-bridge.swml
        call_state_events:
          type: array
          items:
            $ref: '#/components/schemas/CallStatus'
          description: |-
            An array of call state event names to be notified about.
            Allowed event names are:
                - `created`
                - `ringing`
                - `answered`
                - `ended`
          default:
            - ended
        status_url:
          type: string
          format: uri
          description: |-
            HTTP or HTTPS URL to deliver connect status events.
            These events report the overall status of the connect operation
            (connecting, connected, failed, disconnected) via a `calling.call.connect` event.
          examples:
            - https://example.com/connect-status
        to:
          type: string
          description: |-
            Destination to dial. Can be:
            - Phone number in E.164 format (e.g., "+15552345678")
            - SIP URI (e.g., "sip:alice@example.com")
            - Call Fabric Resource address (e.g., "/public/test_room")
            - Queue (e.g., "queue:support")
            - WebSocket stream (e.g., "stream:wss://example.com/audio")
          examples:
            - '+15559876543'
        name:
          type: string
          description: Stream name identifier. Only applies to stream destinations.
          examples:
            - my-stream
        codec:
          type: string
          description: |-
            Audio codec for the stream. Supported values: `PCMU`, `PCMA`, `G722`, `L16`.
            Codec can include rate and ptime modifiers (e.g., `PCMU@40i`, `L16@24000h@40i`).
            Only applies to stream destinations.
          examples:
            - PCMU
        realtime:
          anyOf:
            - type: boolean
            - $ref: '#/components/schemas/SWMLVar'
          description: |-
            Enable realtime mode for bidirectional audio.
            Only applies to stream destinations.
          examples:
            - true
          default: false
        status_url_method:
          type: string
          enum:
            - GET
            - POST
          description: |-
            HTTP method for the stream status webhook.
            Only applies to stream destinations.
          examples:
            - POST
          default: POST
        authorization_bearer_token:
          type: string
          description: Bearer token sent as an `Authorization` header during the WebSocket handshake. Only applies to stream destinations.
          examples:
            - my-secret-token
        custom_parameters:
          type: object
          unevaluatedProperties:
            type: string
          description: Custom key-value pairs sent in the WebSocket start message. Only applies to stream destinations.
      title: Single Destination
    ConnectHeaders:
      type: object
      required:
        - name
        - value
      properties:
        name:
          type: string
          description: The name of the header.
          examples:
            - X-Custom-Header
        value:
          type: string
          description: The value of the header.
          examples:
            - custom-value
      title: ConnectHeaders object
    ConnectSwitch:
      type: object
      required:
        - case
      properties:
        variable:
          type: string
          description: Name of the variable whose value needs to be compared. If not provided, it will check the `connect_result` variable.
          examples:
            - connect_result
        case:
          type: object
          unevaluatedProperties:
            type: array
            items:
              $ref: '#/components/schemas/SWMLMethod'
          description: Object of values mapped to array of instructions to execute
        default:
          description: Array of instructions to execute if no cases match
          type: array
          items:
            $ref: '#/components/schemas/SWMLMethod'
      title: ConnectSwitch object
    ConstProperty:
      type: object
      required:
        - const
      properties:
        const:
          description: A constant value that can be passed to the function.
      title: Const Property
    ContextPOMSteps:
      type: object
      required:
        - name
        - pom
      properties:
        name:
          type: string
          pattern: ^(?!next$).*$
          description: The name of the step. The name must be unique within the context. The name is used for referencing the step in the context.
          examples:
            - Take Pizza order
        step_criteria:
          type: string
          description: |-
            The criteria that must be met for the AI to proceed to the next step.
            The criteria is an instruction given to the AI.
            It's **highly** recommended you create a custom criteria for the step to get the intended behavior.
          examples:
            - Customer wants to order Pizza
        functions:
          type: array
          items:
            type: string
          description: An array of strings, where each string is the name of a SWAIG.function that can be executed from this step.
          examples:
            - - Take Order
              - Confirm Order
              - Confirm Address
        valid_contexts:
          type: array
          items:
            type: string
          description: An array of context names that the AI can transition to from this step. This must be a valid `contexts.name` that is present in your `contexts` object.
          examples:
            - - Place Order
              - Confirm Order
        skip_user_turn:
          anyOf:
            - type: boolean
            - $ref: '#/components/schemas/SWMLVar'
          description: A boolean value, if set to `true`, will skip the user's turn to respond in the conversation and proceed to the next step. **Default:** `false`.
          examples:
            - true
          default: false
        end:
          type: boolean
          description: A boolean value that determines if the step is the last in the context. If `true`, the context ends after this step. Cannot be used along with the `valid_steps` parameter. **Default:** `false`.
          examples:
            - true
          default: false
        valid_steps:
          type: array
          items:
            type: string
          description: |-
            An array of valid steps that the conversation can proceed to from this step.
            If the array is empty, or the `valid_steps` key is not present, the conversation will proceed to the next step in the context.
          examples:
            - - get order
              - confirm order
        pom:
          type: array
          items:
            $ref: '#/components/schemas/POM'
          description: An array of objects that define the POM for the step. POM is the Post-Prompt Object Model, which is used to define the flow of the conversation.
      title: Context step with POM (Post-Prompt Object Model)
    ContextSteps:
      anyOf:
        - $ref: '#/components/schemas/ContextPOMSteps'
        - $ref: '#/components/schemas/ContextTextSteps'
      title: Context step - supports either POM or text-based steps
    ContextSwitchAction:
      type: object
      required:
        - context_switch
      properties:
        context_switch:
          type: object
          properties:
            system_prompt:
              type: string
              description: The instructions to send to the agent. Default is not set.
              examples:
                - You are now a billing specialist. Help the customer with their billing inquiry.
            consolidate:
              anyOf:
                - type: boolean
                - $ref: '#/components/schemas/SWMLVar'
              description: Whether to consolidate the context. Default is `false`.
              examples:
                - true
            user_prompt:
              type: string
              description: |-
                A string serving as simulated user input for the AI Agent.
                During a context_switch in the AI's prompt, the user_prompt offers the AI pre-established context or guidance.
                Default is not set
              examples:
                - I need help with my recent invoice.
          required:
            - system_prompt
          description: A JSON object containing the context to switch to. Default is not set.
          title: context_switch
      title: context_switch Action
    ContextTextSteps:
      type: object
      required:
        - name
        - text
      properties:
        name:
          type: string
          pattern: ^(?!next$).*$
          description: The name of the step. The name must be unique within the context. The name is used for referencing the step in the context.
          examples:
            - Take Pizza order
        step_criteria:
          type: string
          description: |-
            The criteria that must be met for the AI to proceed to the next step.
