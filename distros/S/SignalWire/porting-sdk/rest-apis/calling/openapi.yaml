          examples:
            - order_id: ord_456
              customer_tier: premium
      title: set_global_data Action
    SetMetaDataAction:
      type: object
      required:
        - set_meta_data
      properties:
        set_meta_data:
          type: object
          unevaluatedProperties: {}
          description: A JSON object containing any metadata, as a key-value map. This action sets the data in the `meta_data` to be referenced locally in the function.
          title: set_meta_data
          examples:
            - last_action: lookup
              retry_count: 2
      title: set_meta_data Action
    Sleep:
