name    = App-Yath-Plugin-Utilization
author  = Chad Granum <exodist@cpan.org>
license = Perl_5
copyright_holder = Chad Granum

[RewriteVersion]
[License]
[ManifestSkip]
[Manifest]
[NextRelease]

[GatherDir]
exclude_match = ^xt/downstream
exclude_match = ^release-scripts
exclude_match = ^t/
exclude_filename = LICENSE
exclude_filename = Makefile.PL
exclude_filename = cpanfile
exclude_filename = README
exclude_filename = README.md

[PruneCruft]

[Git::GatherDir / GatherDotFilesT]
root = t/
prefix = t/
include_dotfiles = 1

[PodSyntaxTests]
[TestRelease]

[MetaResources]
bugtracker.web  = https://github.com/Test-More/App-Yath-Plugin-Utilization/issues
repository.url  = https://github.com/Test-More/App-Yath-Plugin-Utilization/
repository.type = git

[Prereqs]
perl                  = 5.010000
Test2::Harness        = 1.000172
Importer              = 0.025
Time::HiRes           = 0
POSIX                 = 0
Carp                  = 0
File::Spec            = 0
parent                = 0
strict                = 0
warnings              = 0

[Prereqs / TestRequires]
Test2::V0             = 0.000127
Test2::Bundle::Extended = 0.000127

[Prereqs / RuntimeSuggests]
Filesys::Df  = 0
System::Info = 0

[MakeMaker::Awesome]
:version = 0.26

[CPANFile]
[MetaYAML]
[MetaJSON]

; authordep Pod::Markdown
[ReadmeFromPod / Markdown]
filename = lib/App/Yath/Plugin/Utilization.pm
type = markdown
readme = README.md

[ReadmeFromPod / Text]
filename = lib/App/Yath/Plugin/Utilization.pm
type = text
readme = README

[CopyFilesFromBuild]
copy = LICENSE
copy = cpanfile
copy = README
copy = README.md
copy = Makefile.PL

[Git::Check]
allow_dirty = Makefile.PL
allow_dirty = README
allow_dirty = README.md
allow_dirty = cpanfile
allow_dirty = LICENSE
allow_dirty = Changes

[Git::Commit]
allow_dirty = Makefile.PL
allow_dirty = README
allow_dirty = README.md
allow_dirty = cpanfile
allow_dirty = LICENSE
allow_dirty = Changes

[Git::Tag]
[FakeRelease]
[BumpVersionAfterRelease]

[Git::Commit / Commit_Changes]
munge_makefile_pl = true
allow_dirty_match = ^lib
allow_dirty = Makefile.PL
allow_dirty = README
allow_dirty = README.md
allow_dirty = cpanfile
allow_dirty = LICENSE
commit_msg = Automated Version Bump
