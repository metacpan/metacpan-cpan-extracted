    Play:
      type: object
      required:
        - play
      properties:
        play:
          anyOf:
            - $ref: '#/components/schemas/PlayWithURL'
            - $ref: '#/components/schemas/PlayWithURLS'
          description: Play file(s), ringtones, speech or silence.
          title: play
      title: play Method
    PlayWithURL:
      type: object
      required:
        - url
      properties:
        auto_answer:
          anyOf:
            - type: boolean
            - $ref: '#/components/schemas/SWMLVar'
          description: If `true`, the call will automatically answer as the sound is playing. If `false`, you will start playing the audio during early media. Default `true`.
          examples:
            - true
          default: true
        volume:
          anyOf:
            - type: number
            - $ref: '#/components/schemas/SWMLVar'
          minimum: -40
          maximum: 40
          description: |-
            Volume level for the audio file.
            Default is `0`.
            Valid range is -40 to 40.
          examples:
            - 10
          default: 0
        say_voice:
          type: string
          description: The voice to use for the text to speech.
          examples:
            - Polly.Joanna
          default: Polly.Salli
        say_language:
          type: string
          description: The language to use for the text to speech.
          examples:
            - en-US
          default: en-US
        say_gender:
          type: string
          description: Gender to use for the text to speech.
          examples:
            - female
          default: female
        status_url:
          type: string
          format: uri
          description: http or https URL to deliver play status events
          examples:
            - https://example.com/play-status
        url:
          anyOf:
            - $ref: '#/components/schemas/play_url'
            - $ref: '#/components/schemas/SWMLVar'
          description: |-
            URL to play.
            Required if `urls` is not present.
            Allowed URLs are:
                - http:// or https:// - audio file to GET
                - ring:[duration:]<country code> - ring tone to play. For example: ring:us to play single ring or ring:20.0:us to play ring for 20 seconds.
                - say:<text to speak> - Sentence to say
                - silence: <duration> - seconds of silence to play
          examples:
            - https://example.com/welcome.mp3
      description: Play with a single URL
      title: Single URL
    PlayWithURLS:
      type: object
      required:
        - urls
      properties:
        auto_answer:
          anyOf:
            - type: boolean
            - $ref: '#/components/schemas/SWMLVar'
          description: If `true`, the call will automatically answer as the sound is playing. If `false`, you will start playing the audio during early media. Default `true`.
          examples:
            - true
          default: true
        volume:
          anyOf:
            - type: number
            - $ref: '#/components/schemas/SWMLVar'
          minimum: -40
          maximum: 40
          description: |-
            Volume level for the audio file.
            Default is `0`.
            Valid range is -40 to 40.
          examples:
            - 10
          default: 0
        say_voice:
          type: string
          description: The voice to use for the text to speech.
          examples:
            - Polly.Joanna
          default: Polly.Salli
        say_language:
          type: string
          description: The language to use for the text to speech.
          examples:
            - en-US
          default: en-US
        say_gender:
          type: string
          description: Gender to use for the text to speech.
          examples:
            - female
          default: female
        status_url:
          type: string
          format: uri
          description: http or https URL to deliver play status events
          examples:
            - https://example.com/play-status
        urls:
          anyOf:
            - type: array
              items:
                $ref: '#/components/schemas/play_url'
            - type: array
              items:
                $ref: '#/components/schemas/SWMLVar'
          description: |-
            Array of URLs to play.
            Required if `url` is not present.
            Allowed URLs are:
                - http:// or https:// - audio file to GET
                - ring:[duration:]<country code> - ring tone to play. For example: ring:us to play single ring or ring:20.0:us to play ring for 20 seconds.
                - say:<text to speak> - Sentence to say
                - silence: <duration> - seconds of silence to play
          examples:
            - - https://example.com/intro.mp3
              - say:Welcome to our service
              - silence:2
      title: Multiple URLs
    PlaybackBGAction:
      type: object
      required:
        - playback_bg
      properties:
        playback_bg:
          type: object
          properties:
            file:
              type: string
              format: uri
