name = Developer-Dashboard
version = 3.90
author = Developer Dashboard Contributors
license = MIT
copyright_holder = Developer Dashboard Contributors

[GatherDir]
exclude_filename = LICENSE
exclude_filename = agents.md
exclude_filename = AGENTS.override.md
exclude_filename = ELLEN.md
exclude_filename = FIXED_BUGS.md
exclude_filename = SKILL.md
exclude_filename = SKILLS.md
exclude_filename = MISTAKE.md
exclude_filename = SCORECARD_ACTIONS.md
exclude_filename = SOFTWARE_SPEC.md
exclude_filename = TEST_PLAN.md
exclude_filename = TEST_PLAN_RESULTS.md
exclude_filename = package.json
exclude_filename = package-lock.json
exclude_match = ^bin/(jq|yq|tomq|propq|iniq|csvq|xmlq|pjq|pyq|ptomq|pjp)$
exclude_match = ^cover_db/
exclude_match = ^examples/
exclude_match = ^\.github/
exclude_match = ^node_modules/
exclude_match = ^OLD_CODE/
exclude_match = ^test_by_michael/
exclude_match = ^updates/
exclude_match = ^blogs/

[ShareDir]

[PruneCruft]

[ManifestSkip]

[MetaYAML]

[MetaJSON]

[MetaProvides::Package]

[MetaResources]
homepage = https://github.com/manif3station/developer-dashboard
bugtracker.web = https://github.com/manif3station/developer-dashboard/issues
repository.url = git@github.com:manif3station/developer-dashboard.git
repository.web = https://github.com/manif3station/developer-dashboard
repository.type = git

[License]

[ExecDir]

[Manifest]

[PkgVersion]

[AutoPrereqs]
skip = ^Module::CPANTS::Analyse$
skip = ^Module::CPANTS::Kwalitee$
skip = ^Test::Pod$

[Prereqs]
perl = 5.038
JSON::XS = 0
YAML::XS = 0
TOML::Parser = 0
Capture::Tiny = 0
Getopt::Long = 0
Digest::MD5 = 0
Digest::SHA = 0
Archive::Zip = 0
MIME::Base64 = 0
IO::Compress::Gzip = 0
IO::Uncompress::Gunzip = 0
Dancer2 = 0
Plack = 0
Starman = 0
HTTP::Request = 0
LWP::Protocol::https = 0
LWP::UserAgent = 0
URI = 0
URI::Escape = 0
Template = 0
XML::Parser = 0

[Prereqs / ConfigureRequires]
ExtUtils::MakeMaker = 0
File::ShareDir::Install = 0

[Prereqs / TestRequires]
Test::More = 0

[Prereqs / DevelopRecommends]
DBI = 0
DBD::SQLite = 0
DBD::mysql = 0
DBD::Pg = 0
DBD::ODBC = 0
DBD::Oracle = 0
