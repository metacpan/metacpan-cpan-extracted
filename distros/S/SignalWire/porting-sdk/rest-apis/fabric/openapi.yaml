                - A URL (http or https) - URL to fetch next document from. Sends HTTP POST.
                  Authentication can also be set in the URL in the format of username:password@url.
                - An inline SWML document (as a JSON string)
              examples:
                - https://example.com/transfer-handler
            params:
              type: object
              unevaluatedProperties: {}
              description: |-
                Named parameters to send to transfer destination.
                Accepts an object mapping variable names to values.
                Default is not set.
              examples:
                - department: sales
                  priority: high
            meta:
              type: object
              unevaluatedProperties: {}
              description: |-
                User data, ignored by SignalWire.
                Accepts an object mapping variable names to values.
                Default is not set.
              examples:
                - transfer_reason: escalation
                  original_agent: agent_001
          required:
            - dest
          description: |-
            Transfer the execution of the script to a different SWML section, URL, or Relay application.
            Once the transfer is complete, the script will continue executing SWML from the new location.
          title: transfer
      title: transfer Method
    TranslateAction:
      anyOf:
        - $ref: '#/components/schemas/StartAction'
        - type: string
          enum:
            - stop
        - $ref: '#/components/schemas/SummarizeActionUnion'
        - $ref: '#/components/schemas/InjectAction'
      title: TranslateAction union
    TranslateDirection:
      type: string
      enum:
        - remote-caller
        - local-caller
      title: TranslateDirection enum
    TranslationFilterPreset:
      type: string
      enum:
        - polite
        - rude
        - professional
        - shakespeare
        - gen-z
      description: |-
        Preset translation filter values that adjust the tone or style of translated speech.

        - `polite` - Translates to a polite version, removing anything insulting while maintaining sentiment
        - `rude` - Translates to a rude and insulting version while maintaining sentiment
        - `professional` - Translates to sound professional, removing slang or lingo
        - `shakespeare` - Translates to sound like Shakespeare, speaking in iambic pentameter
        - `gen-z` - Translates to use Gen-Z slang and expressions
      title: Filter Presets
    Types.StatusCodes.RestApiErrorItem:
      type: object
      required:
        - type
        - code
        - message
        - url
      properties:
        type:
          type: string
          description: The category of error.
          examples:
            - validation_error
        code:
          type: string
          description: A specific error code.
          examples:
            - invalid_parameter
        message:
          type: string
          description: A description of what caused the error.
          examples:
            - Name must be present
        attribute:
          anyOf:
            - type: string
            - type: 'null'
          description: The request parameter that caused the error, if applicable.
          examples:
            - name
        url:
          type: string
          description: A link to documentation about this error.
          examples:
            - https://signalwire.com/docs/apis/error-codes
      description: Details about a specific error.
    Types.StatusCodes.StatusCode401:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          enum:
            - Unauthorized
      description: Access is unauthorized.
    Types.StatusCodes.StatusCode403:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          enum:
            - Forbidden
      description: Access is forbidden.
    Types.StatusCodes.StatusCode404:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          enum:
            - Not Found
      description: The server cannot find the requested resource.
    Types.StatusCodes.StatusCode422:
      type: object
      required:
        - errors
      properties:
        errors:
          type: array
          items:
            $ref: '#/components/schemas/Types.StatusCodes.RestApiErrorItem'
          description: List of validation errors.
      description: The request contains invalid parameters. See errors for details.
    Types.StatusCodes.StatusCode500:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          enum:
            - Internal Server Error
      description: An internal server error occurred.
    Unset:
      type: object
      required:
        - unset
      properties:
        unset:
          anyOf:
            - type: string
            - type: array
              items:
                type: string
          description: |-
            Unset specified variables. The variables may have been set using the set method
            or as a byproduct of other statements or methods.
            Accepts a single variable name as a string or an array of variable names.
          title: unset
          examples:
            - temp_data
      title: unset Method
    UnsetGlobalDataAction:
      type: object
      required:
        - unset_global_data
      properties:
        unset_global_data:
          anyOf:
            - type: string
            - type: object
          description: The key of the global data to unset from the `global_data`. You can also reset the `global_data` by passing in a new object.
          title: unset_global_data
          examples:
            - session_id
      title: unset_global_data Action
    UnsetMetaDataAction:
      type: object
      required:
        - unset_meta_data
      properties:
        unset_meta_data:
          anyOf:
            - type: string
            - type: object
          description: The key of the local data to unset from the `meta_data`. You can also reset the `meta_data` by passing in a new object.
          title: unset_meta_data
          examples:
            - temp_data
      title: unset_meta_data Action
    UsedForType:
      type: string
      enum:
        - calling
        - messaging
      description: Sets the handler to handle incoming `calls` or `messages`.
    UserEvent:
      type: object
      required:
        - user_event
      properties:
        user_event:
          type: object
          properties:
            event:
              type: object
              unevaluatedProperties: {}
              examples:
                - type: call_update
                  status: connected
                  caller_name: John Doe
          required:
            - event
          description: |-
            Allows the user to set and send events to the connected client on the call.
            This is useful for triggering actions on the client side.
            Commonly used with the [browser-sdk](https://signalwire.com/docs/sdks/reference/browser-sdk/SignalWire%20Client/).
            The event object can be any valid JSON object.
            Any key-value pair in the object is sent to the client as an event type called `user_event`.
      title: user_event Method
    UserInputAction:
      type: object
      required:
        - user_input
      properties:
        user_input:
          type: string
          description: Used to inject text into the users queue as if they input the data themselves.
          title: user_input
          examples:
            - I would like to speak to a manager
      title: user_input Action
    UserSWAIGFunction:
      type: object
      required:
        - description
        - function
      properties:
        description:
          type: string
          description: A description of the context and purpose of the function, to explain to the agent when to use it.
          examples:
            - Get the weather information
        purpose:
          type: string
          description: |-
            The purpose field has been deprecated and is replaced by the `description` field.
            A description of the context and purpose of the function, to explain to the agent when to use it.
          deprecated: true
          examples:
            - Get the weather information
        parameters:
          allOf:
            - $ref: '#/components/schemas/FunctionParameters'
          description: A JSON object that defines the expected user input parameters and their validation rules for the function.
        fillers:
          allOf:
            - $ref: '#/components/schemas/FunctionFillers'
          description: A JSON object defining the fillers that should be played when calling a `swaig function`. This helps the AI break silence between responses. The filler is played asynchronously during the function call.
        argument:
          allOf:
            - $ref: '#/components/schemas/FunctionParameters'
          description: |-
            The argument field has been deprecated and is replaced by the `parameters` field. 
            A JSON object defining the input that should be passed to the function. 
            The fields of this object are the following two parameters.
          deprecated: true
        active:
          anyOf:
            - type: boolean
            - $ref: '#/components/schemas/SWMLVar'
          description: Whether the function is active. **Default:** `true`.
          examples:
            - true
          default: true
        meta_data:
          type: object
          unevaluatedProperties: {}
          description: |-
            A powerful and flexible environmental variable which can accept arbitrary data that is set initially in the SWML script or from the SWML set_meta_data action.
            This data can be referenced locally to the function.
            All contained information can be accessed and expanded within the prompt - for example, by using a template string.
            Default is not set.
          examples:
            - api_key: key_123
              endpoint: https://api.example.com
        meta_data_token:
          type: string
          description: Scoping token for meta_data. If not supplied, metadata will be scoped to function's `web_hook_url`. Default is set by SignalWire.
          examples:
            - my-function-scope
        data_map:
          allOf:
            - $ref: '#/components/schemas/DataMap'
          minProperties: 1
          description: |-
            An object that processes function inputs and executes operations through expressions, webhooks, or direct output.
            Properties are evaluated in strict priority order:
            1. expressions
            2. webhooks
            3. output

            Evaluation stops at the first property that returns a valid output result, similar to a return statement in a function.
            Any subsequent properties are ignored when a valid output is returned.
            If a valid output is not returned from any of the properties, a generic error message is returned.
        skip_fillers:
          anyOf:
            - type: boolean
            - $ref: '#/components/schemas/SWMLVar'
          description: |-
            Skips the top-level fillers specified in `ai.languages` (which includes `speech_fillers` and `function_fillers`).
            When set to `true`, only function-specific fillers defined directly on `SWAIG.functions.fillers` will play.
            **Default:** `false`.
          examples:
            - true
          default: false
        web_hook_url:
          type: string
          description: Function-specific URL to send status callbacks and reports to. Takes precedence over a default setting. Authentication can also be set in the url in the format of `username:password@url.`
          examples:
            - username:password:https://statuscallback.com
        wait_file:
          type: string
          format: uri
          description: A file to play while the function is running. `wait_file_loops` can specify the amount of times that files should continously play. Default is not set.
          examples:
            - https://cdn.signalwire.com/default-music/welcome.mp3
        wait_file_loops:
          anyOf:
            - type: integer
            - type: string
          description: The number of times to loop playing the file. Default is not set.
          examples:
            - 5
        wait_for_fillers:
          anyOf:
            - type: boolean
            - $ref: '#/components/schemas/SWMLVar'
          description: Whether to wait for fillers to finish playing before continuing with the function. **Default:** `false`.
          examples:
            - true
          default: false
        function:
          type: string
          description: A unique name for the function. This can be any user-defined string or can reference a reserved function. Reserved functions are SignalWire functions that will be executed at certain points in the conversation.
          examples:
            - get_weather
      title: SWAIG Function
    ValidConfirmMethods:
      anyOf:
        - $ref: '#/components/schemas/Cond'
        - $ref: '#/components/schemas/Set'
        - $ref: '#/components/schemas/Unset'
        - $ref: '#/components/schemas/Hangup'
        - $ref: '#/components/schemas/Play'
        - $ref: '#/components/schemas/Prompt'
        - $ref: '#/components/schemas/Record'
        - $ref: '#/components/schemas/RecordCall'
        - $ref: '#/components/schemas/StopRecordCall'
        - $ref: '#/components/schemas/Tap'
        - $ref: '#/components/schemas/StopTap'
        - $ref: '#/components/schemas/SendDigits'
        - $ref: '#/components/schemas/SendSMS'
        - $ref: '#/components/schemas/Denoise'
        - $ref: '#/components/schemas/StopDenoise'
    VideoChannel:
      type: object
      required:
        - video
      properties:
        video:
          type: string
          description: Video Channel of Fabric Address
          examples:
            - /external/resource_name?channel=video
    Webhook:
      type: object
      required:
        - url
      properties:
        expressions:
          type: array
          items:
            $ref: '#/components/schemas/Expression'
          description: |-
            A list of expressions to be evaluated upon matching.
            If the following properties are set (foreach, expressions, output), they will be processed in the following order:
            1. foreach
            2. expressions
            3. output
        error_keys:
          anyOf:
            - type: string
            - type: array
              items:
                type: string
          description: A string or array of strings that represent the keys to be used for error handling. This will match the key(s) in the response from the API call.
          examples:
            - failed
        url:
          type: string
          description: The endpoint for the external service or API.
          examples:
            - https://example.com
        foreach:
          type: object
          properties:
            input_key:
              type: string
              description: The key to be used to access the current element in the array.
              examples:
                - success
            output_key:
              type: string
              description: The key that can be referenced in the output of the `foreach` iteration. The values that are stored from `append` will be stored in this key.
              examples:
                - deliverer
            max:
              anyOf:
                - type: integer
                - $ref: '#/components/schemas/SWMLVar'
              description: The max amount of elements that are iterated over in the array. This will start at the beginning of the array.
              examples:
                - 5
            append:
              type: string
              description: |-
                The values to append to the output_key.
                Properties from the object can be referenced and added to the output_key by using the following syntax:
                ${this.property_name}.
                The `this` keyword is used to reference the current object in the array.
              examples:
                - 'title: ${this.title}, contact: ${this.phone}'
          required:
            - input_key
            - output_key
            - append
          description: |-
            Iterates over an array of objects and processes a output based on each element in the array. Works similarly to JavaScript's forEach method.
            If the following properties are set (foreach, expressions, output), they will be processed in the following order:
            1. foreach
            2. expressions
            3. output
        headers:
          type: object
          unevaluatedProperties: {}
          description: Any necessary headers for the API call.
          examples:
            - Content-Type: application/json
              X-API-Key: your-api-key
        method:
          type: string
          enum:
            - GET
            - POST
            - PUT
            - DELETE
          description: The HTTP method (GET, POST, etc.) for the API call.
          examples:
            - POST
        input_args_as_params:
          anyOf:
            - type: boolean
            - $ref: '#/components/schemas/SWMLVar'
          description: A boolean to determine if the input arguments should be passed as parameters.
          examples:
            - true
        params:
          type: object
          unevaluatedProperties: {}
          description: An object of any necessary parameters for the API call. The key is the parameter name and the value is the parameter value.
          examples:
            - account_id: acc_123
              include_details: true
        require_args:
          anyOf:
            - type: string
            - type: array
              items:
                type: string
          description: A string or array of strings that represent the `arguments` that are required to make the webhook request.
          examples:
            - - order_id
              - customer_email
        output:
          allOf:
            - $ref: '#/components/schemas/Output'
          description: |-
            An object that contains a response and a list of actions to be performed upon completion of the webhook request.
            If the following properties are set (foreach, expressions, output), they will be processed in the following order:
            1. foreach
            2. expressions
            3. output
      title: Webhook object
    jwt:
      type: string
      format: jwt
    play_url:
      type: string
      pattern: '^(http://.*|https://.*|ring: ?[0-9.]*: ?[a-zA-Z]{2}|say: ?.*|silence: ?[0-9.]*|ring: ?[a-zA-Z]{2})$'
    uuid:
      type: string
      format: uuid
      description: Universal Unique Identifier.
  securitySchemes:
    SignalWireBasicAuth:
      type: http
      scheme: Basic
      description: |-
        SignalWire Basic Authentication using Project ID and API Token.

        The client sends HTTP requests with the Authorization header containing
        the word Basic followed by a space and a base64-encoded string of project_id:token.
        The project ID will be used as the username and the API token as the password.

        Example:
        ```
        Authorization: Basic base64(project_id:token)
        ```
      x-fern-basic:
        username:
          name: project_id
          env: SIGNALWIRE_PROJECT_ID
        password:
          name: api_token
          env: SIGNALWIRE_API_TOKEN
    SignalWireBearerAuth:
      type: http
      scheme: Bearer
      description: |-
        SignalWire Bearer Token Authentication for subscriber endpoints.
        The client sends HTTP requests with the Authorization header containing
        the word Bearer followed by a space and the subscriber token.

        Example:
        ```
        Authorization: Bearer <subscriber_token>
        ```
servers:
  - url: https://{space_name}.signalwire.com/api/fabric/
    description: Endpoint
    variables:
      space_name:
        default: '{Your_Space_Name}'
        description: The domain of the users SignalWire space.
