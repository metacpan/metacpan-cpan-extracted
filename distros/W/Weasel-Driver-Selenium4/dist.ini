name     = Weasel-Driver-Selenium4
abstract = PHP's Mink inspired multi-protocol web-testing library for Perl
;'
version  = 0.02
author   = Erik Huelsmann <ehuels@gmail.com>
copyright_holder = Erik Huelsmann
main_module = lib/Weasel/Driver/Selenium2.pm
license     = Perl_5

[MetaResources]
bugtracker.web    = https://github.com/perl-weasel/weasel-driver-selenium4/issues
repository.url    = https://github.com/perl-weasel/weasel-driver-selenium4.git
repository.web    = https://github.com/perl-weasel/weasel-driver-selenium4
repository.type   = git

[@Filter]
-bundle = @Basic
-remove = GatherDir

[MetaJSON]
[ContributorsFromGit]
[Git::GatherDir]
exclude_match = ^tools/

[Prereqs]
perl = 5.12.0
Carp::Clan = 0
MIME::Base64 = 0
Moose = 0
namespace::autoclean = 0
Selenium::Client = 0
Time::HiRes = 0
Weasel::DriverRole = 0.03
Weasel = 0

[Prereqs / TestRequires]
File::Find = 0
File::Util = 0
Test2::V1 = 0

[Prereqs / DevelopRequires ]
Weasel = 0
Perl::Critic = 0
Pod::Coverage::TrustPod = 0
Test::Perl::Critic = 0
Test::Pod = 0
Test::Pod::Coverage = 0

[ExtraTests]
[Test::Perl::Critic]
critic_config = xt/perlcriticrc
[PodCoverageTests]
[PodSyntaxTests]
[PodVersion]
[PkgVersion]
use_package = 1
