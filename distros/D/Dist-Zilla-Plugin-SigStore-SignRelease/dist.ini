name    = Dist-Zilla-Plugin-SigStore-SignRelease
author  = Timothy Legge <timlegge@gmail.com>
license = Perl_5
copyright_holder = Timothy Legge <timlegge@gmail.com>

[@Filter]
bundle = @Basic
remove = GatherDir
remove = Readme
remove = UploadToCPAN

[Prereqs]
perl = 5.020

[AutoPrereqs]
perl = 5.020

[NextRelease]
format = %v -- %{EEE MMM dd HH:mm:ss VVV yyyy}d
filename = Changes

[Git::GatherDir]
exclude_filename = cpanfile
exclude_filename = Makefile.PL
exclude_filename = README.md
exclude_filename = example/verify_sigstore.pl
exclude_filename = SECURITY.md

[Encoding]
encoding = bytes
match = ico

[CPANFile]

[CopyFilesFromBuild::Filtered]
copy = cpanfile
copy = Makefile.PL
copy = README.md
copy = SECURITY.md

[CopyFilesFromRelease]
copy = SECURITY.md cpanfile, Makefile.PL, README.md

[MetaJSON]
[MetaProvides::Package]

[GitHub::Meta]

[Test::PodSpelling]
stopword = AfterBuild
stopword = BeforeRelease
stopword = SIGNES
stopword = SIGSTORE
stopword = sigstore
stopword = uploader
stopword = releaser

[PodSyntaxTests]
[PodCoverageTests]
[Test::Perl::Critic]
[Test::EOL]
[Test::EOF]
[Test::NoTabs]
[Test::TrailingSpace ]

[Git::NextVersion]
first_version = 0.01       ; this is the default
version_by_branch = 0       ; this is the default
version_regexp  = ^(0.\d+)$   ; this is the default

[OurPkgVersion]

[PodWeaver]
[ReadmeAnyFromPod]
type = gfm

[AuthorsFromGit]
[@Git]
changelog = Changes      ; this is the default
tag_format  = %V         ; Don't proceed tags with "v"
tag_message = %V         ; this is the default
push_to     = origin     ; see Git::Push

[SecurityPolicy]
-policy = Individual
timeframe = 2 weeks
[SigStore::SignRelease]
