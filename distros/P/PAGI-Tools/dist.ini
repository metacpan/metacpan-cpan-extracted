name    = PAGI-Tools
author  = John Napiorkowski <jjnapiork@cpan.org>
license = Artistic_2_0
copyright_holder = John Napiorkowski
copyright_year   = 2026
abstract = Application toolkit for the PAGI specification
version = 0.002001

[@Basic]
[MetaJSON]

; Render a Markdown README at the repo root from the PAGI::Tools front-page POD
[ReadmeAnyFromPod]
type = markdown
filename = README.md
location = root

; Inject $VERSION into the historically-unversioned modules at build
; time (PAGI::Tools itself carries an explicit one as the anchor)
[PkgVersion]
die_on_existing_version = 0
die_on_line_insertion = 0

[MetaResources]
homepage = https://github.com/jjn1056/PAGI-Tools
bugtracker.web  = https://github.com/jjn1056/PAGI-Tools/issues
repository.web  = https://github.com/jjn1056/PAGI-Tools
repository.url  = https://github.com/jjn1056/PAGI-Tools.git
repository.type = git

[MetaNoIndex]
directory = examples

[Prereqs::FromCPANfile]

; Development-only / unshippable files
[PruneFiles]
filename = CLAUDE.md
match = \.DS_Store
match = ^docs/
; symlink into a sibling example; resolves in git checkouts but CPAN
; tarballs must not contain symlinks
match = ^examples/websocket-chat-v2/public$
