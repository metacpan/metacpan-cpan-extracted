name    = MIDI-RtMidi-FFI
author  = John Barrett <john@jbrt.org>
license = Perl_5
copyright_holder = John Barrett
copyright_year   = 2026

version = 0.12

[FFI::Build]

[CheckChangesHasContent]
[@Filter]
-bundle = @Basic
-remove = GatherDir
[Git::GatherDir]
[WriteVersion]
[PodWeaver]
[MetaResources]
homepage        = https://codeberg.org/jbarrett/Alien-RtMidi/
bugtracker.web  = https://codeberg.org/jbarrett/Alien-RtMidi/issues
repository.url  = https://codeberg.org/jbarrett/Alien-RtMidi.git
repository.web  = https://codeberg.org/jbarrett/Alien-RtMidi/
repository.type = git
[MetaNoIndex]
directory = t
directory = xt
directory = examples
module = RtMidiWrapper
[MetaProvides::Package]
[MetaJSON]
[Prereqs / ConfigureRequires]
Alien::RtMidi = 0.12
[Prereqs / RuntimeRequires]
MIDI::Stream = 0.005
[AutoPrereqs]
skip = strict
skip = warnings
skip = base
skip = constant
skip = lib
skip = Carp
skip = Exporter
[PodSyntaxTests]
[Test::Perl::Critic]
[Test::Synopsis]
[Test::Kwalitee]
[MinimumPerl]
